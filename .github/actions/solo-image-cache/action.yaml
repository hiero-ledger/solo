name: 'Solo Image Cache'
description: 'Restore or save Solo container image archives through GitHub Actions cache.'

inputs:
  operation:
    description: 'Cache operation to run.'
    required: true
  cache-path:
    description: 'Solo image archive directory to cache.'
    required: false
    default: '~/.solo/cache/images'
  key-prefix:
    description: 'Stable cache key prefix.'
    required: false
    default: 'solo-image-cache'
  key-suffix:
    description: 'Hash or version suffix for the cache key.'
    required: true

outputs:
  cache-hit:
    description: 'Whether an exact cache key was restored.'
    value: ${{ steps.restore.outputs.cache-hit }}
  primary-key:
    description: 'Primary cache key used for restore or save.'
    value: ${{ steps.cache-metadata.outputs.primary-key }}

runs:
  using: 'composite'
  steps:
    - name: Build Cache Metadata
      id: cache-metadata
      shell: bash
      run: |
        set -euo pipefail

        case "${{ inputs.operation }}" in
          restore|save) ;;
          *) echo "Unsupported operation: ${{ inputs.operation }} (expected 'restore' or 'save')" >&2; exit 1 ;;
        esac

        primary_key="${{ inputs.key-prefix }}-${RUNNER_OS}-${RUNNER_ARCH}-${{ inputs.key-suffix }}"
        {
          echo "primary-key=${primary_key}"
          echo "restore-keys<<RESTORE_KEYS"
          echo "${{ inputs.key-prefix }}-${RUNNER_OS}-${RUNNER_ARCH}-"
          echo "RESTORE_KEYS"
        } >> "${GITHUB_OUTPUT}"

    - name: Restore Solo Image Cache
      id: restore
      if: ${{ inputs.operation == 'restore' }}
      continue-on-error: true
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ steps.cache-metadata.outputs.primary-key }}
        restore-keys: ${{ steps.cache-metadata.outputs.restore-keys }}

    - name: Inspect Solo Image Cache
      id: inspect
      if: ${{ inputs.operation == 'save' }}
      shell: bash
      run: |
        set -euo pipefail

        image_cache_dir="${{ inputs.cache-path }}"
        if [[ -d "${image_cache_dir}" ]] && find "${image_cache_dir}" -type f -name '*.tar' -print -quit | grep -q .; then
          echo "has-files=true" >> "${GITHUB_OUTPUT}"
        else
          echo "has-files=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Save Solo Image Cache
      if: ${{ inputs.operation == 'save' && steps.inspect.outputs.has-files == 'true' }}
      continue-on-error: true
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ steps.cache-metadata.outputs.primary-key }}
