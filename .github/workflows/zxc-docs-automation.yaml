name: Docs Automation

on:
  workflow_call:
    secrets:
      github-token:
        description: "GitHub Token to use for authentication, e.g. 'GITHUB_TOKEN'"
        required: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  command-output:
    name: Command Output
    runs-on: hiero-solo-linux-large
    timeout-minutes: 40
    env:
      STEP_TIMEOUT_MINUTES: '5'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }} # Use the ref input to check out the correct branch or tag

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wget
        run: |
          # Configure APT to use main Ubuntu archive (disable mirror rotation)
          sudo sed -i 's|http://[a-z.]*.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y wget

      - name: Install Kubectl
        uses: step-security/setup-kubectl@b256bc71248a59f1e3a278fc75a65646d6a8a1c4 # pinned to v5.1.0
        with:
          version: 'v1.27.3'
        id: install

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: "v3.12.3" # helm version

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Solo Command Output
        id: solo-command-output
        run: |
          cd docs/site
          SOLO_CI=true task build:solo:command:output

      - name: Collect Deployment Diagnostics Logs
        if: ${{ !cancelled() && always() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          npm run solo-test -- deployment diagnostics logs -q --dev || true

      - name: Upload Logs to GitHub
        if: ${{ !cancelled() && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-logs
          path: ~/.solo/logs/*
          if-no-files-found: warn

      # Upload the built site to artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: solo-command-output
          overwrite: true
          path: |
            docs/site/build

  cli-help:
    name: CLI Help
    runs-on: hiero-solo-linux-large
    timeout-minutes: 30
    env:
      STEP_TIMEOUT_MINUTES: '5'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }} # Use the ref input to check out the correct branch or tag

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Solo CLI Help
        id: solo-cli-help
        run: |
          cd docs/site
          SOLO_CI=true task build:docs:content

      # Upload the built site to artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: solo-cli-help
          overwrite: true
          path: |
            docs/site/build
