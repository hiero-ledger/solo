name: "Test Examples"

on:
  schedule:
    # Run every midnight US Central Time (6 AM UTC during DST, 7 AM UTC during standard time)
    # Using 6 AM UTC to cover Central Daylight Time
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false
      enable_s6_image:
        description: "Enable S6 image"
        type: boolean
        required: false
        default: true
      example-directory:
        description: "Specific example directory to run (e.g., 'consensus-node-local-build'). Leave empty to run all examples."
        type: string
        required: false
        default: ""
      use-release-example-zip:
        description: "Download example zip from latest release and run from extracted directory."
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false
      enable_s6_image:
        description: "Enable S6 image"
        type: boolean
        required: false
        default: true
      example-directory:
        description: "Specific example directory to run (e.g., 'consensus-node-local-build'). Leave empty to run all examples."
        type: string
        required: false
        default: ""
      use-release-example-zip:
        description: "Download example zip from latest release and run from extracted directory."
        type: boolean
        required: false
        default: false
  push:
    branches:
      - trunk-merge/**
defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

env:
  ENABLE_S6_IMAGE: ${{ inputs.enable_s6_image }}
  # CG_EXEC is overridden per-job by the "Setup Cgroup Isolation" step below when cgroup-tools
  # are available. This fallback is used on non-Linux runners or if cgroup setup fails.
  CG_EXEC: "ionice -c 2 -n 2 nice -n 19"

jobs:
  generate_matrix:
    name: Generate Test Matrix
    runs-on: hiero-solo-linux-medium
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Matrix
        id: set_matrix
        run: |
          EXAMPLE_DIR="${{ inputs.example-directory }}"
          
          if [ -n "$EXAMPLE_DIR" ]; then
            # Filter to specific example
            echo "Filtering matrix for example directory: $EXAMPLE_DIR"
            JSON_CONTENT=$(cat .github/workflows/support/examples-test-matrix.json | jq -c "[.[] | select(.directory == \"$EXAMPLE_DIR\")]")
            
            if [ "$JSON_CONTENT" = "[]" ]; then
              echo "Error: Example directory '$EXAMPLE_DIR' not found in matrix"
              echo "Available examples:"
              cat .github/workflows/support/examples-test-matrix.json | jq -r '.[].directory'
              exit 1
            fi
          else
            # Use all examples
            echo "Using all examples from matrix"
            JSON_CONTENT=$(cat .github/workflows/support/examples-test-matrix.json | jq -c .)
          fi
          
          echo "Generated matrix: $JSON_CONTENT"
          
          # Set the output variable 'matrix' with the JSON content
          echo "matrix=$JSON_CONTENT" >> $GITHUB_OUTPUT

  test-examples:
    name: Test Example (${{ matrix.example.name }})
    runs-on: hiero-solo-linux-large
    needs:
      - generate_matrix
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.generate_matrix.outputs.matrix) }}
      max-parallel: 4
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version || '22' }}
          cache: npm

      - name: Configure npm registry
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install Kubectl
        uses: step-security/setup-kubectl@fa3574e17195eaed56b1e9d9095c58d0aee24f03 # pinned to v4.0.1
        with:
          version: 'v1.27.3'
        id: install

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "v3.17.1" # helm version

      - name: Install Dependencies
        id: npm-deps
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: |
            npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.39.2
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.22.3'

      - name: Install grpcurl
        run: |
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Setup Cgroup Isolation
        if: ${{ runner.os == 'Linux' && !cancelled() && !failure() }}
        run: |
          set -euo pipefail
          # Install cgroup-tools (provides cgexec) if not already present.
          if ! command -v cgexec >/dev/null 2>&1; then
            sudo apt-get install -y cgroup-tools
          fi

          # Each matrix job gets a unique cgroup name via strategy.job-index so that
          # concurrent matrix jobs on the same host do not share cgroup limits.
          CGROUP_NAME="examples-${{ github.run_id }}-${{ strategy.job-index }}"

          # Derive memory limit from the machine's actual total RAM.
          # Reserve 20% for the OS + runner agent, then split the remainder across
          # MAX_CONCURRENT_JOBS slots.  Adjust MAX_CONCURRENT_JOBS to match the
          # maximum number of jobs your runner pool schedules on one host at once.
          MAX_CONCURRENT_JOBS=4
          TOTAL_MEM_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
          TOTAL_MEM_BYTES=$(( TOTAL_MEM_KB * 1024 ))
          USABLE_MEM_BYTES=$(( TOTAL_MEM_BYTES * 80 / 100 ))
          MEM_LIMIT_BYTES=$(( USABLE_MEM_BYTES / MAX_CONCURRENT_JOBS ))
          echo "Runner total RAM: $(( TOTAL_MEM_BYTES / 1073741824 )) GB"
          echo "Per-job memory limit: $(( MEM_LIMIT_BYTES / 1073741824 )) GB (${MEM_LIMIT_BYTES} bytes)"

          if [[ "$(stat -fc %T /sys/fs/cgroup/ 2>/dev/null)" == "cgroup2fs" ]]; then
            # cgroup v2 — single unified hierarchy under /sys/fs/cgroup/
            CGROUP_PATH="/sys/fs/cgroup/${CGROUP_NAME}"
            sudo mkdir -p "${CGROUP_PATH}"
            # Enable cpu and memory controllers on the root cgroup if not already set.
            for ctrl in cpu memory; do
              if ! grep -qw "${ctrl}" /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null; then
                echo "+${ctrl}" | sudo tee /sys/fs/cgroup/cgroup.subtree_control >/dev/null 2>&1 || true
              fi
            done
            # Memory ceiling derived from actual host RAM (see above).
            echo "${MEM_LIMIT_BYTES}" | sudo tee "${CGROUP_PATH}/memory.max" >/dev/null || true
            # CPU weight 100/MAX_CONCURRENT_JOBS gives each job a fair share.
            # Weight is relative so a job can still burst when neighbours are idle.
            CPU_WEIGHT=$(( 100 / MAX_CONCURRENT_JOBS ))
            echo "${CPU_WEIGHT}" | sudo tee "${CGROUP_PATH}/cpu.weight" >/dev/null || true
            # Allow the runner user to write to cgroup.procs so cgexec can assign processes.
            sudo chown "$USER":"$(id -gn)" "${CGROUP_PATH}/cgroup.procs" 2>/dev/null || true
            CG_CONTROLLERS="unified"
          else
            # cgroup v1 — separate cpu and memory hierarchies.
            sudo mkdir -p "/sys/fs/cgroup/cpu/${CGROUP_NAME}" "/sys/fs/cgroup/memory/${CGROUP_NAME}"
            # Memory limit derived from actual host RAM (see above).
            echo "${MEM_LIMIT_BYTES}" | sudo tee "/sys/fs/cgroup/memory/${CGROUP_NAME}/memory.limit_in_bytes" >/dev/null || true
            # cpu.shares: default is 1024; divide by MAX_CONCURRENT_JOBS for a fair share.
            CPU_SHARES=$(( 1024 / MAX_CONCURRENT_JOBS ))
            echo "${CPU_SHARES}" | sudo tee "/sys/fs/cgroup/cpu/${CGROUP_NAME}/cpu.shares" >/dev/null || true
            sudo chown "$USER":"$(id -gn)" "/sys/fs/cgroup/cpu/${CGROUP_NAME}/tasks" 2>/dev/null || true
            sudo chown "$USER":"$(id -gn)" "/sys/fs/cgroup/memory/${CGROUP_NAME}/tasks" 2>/dev/null || true
            CG_CONTROLLERS="cpu,memory"
          fi

          # Write the cgexec invocation into GITHUB_ENV so all subsequent steps that
          # reference ${{ env.CG_EXEC }} use cgroup isolation automatically.
          echo "CG_EXEC=cgexec -g ${CG_CONTROLLERS}:${CGROUP_NAME} ionice -c 2 -n 2 nice -n 19" >> "${GITHUB_ENV}"
          echo "Cgroup isolation configured: ${CGROUP_NAME} (controllers: ${CG_CONTROLLERS})"

      - name: Setup Java
        if: ${{ runner.os == 'linux' && matrix.example.local-java-build && !cancelled() && !failure() }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21.0.1

      - name: Setup Gradle
        if: ${{ runner.os == 'linux' && matrix.example.local-java-build && !cancelled() && !failure() }}
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: false

      - name: Build Hedera code locally
        if: ${{ runner.os == 'linux' && matrix.example.local-java-build && !cancelled() && !failure() }}
        run: |
          export CONSENSUS_NODE_VERSION=$(grep 'TEST_LOCAL_HEDERA_PLATFORM_VERSION' version-test.ts | sed -E "s/.*'([^']+)';/\1/")
          cd ..
          git clone https://github.com/hiero-ledger/hiero-consensus-node.git --depth 1 --branch ${CONSENSUS_NODE_VERSION}
          cd hiero-consensus-node
          ls -ltr
          ${{ env.CG_EXEC }} ./gradlew assemble --stacktrace --info
          cd ../solo

      - name: Build Application
        run: task build:compile

      - name: Prepare Example Directory - ${{ matrix.example.name }}
        id: prepare_example
        run: |
          set -euo pipefail

          example_name="${{ matrix.example.directory }}"

          if [ "${{ inputs.use-release-example-zip || 'false' }}" = "true" ]; then
            echo "Using release example zip for: ${example_name}"
            latest_tag="$(curl -fsSL "https://api.github.com/repos/hiero-ledger/solo/releases/latest" | jq -r '.tag_name')"
            if [ -z "${latest_tag}" ] || [ "${latest_tag}" = "null" ]; then
              echo "Failed to resolve latest release tag" >&2
              exit 1
            fi

            release_dir="${RUNNER_TEMP}/release-examples/${example_name}"
            unzip_dir="${release_dir}/unzipped"
            zip_file=""
            zip_url=""
            zip_name=""

            rm -rf "${release_dir}"
            mkdir -p "${release_dir}" "${unzip_dir}"

            for candidate in "example-${example_name}.zip" "${example_name}.zip"; do
              candidate_url="https://github.com/hiero-ledger/solo/releases/download/${latest_tag}/${candidate}"
              candidate_file="${release_dir}/${candidate}"
              echo "Trying download: ${candidate_url}"
              if curl -fsSL --retry 3 --retry-delay 2 -o "${candidate_file}" "${candidate_url}"; then
                zip_name="${candidate}"
                zip_url="${candidate_url}"
                zip_file="${candidate_file}"
                break
              fi
            done

            if [ -z "${zip_file}" ]; then
              echo "Failed to download release zip for ${example_name} from tag ${latest_tag}" >&2
              exit 1
            fi

            unzip -q -o "${zip_file}" -d "${unzip_dir}"

            if [ -f "${unzip_dir}/Taskfile.yml" ]; then
              run_dir="${unzip_dir}"
            else
              taskfile_path="$(find "${unzip_dir}" -maxdepth 3 -type f -name Taskfile.yml | head -n 1)"
              if [ -z "${taskfile_path}" ]; then
                echo "Taskfile.yml not found in extracted zip for ${example_name}" >&2
                exit 1
              fi
              run_dir="$(dirname "${taskfile_path}")"
            fi

            display_dir="release:${latest_tag}/${zip_name} -> ${run_dir}"
          else
            run_dir="${GITHUB_WORKSPACE}/examples/${example_name}"
            display_dir="local:${run_dir}"
          fi

          if [ ! -d "${run_dir}" ]; then
            echo "Resolved run directory does not exist: ${run_dir}" >&2
            exit 1
          fi
          if [ ! -f "${run_dir}/Taskfile.yml" ]; then
            echo "Resolved run directory does not contain Taskfile.yml: ${run_dir}" >&2
            exit 1
          fi

          echo "run_dir=${run_dir}" >> "${GITHUB_OUTPUT}"
          echo "display_dir=${display_dir}" >> "${GITHUB_OUTPUT}"

      - name: Run Example Test - ${{ matrix.example.name }}
        timeout-minutes: 45
        working-directory: ${{ steps.prepare_example.outputs.run_dir }}
        run: |
          echo "Running example: ${{ matrix.example.name }}"
          echo "Resolved example source: ${{ steps.prepare_example.outputs.display_dir }}"
          echo "Current directory: $(pwd)"
          
          # Export environment variables for Taskfile.
          # Release ZIP examples are not executed from the Solo repo checkout, so they must use released Solo CLI.
          if [ "${{ inputs.use-release-example-zip || 'false' }}" = "true" ]; then
            export USE_RELEASED_VERSION="true"
          else
            export USE_RELEASED_VERSION="${{ inputs.released-or-latest || 'false' }}"
          fi
          echo "USE_RELEASED_VERSION: $USE_RELEASED_VERSION"
          
          # Check if Taskfile.yml exists
          if [ ! -f "Taskfile.yml" ]; then
            echo "Warning: No Taskfile.yml found in ${{ matrix.example.directory }}"
            exit 1
          fi
          
          # Run the example
          echo "Starting task..."
          export CONSENSUS_NODE_VERSION=$(grep 'TEST_LOCAL_HEDERA_PLATFORM_VERSION' ../../version-test.ts | sed -E "s/.*'([^']+)';/\1/")
          # Increase pod-readiness timeouts on CI runners where startup can be slow under load.
          export PODS_RUNNING_MAX_ATTEMPTS=1200
          export PODS_READY_MAX_ATTEMPTS=600
          export PODS_READY_DELAY=2000
          set +e
          task
          TASK_RC=$?
          set -e

          if [ "${TASK_RC}" -ne 0 ]; then
            echo "Task failed with exit code ${TASK_RC}. Collecting deployment diagnostics logs..."
            cd ../..
            npm run solo-test -- deployment diagnostics logs -q --dev || true
            cd "examples/${{ matrix.example.directory }}"

            exit "${TASK_RC}"
          fi
          
          echo "Task completed successfully"

      - name: Send Slack Notification on Failure
        if: ${{ github.ref == 'refs/heads/main' && failure() }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Example Test Failed
          SLACK_MESSAGE: |
            *Example:* ${{ matrix.example.name }}
            *Directory:* `${{ steps.prepare_example.outputs.display_dir }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* ${{ github.sha }}
            
            :link: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Job Logs>
          SLACK_FOOTER: ${{ github.workflow }}

      - name: Cleanup Example - ${{ matrix.example.name }}
        if: always()
        timeout-minutes: 10
        working-directory: ${{ steps.prepare_example.outputs.run_dir }}
        run: |
          echo "Cleaning up example source: ${{ steps.prepare_example.outputs.display_dir }}"
          
          # Keep cleanup mode aligned with execution mode.
          if [ "${{ inputs.use-release-example-zip || 'false' }}" = "true" ]; then
            export USE_RELEASED_VERSION="true"
          else
            export USE_RELEASED_VERSION="${{ inputs.released-or-latest || 'false' }}"
          fi
          
          # Check if Taskfile.yml exists and has destroy task
          if [ -f "Taskfile.yml" ] && grep -q "destroy:" Taskfile.yml; then
            echo "Running task destroy..."
            task destroy || echo "Destroy task failed or not available, continuing..."
          else
            echo "No destroy task found in Taskfile.yml, skipping cleanup"
          fi

      - name: Cleanup Runner Resources
        if: always()
        run: |
          # Delete all kind clusters left by this job to avoid polluting the next job on this runner
          kind get clusters 2>/dev/null | xargs -r -I{} kind delete cluster --name {} || true
          # Prune stopped containers, dangling images, and unused volumes to reclaim disk space
          docker system prune -f --volumes || true
          # Remove the per-job cgroup created by Setup Cgroup Isolation.
          CGROUP_NAME="examples-${{ github.run_id }}-${{ strategy.job-index }}"
          sudo rmdir "/sys/fs/cgroup/${CGROUP_NAME}" 2>/dev/null || true
          sudo rmdir "/sys/fs/cgroup/cpu/${CGROUP_NAME}" 2>/dev/null || true
          sudo rmdir "/sys/fs/cgroup/memory/${CGROUP_NAME}" 2>/dev/null || true

      - name: Upload Logs to GitHub
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: solo-logs-${{ matrix.example.directory }}
          path: ~/.solo/logs/*
          if-no-files-found: ignore
