name: "One-Shot Timing Test"

on:
  workflow_dispatch:
    inputs:
      use-released-solo:
        description: "Use latest released Solo CLI (true) or build from source (false)"
        type: boolean
        required: false
        default: false
      use-local-build:
        description: "Build consensus node from source using --local-build-path"
        type: boolean
        required: false
        default: false
      consensus-node-version:
        description: "Consensus node version"
        type: string
        required: false
        default: "v0.71.0"
      block-node-version:
        description: "Block node chart version"
        type: string
        required: false
        default: "v0.28.1"
      mirror-node-version:
        description: "Mirror node version"
        type: string
        required: false
        default: "v0.149.0"
      relay-version:
        description: "JSON RPC Relay version"
        type: string
        required: false
        default: "0.75.0"
      explorer-version:
        description: "Explorer version"
        type: string
        required: false
        default: "26.0.0"

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  one-shot-timing:
    timeout-minutes: 120
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22

      - name: Install Dependencies
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Solo CLI (released)
        if: ${{ inputs.use-released-solo == true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: npm i @hashgraph/solo@latest

      - name: Compile Project (from source)
        if: ${{ inputs.use-released-solo != true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Set Solo Command
        id: solo-cmd
        run: |
          if [ "${{ inputs.use-released-solo }}" = "true" ]; then
            echo "cmd=npx @hashgraph/solo" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=npm run solo --" >> "$GITHUB_OUTPUT"
          fi

      - name: Solo Init
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          ${{ steps.solo-cmd.outputs.cmd }} init --dev
          export PATH=~/.solo/bin:${PATH}

      - name: Setup Java and Gradle (for local build)
        if: ${{ inputs.use-local-build == true }}
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Checkout and Build Consensus Node (local build)
        if: ${{ inputs.use-local-build == true }}
        timeout-minutes: 30
        run: |
          CN_VERSION="${{ inputs.consensus-node-version }}"
          echo "Building consensus node at version: $CN_VERSION"

          CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"

          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "$CN_VERSION" "$CN_REPO_DIR" 2>/dev/null || \
          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "refs/tags/$CN_VERSION" "$CN_REPO_DIR"

          cd "$CN_REPO_DIR"
          LOG_FILE="/tmp/consensus-node-build.log"
          ./gradlew assemble --stacktrace --info > "$LOG_FILE" 2>&1 || {
            echo "Build failed. Last 100 lines:"
            tail -100 "$LOG_FILE"
            exit 1
          }
          echo "Consensus node build complete."

      - name: Log Versions
        id: versions
        run: |
          echo "### Resolved Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consensus Node | ${{ inputs.consensus-node-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Block Node | ${{ inputs.block-node-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mirror Node | ${{ inputs.mirror-node-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Relay | ${{ inputs.relay-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Explorer | ${{ inputs.explorer-version }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Values File
        id: values-file
        run: |
          VALUES_FILE="/tmp/one-shot-timing-values.yaml"
          {
            echo "network:"
            echo "  --release-tag: \"${{ inputs.consensus-node-version }}\""
            echo "  --tss: \"true\""
            echo ""
            if [ "${{ inputs.use-local-build }}" = "true" ]; then
              CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"
              echo "setup:"
              echo "  --local-build-path: \"${CN_REPO_DIR}/hedera-node/data\""
              echo "  --release-tag: \"${{ inputs.consensus-node-version }}\""
              echo ""
            fi
            echo "blockNode:"
            echo "  --chart-version: \"${{ inputs.block-node-version }}\""
            echo ""
            echo "mirrorNode:"
            echo "  --mirror-node-version: \"${{ inputs.mirror-node-version }}\""
            echo ""
            echo "relay:"
            echo "  --relay-release: \"${{ inputs.relay-version }}\""
            echo ""
            echo "explorer:"
            echo "  --explorer-version: \"${{ inputs.explorer-version }}\""
          } > "$VALUES_FILE"
          echo "Generated values file:"
          cat "$VALUES_FILE"
          echo "path=$VALUES_FILE" >> "$GITHUB_OUTPUT"

      - name: "Cold Start: Deploy"
        id: cold-start
        timeout-minutes: 60
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          VALUES_FILE="${{ steps.values-file.outputs.path }}"

          echo "==== Cold Start: Measuring one-shot single deploy time ===="
          COLD_START_TIME=$SECONDS

          $SOLO_CMD one-shot single deploy --values-file "$VALUES_FILE"

          COLD_ELAPSED=$(( SECONDS - COLD_START_TIME ))
          COLD_MINUTES=$(( COLD_ELAPSED / 60 ))
          COLD_SECONDS=$(( COLD_ELAPSED % 60 ))
          echo "cold-elapsed=${COLD_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "==== Cold start completed in ${COLD_MINUTES}m ${COLD_SECONDS}s ===="

      - name: "Destroy Deployment"
        timeout-minutes: 15
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"

          echo "==== Destroying one-shot single deployment ===="
          $SOLO_CMD one-shot single destroy
          echo "==== Destroy complete ===="

      - name: "Warm Start: Redeploy"
        id: warm-start
        timeout-minutes: 60
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          VALUES_FILE="${{ steps.values-file.outputs.path }}"

          echo "==== Warm Start: Measuring one-shot single deploy time ===="
          WARM_START_TIME=$SECONDS

          $SOLO_CMD one-shot single deploy --values-file "$VALUES_FILE"

          WARM_ELAPSED=$(( SECONDS - WARM_START_TIME ))
          WARM_MINUTES=$(( WARM_ELAPSED / 60 ))
          WARM_SECONDS=$(( WARM_ELAPSED % 60 ))
          echo "warm-elapsed=${WARM_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "==== Warm start completed in ${WARM_MINUTES}m ${WARM_SECONDS}s ===="

      - name: Timing Summary
        if: ${{ !cancelled() }}
        run: |
          COLD="${{ steps.cold-start.outputs.cold-elapsed }}"
          WARM="${{ steps.warm-start.outputs.warm-elapsed }}"

          echo "### One-Shot Timing Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$COLD" ]; then
            echo "| Cold Start | $(( COLD / 60 ))m $(( COLD % 60 ))s (${COLD}s) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Cold Start | Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$WARM" ]; then
            echo "| Warm Start | $(( WARM / 60 ))m $(( WARM % 60 ))s (${WARM}s) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Warm Start | Failed or skipped |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$COLD" ] && [ -n "$WARM" ]; then
            DIFF=$(( COLD - WARM ))
            echo "| Improvement | ${DIFF}s faster on warm start |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Configuration:** use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD deployment diagnostics logs -q --dev || true

      - name: Upload Logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: one-shot-timing-logs
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn
