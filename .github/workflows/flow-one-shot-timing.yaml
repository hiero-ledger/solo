name: "One-Shot Timing Test"

on:
  schedule:
    - cron: '1 6 * * *'
  workflow_dispatch:
    inputs:
      use-released-solo:
        description: "Use latest released Solo CLI (true) or build from source (false)"
        type: boolean
        required: false
        default: false
      use-local-build:
        description: "Build consensus node from source using --local-build-path"
        type: boolean
        required: false
        default: false
      consensus-node-version:
        description: "Consensus node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      block-node-version:
        description: "Block node chart version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      mirror-node-version:
        description: "Mirror node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      relay-version:
        description: "JSON RPC Relay version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      explorer-version:
        description: "Explorer version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      cycles:
        description: "Number of cold/warm cycles to run"
        type: number
        required: false
        default: 1

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  one-shot-timing:
    name: "One-Shot Timing (${{ matrix.runner }})"
    timeout-minutes: 420
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [hiero-solo-linux-large, macos-15-intel]
    steps:
      - name: Harden Runner
        if: ${{ runner.os == 'Linux' }}
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Docker Runtime (macOS only)
        if: ${{ runner.os == 'macOS' }}
        timeout-minutes: 20
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            brew install docker colima
          fi

          if ! command -v colima >/dev/null 2>&1; then
            brew install colima
          fi

          if ! colima status >/dev/null 2>&1; then
            colima start --runtime docker --cpu 4 --memory 12 --disk 60
          fi

          docker info

      - name: Install Dependencies
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Solo CLI (released)
        if: ${{ inputs.use-released-solo == true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: npm i @hashgraph/solo@latest

      - name: Compile Project (from source)
        if: ${{ inputs.use-released-solo != true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Set Solo Command
        id: solo-cmd
        run: |
          if [ "${{ inputs.use-released-solo }}" = "true" ]; then
            echo "cmd=npx @hashgraph/solo" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=npm run solo --" >> "$GITHUB_OUTPUT"
          fi

      - name: Solo Init
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          ${{ steps.solo-cmd.outputs.cmd }} init --dev
          echo "${HOME}/.solo/bin" >> "$GITHUB_PATH"

      - name: Preflight Runner Capabilities
        id: preflight
        run: |
          CAN_RUN_TIMING=true
          MISSING=()
          SKIP_REASON=""
          MIN_MEMORY_MB=12000

          if ! command -v docker >/dev/null 2>&1; then
            CAN_RUN_TIMING=false
            MISSING+=("docker")
          fi

          if [ "$CAN_RUN_TIMING" = "true" ]; then
            if ! docker info >/dev/null 2>&1; then
              CAN_RUN_TIMING=false
              MISSING+=("docker-daemon")
              SKIP_REASON="docker daemon unavailable"
            fi
          fi

          if [ "$CAN_RUN_TIMING" = "true" ] && [ "${RUNNER_OS}" = "Windows" ]; then
            DOCKER_OS_TYPE="$(docker info --format '{{.OSType}}' 2>/dev/null || true)"
            if [ "${DOCKER_OS_TYPE}" != "linux" ]; then
              CAN_RUN_TIMING=false
              SKIP_REASON="windows runner not using linux containers"
            fi
          fi

          TOTAL_MEMORY_MB=""
          if [ "${RUNNER_OS}" = "Linux" ] && [ -f /proc/meminfo ]; then
            TOTAL_MEMORY_MB="$(awk '/MemTotal/ {print int($2/1024)}' /proc/meminfo)"
          elif [ "${RUNNER_OS}" = "macOS" ] && command -v sysctl >/dev/null 2>&1; then
            MEM_BYTES="$(sysctl -n hw.memsize 2>/dev/null || true)"
            if [ -n "${MEM_BYTES}" ]; then
              TOTAL_MEMORY_MB="$(( MEM_BYTES / 1024 / 1024 ))"
            fi
          elif [ "${RUNNER_OS}" = "Windows" ]; then
            TOTAL_MEMORY_MB="$(powershell -NoProfile -Command "[int]((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1MB)" 2>/dev/null || true)"
          fi

          if [ "$CAN_RUN_TIMING" = "true" ] && [ -n "${TOTAL_MEMORY_MB}" ] && [ "${TOTAL_MEMORY_MB}" -lt "${MIN_MEMORY_MB}" ]; then
            CAN_RUN_TIMING=false
            SKIP_REASON="insufficient memory (${TOTAL_MEMORY_MB}MB < ${MIN_MEMORY_MB}MB)"
          fi

          if [ "$CAN_RUN_TIMING" = "false" ]; then
            echo "::warning::Runner ${RUNNER_OS} is missing required tools: ${MISSING[*]}. Timing cycles will be skipped."
            if [ -z "${SKIP_REASON}" ]; then
              SKIP_REASON="missing prerequisites: ${MISSING[*]}"
            fi
            echo "### Runner Preflight (${{ matrix.runner }})" >> "$GITHUB_STEP_SUMMARY"
            echo "Timing cycles skipped on this runner (${SKIP_REASON})." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "can-run=${CAN_RUN_TIMING}" >> "$GITHUB_OUTPUT"
          echo "skip-reason=${SKIP_REASON}" >> "$GITHUB_OUTPUT"
          echo "total-memory-mb=${TOTAL_MEMORY_MB}" >> "$GITHUB_OUTPUT"

      - name: Resolve Versions
        id: versions
        run: |
          # Read defaults from version.ts and allow input overrides
          DEFAULT_CN=$(awk -F"'" '/^export const HEDERA_PLATFORM_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_BN=$(awk -F"'" '/^export const BLOCK_NODE_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_MN=$(awk -F"'" '/^export const MIRROR_NODE_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_RELAY=$(awk -F"'" '/^export const HEDERA_JSON_RPC_RELAY_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_EXPLORER=$(awk -F"'" '/^export const EXPLORER_VERSION/ {print $(NF-1); exit}' version.ts)

          CN_VERSION="${{ inputs.consensus-node-version }}"
          BN_VERSION="${{ inputs.block-node-version }}"
          MN_VERSION="${{ inputs.mirror-node-version }}"
          RELAY_VERSION="${{ inputs.relay-version }}"
          EXPLORER_VERSION="${{ inputs.explorer-version }}"

          echo "cn-version=${CN_VERSION:-$DEFAULT_CN}" >> "$GITHUB_OUTPUT"
          echo "bn-version=${BN_VERSION:-$DEFAULT_BN}" >> "$GITHUB_OUTPUT"
          echo "mn-version=${MN_VERSION:-$DEFAULT_MN}" >> "$GITHUB_OUTPUT"
          echo "relay-version=${RELAY_VERSION:-$DEFAULT_RELAY}" >> "$GITHUB_OUTPUT"
          echo "explorer-version=${EXPLORER_VERSION:-$DEFAULT_EXPLORER}" >> "$GITHUB_OUTPUT"

          echo "### Resolved Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consensus Node | ${CN_VERSION:-$DEFAULT_CN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Block Node | ${BN_VERSION:-$DEFAULT_BN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mirror Node | ${MN_VERSION:-$DEFAULT_MN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Relay | ${RELAY_VERSION:-$DEFAULT_RELAY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Explorer | ${EXPLORER_VERSION:-$DEFAULT_EXPLORER} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java and Gradle (for local build)
        if: ${{ inputs.use-local-build == true }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Checkout and Build Consensus Node (local build)
        if: ${{ inputs.use-local-build == true }}
        timeout-minutes: 30
        run: |
          CN_VERSION="${{ steps.versions.outputs.cn-version }}"
          echo "Building consensus node at version: $CN_VERSION"

          CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"

          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "$CN_VERSION" "$CN_REPO_DIR" 2>/dev/null || \
          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "refs/tags/$CN_VERSION" "$CN_REPO_DIR"

          cd "$CN_REPO_DIR"
          LOG_FILE="/tmp/consensus-node-build.log"
          ./gradlew assemble --stacktrace --info > "$LOG_FILE" 2>&1 || {
            echo "Build failed. Last 100 lines:"
            tail -100 "$LOG_FILE"
            exit 1
          }
          echo "Consensus node build complete."

      - name: Generate Values File
        id: values-file
        run: |
          VALUES_FILE="/tmp/one-shot-timing-values.yaml"
          {
            echo "network:"
            echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
            echo "  --tss: \"true\""
            echo ""
            if [ "${{ inputs.use-local-build }}" = "true" ]; then
              CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"
              echo "setup:"
              echo "  --local-build-path: \"${CN_REPO_DIR}/hedera-node/data\""
              echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
              echo ""
            fi
            echo "blockNode:"
            echo "  --chart-version: \"${{ steps.versions.outputs.bn-version }}\""
            echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
            echo ""
            echo "mirrorNode:"
            echo "  --mirror-node-version: \"${{ steps.versions.outputs.mn-version }}\""
            echo ""
            echo "relayNode:"
            echo "  --relay-release: \"${{ steps.versions.outputs.relay-version }}\""
            echo ""
            echo "explorerNode:"
            echo "  --explorer-version: \"${{ steps.versions.outputs.explorer-version }}\""
          } > "$VALUES_FILE"
          echo "Generated values file:"
          cat "$VALUES_FILE"
          echo "path=$VALUES_FILE" >> "$GITHUB_OUTPUT"

      - name: System Calibration
        id: calibration
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          echo "==== System Calibration ===="
          BASELINE=""
          CALIBRATION_START=$SECONDS
          # Hash 100 MB of random data — bounded CPU+IO benchmark (~1-5s on any runner).
          # sha256sum (Linux) / shasum (macOS) are tried in order.
          if dd if=/dev/urandom bs=1048576 count=100 2>/dev/null | sha256sum > /dev/null 2>&1; then
            BASELINE=$(( SECONDS - CALIBRATION_START ))
          elif dd if=/dev/urandom bs=1048576 count=100 2>/dev/null | shasum -a 256 > /dev/null 2>&1; then
            BASELINE=$(( SECONDS - CALIBRATION_START ))
          fi
          echo "baseline=${BASELINE}" >> "$GITHUB_OUTPUT"
          if [ -n "$BASELINE" ]; then
            echo "Runner calibration (sha256 100MB): ${BASELINE}s"
          else
            echo "Runner calibration skipped on this runner."
          fi
          if [ -n "$BASELINE" ] && [ "$BASELINE" -gt 20 ]; then
            echo "::warning::Runner appears slow (calibration=${BASELINE}s). Timing results may be unreliable."
          fi

      - name: "Cold/Warm Cycles (${{ inputs.cycles || 3 }} iterations)"
        id: timing-cycles
        if: ${{ steps.preflight.outputs.can-run == 'true' }}
        timeout-minutes: 360
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          VALUES_FILE="${{ steps.values-file.outputs.path }}"

          delete_clusters() {
            for cluster in $(kind get clusters 2>/dev/null); do
              kind delete cluster -n "$cluster"
            done
          }

          CYCLES=${{ inputs.cycles || 3 }}
          COLD_SAMPLES=()
          WARM_SAMPLES=()

          for i in $(seq 1 "$CYCLES"); do
            echo "==== Cycle ${i}/${CYCLES} ===="

            echo "-- Cold start --"
            COLD_SAMPLE_START=$SECONDS
            $SOLO_CMD one-shot falcon deploy --values-file "$VALUES_FILE"
            COLD_ELAPSED=$(( SECONDS - COLD_SAMPLE_START ))
            COLD_SAMPLES+=("$COLD_ELAPSED")
            echo "Cold ${i}: $(( COLD_ELAPSED / 60 ))m $(( COLD_ELAPSED % 60 ))s (${COLD_ELAPSED}s)"

            $SOLO_CMD one-shot falcon destroy -q

            echo "-- Warm start --"
            WARM_SAMPLE_START=$SECONDS
            $SOLO_CMD one-shot falcon deploy --values-file "$VALUES_FILE"
            WARM_ELAPSED=$(( SECONDS - WARM_SAMPLE_START ))
            WARM_SAMPLES+=("$WARM_ELAPSED")
            echo "Warm ${i}: $(( WARM_ELAPSED / 60 ))m $(( WARM_ELAPSED % 60 ))s (${WARM_ELAPSED}s)"

            if [ "$i" -lt "$CYCLES" ]; then
              $SOLO_CMD one-shot falcon destroy -q
              delete_clusters
            fi
          done

          MEDIAN_IDX=$(( (CYCLES - 1) / 2 ))

          IFS=$'\n' COLD_SORTED=($(printf '%s\n' "${COLD_SAMPLES[@]}" | sort -n)); unset IFS
          COLD_MIN=${COLD_SORTED[0]}
          COLD_MEDIAN=${COLD_SORTED[$MEDIAN_IDX]}
          COLD_MAX=${COLD_SORTED[$CYCLES - 1]}

          IFS=$'\n' WARM_SORTED=($(printf '%s\n' "${WARM_SAMPLES[@]}" | sort -n)); unset IFS
          WARM_MIN=${WARM_SORTED[0]}
          WARM_MEDIAN=${WARM_SORTED[$MEDIAN_IDX]}
          WARM_MAX=${WARM_SORTED[$CYCLES - 1]}

          echo "cold-elapsed=${COLD_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "cold-min=${COLD_MIN}" >> "$GITHUB_OUTPUT"
          echo "cold-median=${COLD_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "cold-max=${COLD_MAX}" >> "$GITHUB_OUTPUT"
          echo "cold-samples=${COLD_SAMPLES[*]}" >> "$GITHUB_OUTPUT"

          echo "warm-elapsed=${WARM_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "warm-min=${WARM_MIN}" >> "$GITHUB_OUTPUT"
          echo "warm-median=${WARM_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "warm-max=${WARM_MAX}" >> "$GITHUB_OUTPUT"
          echo "warm-samples=${WARM_SAMPLES[*]}" >> "$GITHUB_OUTPUT"

          echo "==== Cold median: $(( COLD_MEDIAN / 60 ))m $(( COLD_MEDIAN % 60 ))s ===="
          echo "==== Warm median: $(( WARM_MEDIAN / 60 ))m $(( WARM_MEDIAN % 60 ))s ===="

      - name: Timing Summary
        id: timing-summary
        if: ${{ !cancelled() }}
        run: |
          CAN_RUN_TIMING="${{ steps.preflight.outputs.can-run }}"
          SKIP_REASON="${{ steps.preflight.outputs.skip-reason }}"
          COLD_MEDIAN="${{ steps.timing-cycles.outputs.cold-median }}"
          COLD_MIN="${{ steps.timing-cycles.outputs.cold-min }}"
          COLD_MAX="${{ steps.timing-cycles.outputs.cold-max }}"
          COLD_SAMPLES="${{ steps.timing-cycles.outputs.cold-samples }}"
          WARM_MEDIAN="${{ steps.timing-cycles.outputs.warm-median }}"
          WARM_MIN="${{ steps.timing-cycles.outputs.warm-min }}"
          WARM_MAX="${{ steps.timing-cycles.outputs.warm-max }}"
          WARM_SAMPLES="${{ steps.timing-cycles.outputs.warm-samples }}"
          BASELINE="${{ steps.calibration.outputs.baseline }}"

          echo "### One-Shot Timing Results (${{ inputs.cycles || 3 }} cycles)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CAN_RUN_TIMING" != "true" ]; then
            echo "| Timing status | Skipped (${SKIP_REASON}) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start |  |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start |  |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -n "$BASELINE" ]; then
            echo "| Runner Calibration (sha256 100MB) | ${BASELINE}s |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$COLD_MEDIAN" ]; then
            echo "| Cold Start (median) | $(( COLD_MEDIAN / 60 ))m $(( COLD_MEDIAN % 60 ))s (${COLD_MEDIAN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start min | $(( COLD_MIN / 60 ))m $(( COLD_MIN % 60 ))s (${COLD_MIN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start max | $(( COLD_MAX / 60 ))m $(( COLD_MAX % 60 ))s (${COLD_MAX}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start samples | ${COLD_SAMPLES} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Cold Start | Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$WARM_MEDIAN" ]; then
            echo "| Warm Start (median) | $(( WARM_MEDIAN / 60 ))m $(( WARM_MEDIAN % 60 ))s (${WARM_MEDIAN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start min | $(( WARM_MIN / 60 ))m $(( WARM_MIN % 60 ))s (${WARM_MIN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start max | $(( WARM_MAX / 60 ))m $(( WARM_MAX % 60 ))s (${WARM_MAX}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start samples | ${WARM_SAMPLES} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Warm Start | Failed or skipped |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Calculate and output improvement
          if [ -n "$COLD_MEDIAN" ] && [ -n "$WARM_MEDIAN" ]; then
            DIFF=$(( COLD_MEDIAN - WARM_MEDIAN ))
            echo "improvement-diff=${DIFF}" >> "$GITHUB_OUTPUT"

            if [ "$DIFF" -gt 0 ]; then
              echo "| Improvement (cold vs warm median) | ${DIFF}s faster on warm start |" >> "$GITHUB_STEP_SUMMARY"
              echo "improvement-direction=faster" >> "$GITHUB_OUTPUT"
            elif [ "$DIFF" -lt 0 ]; then
              DELTA=$(( -DIFF ))
              echo "| Improvement (cold vs warm median) | ${DELTA}s slower on warm start |" >> "$GITHUB_STEP_SUMMARY"
              echo "improvement-direction=slower" >> "$GITHUB_OUTPUT"
            else
              echo "| Improvement (cold vs warm median) | No difference between cold and warm start |" >> "$GITHUB_STEP_SUMMARY"
              echo "improvement-direction=same" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Configuration:** use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Export Timing Result
        id: export-result
        if: ${{ always() }}
        run: |
          RUNNER_NAME="${{ matrix.runner }}"
          SAFE_RUNNER="${RUNNER_NAME//[^a-zA-Z0-9._-]/_}"
          RESULT_DIR="/tmp/one-shot-timing-results"
          RESULT_FILE="${RESULT_DIR}/${SAFE_RUNNER}.json"
          mkdir -p "$RESULT_DIR"

          COLD_MEDIAN="${{ steps.timing-cycles.outputs.cold-median }}"
          COLD_MIN="${{ steps.timing-cycles.outputs.cold-min }}"
          COLD_MAX="${{ steps.timing-cycles.outputs.cold-max }}"
          COLD_SAMPLES="${{ steps.timing-cycles.outputs.cold-samples }}"
          WARM_MEDIAN="${{ steps.timing-cycles.outputs.warm-median }}"
          WARM_MIN="${{ steps.timing-cycles.outputs.warm-min }}"
          WARM_MAX="${{ steps.timing-cycles.outputs.warm-max }}"
          WARM_SAMPLES="${{ steps.timing-cycles.outputs.warm-samples }}"
          BASELINE="${{ steps.calibration.outputs.baseline }}"
          IMPROVEMENT_DIFF="${{ steps.timing-summary.outputs.improvement-diff }}"
          IMPROVEMENT_DIR="${{ steps.timing-summary.outputs.improvement-direction }}"
          CAN_RUN_TIMING="${{ steps.preflight.outputs.can-run }}"
          SKIP_REASON="${{ steps.preflight.outputs.skip-reason }}"
          JOB_STATUS="${{ job.status }}"
          if [ "$CAN_RUN_TIMING" != "true" ]; then
            JOB_STATUS="skipped-prereq"
          fi

          cat > "$RESULT_FILE" <<JSON
          {
            "runner": "${RUNNER_NAME}",
            "jobStatus": "${JOB_STATUS}",
            "canRunTiming": "${CAN_RUN_TIMING}",
            "skipReason": "${SKIP_REASON}",
            "coldMedian": "${COLD_MEDIAN}",
            "coldMin": "${COLD_MIN}",
            "coldMax": "${COLD_MAX}",
            "coldSamples": "${COLD_SAMPLES}",
            "warmMedian": "${WARM_MEDIAN}",
            "warmMin": "${WARM_MIN}",
            "warmMax": "${WARM_MAX}",
            "warmSamples": "${WARM_SAMPLES}",
            "baseline": "${BASELINE}",
            "improvementDiff": "${IMPROVEMENT_DIFF}",
            "improvementDirection": "${IMPROVEMENT_DIR}",
            "useReleasedSolo": "${{ inputs.use-released-solo }}",
            "useLocalBuild": "${{ inputs.use-local-build }}",
            "cycles": "${{ inputs.cycles || 3 }}"
          }
          JSON

          echo "result-file=${RESULT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload Timing Result Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: one-shot-timing-result-${{ matrix.runner }}
          path: ${{ steps.export-result.outputs.result-file }}
          if-no-files-found: warn

      - name: Collect Diagnostics on Failure
        if: ${{ failure() && steps.preflight.outputs.can-run == 'true' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD deployment diagnostics logs -q --dev || true

      - name: Upload Logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: one-shot-timing-logs-${{ matrix.runner }}
          path: ~/.solo/logs/*
          if-no-files-found: warn

      - name: Final Cleanup
        if: always()
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD one-shot falcon destroy -q || true

      - name: Stop Colima (macOS only)
        if: ${{ always() && runner.os == 'macOS' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          if command -v colima >/dev/null 2>&1; then
            colima stop || true
          fi

  aggregate-results:
    name: "Aggregate Timing Summary"
    if: ${{ always() }}
    needs: one-shot-timing
    runs-on: ubuntu-latest
    steps:
      - name: Download Timing Result Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: one-shot-timing-result-*
          path: ./timing-results
          merge-multiple: true

      - name: Build Aggregated Summary
        id: aggregate
        run: |
          RUNNERS=("hiero-solo-linux-large" "windows-latest" "macos-15-intel")
          declare -A COLD WARM BASELINE STATUS
          for r in "${RUNNERS[@]}"; do
            COLD["$r"]=""
            WARM["$r"]=""
            BASELINE["$r"]=""
            STATUS["$r"]=""
          done

          shopt -s nullglob
          for f in ./timing-results/*.json; do
            runner="$(jq -r '.runner' "$f")"
            status="$(jq -r '.jobStatus // ""' "$f")"
            STATUS["$runner"]="$status"
            if [ "$status" = "success" ]; then
              cm="$(jq -r '.coldMedian // ""' "$f")"
              wm="$(jq -r '.warmMedian // ""' "$f")"
              bl="$(jq -r '.baseline // ""' "$f")"
              if [ -n "$cm" ]; then
                COLD["$runner"]="$(( cm / 60 ))m $(( cm % 60 ))s (${cm}s)"
              fi
              if [ -n "$wm" ]; then
                WARM["$runner"]="$(( wm / 60 ))m $(( wm % 60 ))s (${wm}s)"
              fi
              if [ -n "$bl" ]; then
                BASELINE["$runner"]="${bl}s"
              fi
            fi
          done

          SUMMARY_FILE="./aggregate-summary.md"
          {
            echo "### One-Shot Timing Results (Aggregated)"
            echo ""
            echo "| Metric | hiero-solo-linux-large | ubuntu-latest | windows-latest | macos-15-intel |"
            echo "|---|---|---|---|---|"
            echo "| Cold Start (median) | ${COLD[hiero-solo-linux-large]} | ${COLD[ubuntu-latest]} | ${COLD[windows-latest]} | ${COLD[macos-15-intel]} |"
            echo "| Warm Start (median) | ${WARM[hiero-solo-linux-large]} | ${WARM[ubuntu-latest]} | ${WARM[windows-latest]} | ${WARM[macos-15-intel]} |"
            echo "| Runner Calibration | ${BASELINE[hiero-solo-linux-large]} | ${BASELINE[ubuntu-latest]} | ${BASELINE[windows-latest]} | ${BASELINE[macos-15-intel]} |"
            echo ""
            echo "| Runner | Job Status |"
            echo "|---|---|"
            for r in "${RUNNERS[@]}"; do
              status="${STATUS[$r]}"
              if [ -z "$status" ]; then
                status="missing"
              fi
              echo "| ${r} | ${status} |"
            done
            echo ""
            echo "**Configuration:** use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}, cycles=${{ inputs.cycles || 3 }}"
          } > "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

          echo "summary-file=${SUMMARY_FILE}" >> "$GITHUB_OUTPUT"
          echo "slack-table<<EOF" >> "$GITHUB_OUTPUT"
          echo "\`\`\`" >> "$GITHUB_OUTPUT"
          echo "Metric                  | hiero-solo-linux-large | ubuntu-latest | windows-latest | macos-15-intel" >> "$GITHUB_OUTPUT"
          echo "-----------------------------------------------------------------------------------------------" >> "$GITHUB_OUTPUT"
          echo "Cold Start (median)     | ${COLD[hiero-solo-linux-large]} | ${COLD[ubuntu-latest]} | ${COLD[windows-latest]} | ${COLD[macos-15-intel]}" >> "$GITHUB_OUTPUT"
          echo "Warm Start (median)     | ${WARM[hiero-solo-linux-large]} | ${WARM[ubuntu-latest]} | ${WARM[windows-latest]} | ${WARM[macos-15-intel]}" >> "$GITHUB_OUTPUT"
          echo "Runner Calibration      | ${BASELINE[hiero-solo-linux-large]} | ${BASELINE[ubuntu-latest]} | ${BASELINE[windows-latest]} | ${BASELINE[macos-15-intel]}" >> "$GITHUB_OUTPUT"
          echo "\`\`\`" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check Slack Webhook Availability
        id: slack-webhook
        run: |
          if [ -n "${SLACK_WEBHOOK:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Slack webhook not configured; skipping Slack notification."
          fi
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}

      - name: Send Aggregated Slack Notification
        if: ${{ !cancelled() && steps.slack-webhook.outputs.enabled == 'true' }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          SLACK_COLOR: ${{ contains(needs.one-shot-timing.result, 'failure') && 'danger' || 'good' }}
          SLACK_TITLE: One-Shot Timing Results (Aggregated)
          SLACK_MESSAGE: |
            ${{ steps.aggregate.outputs.slack-table }}

            *Branch:* `${{ github.ref_name }}`
            *Config:* use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}, cycles=${{ inputs.cycles || 3 }}

            :link: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>
          SLACK_FOOTER: ${{ github.workflow }}
