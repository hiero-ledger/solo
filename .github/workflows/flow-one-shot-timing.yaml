name: "One-Shot Timing Test"

on:
  workflow_dispatch:
    inputs:
      use-released-solo:
        description: "Use latest released Solo CLI (true) or build from source (false)"
        type: boolean
        required: false
        default: false
      use-local-build:
        description: "Build consensus node from source using --local-build-path"
        type: boolean
        required: false
        default: false
      consensus-node-version:
        description: "Consensus node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      block-node-version:
        description: "Block node chart version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      mirror-node-version:
        description: "Mirror node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      relay-version:
        description: "JSON RPC Relay version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      explorer-version:
        description: "Explorer version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  longevity-tests-start:
    name: Start
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}

      - name: Install KubeCtl
        uses: step-security/setup-kubectl@2edbf6aff97d814e9dc52827498ac51fe972e6d0 # v4.0.0
        with:
          version: v1.32.5

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.39.2

      - name: Install Helm
        shell: bash
        run: |
          set -euo pipefail
          HELM_VERSION="v4.1.1"
          ARCHIVE="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL -o "${ARCHIVE}" \
            "https://get.helm.sh/${ARCHIVE}"
          tar xfz "${ARCHIVE}"
          sudo install -m 0755 linux-amd64/helm /usr/bin/helm
          which helm
          helm version


      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # Set up kind; needed for configuring the solo environment
      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Install Solo
        run: |
          npm install -g "@hashgraph/solo@${{ inputs.solo-version || 'latest' }}"

          # verify the installation
          solo --version

      - name: Start CNs
        run: |
          export SOLO_CLUSTER_NAME=solo
          export SOLO_NAMESPACE=solo
          export SOLO_CLUSTER_SETUP_NAMESPACE=solo-cluster
          export SOLO_DEPLOYMENT=solo-deployment
          export NODE_ALIASES="node1,node2"
          export SOLO_LOG_LEVEL=debug

          kind create cluster -n "${SOLO_CLUSTER_NAME}"
          solo init
          solo cluster-ref config connect --cluster-ref kind-${SOLO_CLUSTER_NAME} --context kind-${SOLO_CLUSTER_NAME}
          solo deployment config create -n "${SOLO_NAMESPACE}" --deployment "${SOLO_DEPLOYMENT}"
          solo deployment cluster attach --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-${SOLO_CLUSTER_NAME} --num-consensus-nodes 2
          solo cluster-ref config setup -s "${SOLO_CLUSTER_SETUP_NAMESPACE}"
          solo block node add --deployment "${SOLO_DEPLOYMENT}"
          solo keys consensus generate --gossip-keys --tls-keys --deployment "${SOLO_DEPLOYMENT}" -i "${NODE_ALIASES}"
          solo consensus network deploy --deployment "${SOLO_DEPLOYMENT}" -i "${NODE_ALIASES}"
          solo consensus node setup --deployment "${SOLO_DEPLOYMENT}" -i "${NODE_ALIASES}"
          solo consensus node start --deployment "${SOLO_DEPLOYMENT}" -i "${NODE_ALIASES}"

      - name: Upload Logs to GitHub
        if: ${{ !cancelled() && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-logs
          path: ~/.solo/logs/*
          if-no-files-found: error
