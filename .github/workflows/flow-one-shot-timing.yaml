name: "One-Shot Timing Test"

on:
  workflow_dispatch:
    inputs:
      use-released-solo:
        description: "Use latest released Solo CLI (true) or build from source (false)"
        type: boolean
        required: false
        default: false
      use-local-build:
        description: "Build consensus node from source using --local-build-path"
        type: boolean
        required: false
        default: false
      consensus-node-version:
        description: "Consensus node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      block-node-version:
        description: "Block node chart version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      mirror-node-version:
        description: "Mirror node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      relay-version:
        description: "JSON RPC Relay version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      explorer-version:
        description: "Explorer version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      iterations:
        description: "Number of cold+warm iterations to run (median is reported)"
        type: string
        required: false
        default: "3"

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  one-shot-timing:
    timeout-minutes: 360
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Posix Dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          # Configure APT to use main Ubuntu archive (disable mirror rotation)
          sudo sed -i 's|http://[a-z.]*.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list
          # Install jq (a lightweight and flexible command-line JSON processor)
          sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Solo CLI (released)
        if: ${{ inputs.use-released-solo == true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: npm i @hashgraph/solo@latest

      - name: Compile Project (from source)
        if: ${{ inputs.use-released-solo != true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Set Solo Command
        id: solo-cmd
        run: |
          if [ "${{ inputs.use-released-solo }}" = "true" ]; then
            echo "cmd=npx @hashgraph/solo" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=npm run solo --" >> "$GITHUB_OUTPUT"
          fi

      - name: Solo Init
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          ${{ steps.solo-cmd.outputs.cmd }} init --dev
          export PATH=~/.solo/bin:${PATH}

      - name: Resolve Versions
        id: versions
        run: |
          # Read defaults from version.ts and allow input overrides
          DEFAULT_CN=$(awk -F"'" '/^export const HEDERA_PLATFORM_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_BN=$(awk -F"'" '/^export const BLOCK_NODE_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_MN=$(awk -F"'" '/^export const MIRROR_NODE_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_RELAY=$(awk -F"'" '/^export const HEDERA_JSON_RPC_RELAY_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_EXPLORER=$(awk -F"'" '/^export const EXPLORER_VERSION/ {print $(NF-1); exit}' version.ts)

          CN_VERSION="${{ inputs.consensus-node-version }}"
          BN_VERSION="${{ inputs.block-node-version }}"
          MN_VERSION="${{ inputs.mirror-node-version }}"
          RELAY_VERSION="${{ inputs.relay-version }}"
          EXPLORER_VERSION="${{ inputs.explorer-version }}"

          echo "cn-version=${CN_VERSION:-$DEFAULT_CN}" >> "$GITHUB_OUTPUT"
          echo "bn-version=${BN_VERSION:-$DEFAULT_BN}" >> "$GITHUB_OUTPUT"
          echo "mn-version=${MN_VERSION:-$DEFAULT_MN}" >> "$GITHUB_OUTPUT"
          echo "relay-version=${RELAY_VERSION:-$DEFAULT_RELAY}" >> "$GITHUB_OUTPUT"
          echo "explorer-version=${EXPLORER_VERSION:-$DEFAULT_EXPLORER}" >> "$GITHUB_OUTPUT"

          echo "### Resolved Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consensus Node | ${CN_VERSION:-$DEFAULT_CN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Block Node | ${BN_VERSION:-$DEFAULT_BN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mirror Node | ${MN_VERSION:-$DEFAULT_MN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Relay | ${RELAY_VERSION:-$DEFAULT_RELAY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Explorer | ${EXPLORER_VERSION:-$DEFAULT_EXPLORER} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java and Gradle (for local build)
        if: ${{ inputs.use-local-build == true }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Checkout and Build Consensus Node (local build)
        if: ${{ inputs.use-local-build == true }}
        timeout-minutes: 30
        run: |
          CN_VERSION="${{ steps.versions.outputs.cn-version }}"
          echo "Building consensus node at version: $CN_VERSION"

          CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"

          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "$CN_VERSION" "$CN_REPO_DIR" 2>/dev/null || \
          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "refs/tags/$CN_VERSION" "$CN_REPO_DIR"

          cd "$CN_REPO_DIR"
          LOG_FILE="/tmp/consensus-node-build.log"
          ./gradlew assemble --stacktrace --info > "$LOG_FILE" 2>&1 || {
            echo "Build failed. Last 100 lines:"
            tail -100 "$LOG_FILE"
            exit 1
          }
          echo "Consensus node build complete."

      - name: Generate Values File
        id: values-file
        run: |
          VALUES_FILE="/tmp/one-shot-timing-values.yaml"
          {
            echo "network:"
            echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
            echo "  --tss: \"true\""
            echo ""
            if [ "${{ inputs.use-local-build }}" = "true" ]; then
              CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"
              echo "setup:"
              echo "  --local-build-path: \"${CN_REPO_DIR}/hedera-node/data\""
              echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
              echo ""
            fi
            echo "blockNode:"
            echo "  --chart-version: \"${{ steps.versions.outputs.bn-version }}\""
            echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
            echo ""
            echo "mirrorNode:"
            echo "  --mirror-node-version: \"${{ steps.versions.outputs.mn-version }}\""
            echo ""
            echo "relayNode:"
            echo "  --relay-release: \"${{ steps.versions.outputs.relay-version }}\""
            echo ""
            echo "explorerNode:"
            echo "  --explorer-version: \"${{ steps.versions.outputs.explorer-version }}\""
          } > "$VALUES_FILE"
          echo "Generated values file:"
          cat "$VALUES_FILE"
          echo "path=$VALUES_FILE" >> "$GITHUB_OUTPUT"

      - name: Start Resource Monitoring
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          # 10s interval: cold/warm deploys are ~90-150s so 30s is too coarse
          ./.github/workflows/script/monitor-resources.sh start 10

      - name: Run Iterations
        id: iterations
        timeout-minutes: 300
        run: |
          set -eo pipefail
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          VALUES_FILE="${{ steps.values-file.outputs.path }}"
          N="${{ inputs.iterations }}"

          RESULTS_DIR="$HOME/.solo/logs/iterations"
          mkdir -p "$RESULTS_DIR"
          COLD_CSV="$RESULTS_DIR/cold.csv"
          WARM_CSV="$RESULTS_DIR/warm.csv"

          fmt_duration() { local s=$1; echo "$(( s / 60 ))m $(( s % 60 ))s (${s}s)"; }

          for i in $(seq 1 "$N"); do
            echo "==============================="
            echo "=== Iteration ${i} / ${N}    ==="
            echo "==============================="

            # --- Cold Start ---
            echo ">>> Cold Start #${i}"
            COLD_T0=$SECONDS
            $SOLO_CMD one-shot falcon deploy --values-file "$VALUES_FILE"
            COLD_ELAPSED=$(( SECONDS - COLD_T0 ))
            echo "Cold #${i}: $(fmt_duration "$COLD_ELAPSED")"

            # Install metrics-server on the fresh cluster and wait until serving
            ./.github/workflows/script/install-metrics-server.sh

            # Capture pod memory: 3 samples × 5s (15s total at steady state)
            COLD_MEM=$(./.github/workflows/script/capture-pod-memory-mb.sh 3 5)
            echo "Cold #${i}: pod_mem=${COLD_MEM}MB"
            echo "${COLD_ELAPSED},${COLD_MEM}" >> "$COLD_CSV"

            # Destroy deployment (keeps cluster + metrics-server for warm start)
            $SOLO_CMD one-shot falcon destroy

            # --- Warm Start ---
            echo ">>> Warm Start #${i}"
            WARM_T0=$SECONDS
            $SOLO_CMD one-shot falcon deploy --values-file "$VALUES_FILE"
            WARM_ELAPSED=$(( SECONDS - WARM_T0 ))
            echo "Warm #${i}: $(fmt_duration "$WARM_ELAPSED")"

            # Metrics-server still running from cold start; capture immediately
            WARM_MEM=$(./.github/workflows/script/capture-pod-memory-mb.sh 3 5)
            echo "Warm #${i}: pod_mem=${WARM_MEM}MB"
            echo "${WARM_ELAPSED},${WARM_MEM}" >> "$WARM_CSV"

            # Inject a point-in-time pod snapshot into the monitoring JSONL files.
            # The background monitor may miss the live-pods window (it polls every 10s
            # but deploy+teardown is short); this guarantees the plot script has real
            # per-pod data for the category chart and Slack notification.
            ./.github/workflows/script/inject-pod-snapshot.sh || true

            # Full reset for next cold start: destroy app then delete kind cluster
            $SOLO_CMD one-shot falcon destroy || true
            for cluster in $(kind get clusters 2>/dev/null); do
              kind delete cluster --name "$cluster" 2>/dev/null || true
            done
          done

          # Compute medians using per-column sort
          COLD_TIME_MED=$(cut -d, -f1 "$COLD_CSV" | ./.github/workflows/script/compute-median.sh)
          COLD_MEM_MED=$(cut -d, -f2 "$COLD_CSV" | ./.github/workflows/script/compute-median.sh)
          WARM_TIME_MED=$(cut -d, -f1 "$WARM_CSV" | ./.github/workflows/script/compute-median.sh)
          WARM_MEM_MED=$(cut -d, -f2 "$WARM_CSV" | ./.github/workflows/script/compute-median.sh)

          echo "cold-time-median=${COLD_TIME_MED}" >> "$GITHUB_OUTPUT"
          echo "cold-mem-median=${COLD_MEM_MED}"   >> "$GITHUB_OUTPUT"
          echo "warm-time-median=${WARM_TIME_MED}" >> "$GITHUB_OUTPUT"
          echo "warm-mem-median=${WARM_MEM_MED}"   >> "$GITHUB_OUTPUT"
          echo "results-dir=${RESULTS_DIR}"         >> "$GITHUB_OUTPUT"

      - name: Stop Resource Monitoring
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          ./.github/workflows/script/monitor-resources.sh stop || true

      - name: Generate ASCII Resource Chart
        id: generate-chart
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          METRICS_FILE="$HOME/.solo/logs/runner-metrics.jsonl"
          CHART_FILE="$HOME/.solo/logs/runner-metrics-ascii.txt"

          DATA_POINTS=$(wc -l < "$METRICS_FILE" 2>/dev/null | tr -d ' ' || echo "0")
          if [[ -f "$METRICS_FILE" && "$DATA_POINTS" -gt 0 ]]; then
            echo "Generating ASCII chart from ${DATA_POINTS} data points..."
            ./.github/workflows/script/plot-runner-metrics-ascii.sh "$METRICS_FILE" "$CHART_FILE"

            if [[ -f "$CHART_FILE" && -s "$CHART_FILE" ]]; then
              echo "chart_generated=true" >> $GITHUB_OUTPUT
              echo "chart_file=$CHART_FILE" >> $GITHUB_OUTPUT
              MERMAID_FILE="${CHART_FILE%.txt}-mermaid.md"
              CATEGORIES_FILE="${CHART_FILE%.txt}-categories.txt"
              [[ -f "$MERMAID_FILE" ]]    && echo "mermaid_file=$MERMAID_FILE"       >> $GITHUB_OUTPUT
              [[ -f "$CATEGORIES_FILE" ]] && echo "categories_file=$CATEGORIES_FILE" >> $GITHUB_OUTPUT
              echo "✅ ASCII chart generated successfully"
            else
              echo "chart_generated=false" >> $GITHUB_OUTPUT
              echo "⚠️  ASCII chart generation produced no output"
            fi
          else
            echo "chart_generated=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No metrics data collected (${DATA_POINTS} data points), skipping chart generation"
          fi

      - name: Write Runner Resource Usage to Workflow Summary
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          echo "## Runner Resource Usage — One-Shot Timing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.generate-chart.outputs.chart_generated }}" == "true" ]]; then
            CHART_FILE="${{ steps.generate-chart.outputs.chart_file }}"
            if [[ -f "$CHART_FILE" ]]; then
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat "$CHART_FILE" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
            MERMAID_FILE="${{ steps.generate-chart.outputs.mermaid_file }}"
            if [[ -n "$MERMAID_FILE" && -f "$MERMAID_FILE" ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Pod Memory Distribution by Category" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              cat "$MERMAID_FILE" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_No resource metrics collected._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Read Pod Memory Category Table
        id: pod-categories
        if: ${{ !cancelled() && steps.generate-chart.outputs.categories_file != '' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          CATEGORIES_FILE="${{ steps.generate-chart.outputs.categories_file }}"
          if [[ -f "$CATEGORIES_FILE" ]]; then
            {
              echo "content<<EOF_CATEGORIES"
              cat "$CATEGORIES_FILE"
              echo "EOF_CATEGORIES"
            } >> $GITHUB_OUTPUT
          fi

      - name: Post Pod Memory Categories to Slack
        if: ${{ !cancelled() && steps.pod-categories.outputs.content != '' }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          SLACK_MSG_AUTHOR: Release Engineering
          SLACK_COLOR: good
          SLACK_TITLE: "One-Shot Timing — Pod Memory by Category"
          SLACK_MESSAGE: |
            *Branch:* `${{ github.ref_name }}`  *Commit:* `${{ github.sha }}`

            ```
            ${{ steps.pod-categories.outputs.content }}
            ```

            :link: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>
          SLACK_FOOTER: ${{ github.workflow }}

      - name: Timing Summary
        if: ${{ !cancelled() }}
        run: |
          N="${{ inputs.iterations }}"
          COLD_TIME="${{ steps.iterations.outputs.cold-time-median }}"
          WARM_TIME="${{ steps.iterations.outputs.warm-time-median }}"
          COLD_MEM="${{ steps.iterations.outputs.cold-mem-median }}"
          WARM_MEM="${{ steps.iterations.outputs.warm-mem-median }}"
          RESULTS_DIR="${{ steps.iterations.outputs.results-dir }}"

          fmt() { local s=$1; echo "$(( s / 60 ))m $(( s % 60 ))s (${s}s)"; }

          {
            echo "### One-Shot Timing Results (N=${N} iterations, median)"
            echo ""

            # Per-iteration detail table (reads cold.csv + warm.csv line by line)
            if [[ -f "${RESULTS_DIR}/cold.csv" && -f "${RESULTS_DIR}/warm.csv" ]]; then
              echo "| # | Cold Time | Cold Mem (MB) | Warm Time | Warm Mem (MB) |"
              echo "|---|-----------|---------------|-----------|---------------|"
              mapfile -t cold_rows < "${RESULTS_DIR}/cold.csv"
              mapfile -t warm_rows < "${RESULTS_DIR}/warm.csv"
              for idx in "${!cold_rows[@]}"; do
                IFS=, read -r ct cm <<< "${cold_rows[$idx]}"
                IFS=, read -r wt wm <<< "${warm_rows[$idx]:-0,0}"
                printf "| %d | %dm %02ds | %s | %dm %02ds | %s |\n" \
                  "$(( idx + 1 ))" "$(( ct / 60 ))" "$(( ct % 60 ))" "${cm:-0}" \
                  "$(( wt / 60 ))" "$(( wt % 60 ))" "${wm:-0}"
              done
              echo ""
            fi

            echo "| Metric | Median |"
            echo "|--------|--------|"
            if [[ -n "$COLD_TIME" ]]; then
              echo "| Cold Start Time     | $(fmt "$COLD_TIME") |"
            else
              echo "| Cold Start Time     | N/A |"
            fi
            echo "| Cold Start Pod Memory | ${COLD_MEM:-N/A} MB |"
            if [[ -n "$WARM_TIME" ]]; then
              echo "| Warm Start Time     | $(fmt "$WARM_TIME") |"
            else
              echo "| Warm Start Time     | N/A |"
            fi
            echo "| Warm Start Pod Memory | ${WARM_MEM:-N/A} MB |"
            if [[ -n "$COLD_TIME" && -n "$WARM_TIME" ]]; then
              DIFF=$(( COLD_TIME - WARM_TIME ))
              if   [[ "$DIFF" -gt 0 ]]; then echo "| Improvement | ${DIFF}s faster on warm start |"
              elif [[ "$DIFF" -lt 0 ]]; then echo "| Improvement | $(( -DIFF ))s slower on warm start |"
              else                            echo "| Improvement | No difference |"
              fi
            fi
            echo ""
            echo "**Configuration:** use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}, iterations=${N}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD deployment diagnostics logs -q --dev || true

      - name: Upload Logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: one-shot-timing-logs
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn

      - name: Final Cleanup
        if: always()
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD one-shot falcon destroy -q || true
