name: "Standard Runner One-Shot Deploy and Destroy"
# The purpose of this workflow is to verify that Solo can successfully deploy a network
# using the one-shot single deploy command on a standard GitHub-hosted ubuntu runner.
# This acts as a compatibility gate: if Solo stops working on standard runners, this job fails.
#
# It runs two install modes as a matrix:
#
#   1. source — build from source in the checkout and run `npm run solo --` from the repo root,
#      matching the developer workflow. Runs on ubuntu-latest (standard GitHub-hosted runner).
#   2. global-package — reproduce a first-time user experience with the published package.
#      Runs on hiero-solo-linux-large:
#      - Faithful package: the tarball is built with the same release packaging code that produces
#        the published artifact (`scripts/Taskfile.release.yml` dual-publish tasks), so
#        `npm install -g` installs `@hiero-ledger/solo` under its real published name, exercising
#        the path a first-time user hits (packaging, bin, postinstall).
#      - Separate directory: every `solo` command runs from a directory outside the checkout,
#        surfacing any code that resolves bundled resources relative to the current working
#        directory instead of the package.
#      - No cached images: SOLO_NO_CACHE skips the postinstall image-cache pull and
#        ENABLE_IMAGE_CACHE forces the deploy to pull images fresh.
#      The ephemeral GitHub-hosted runner guarantees no prior Solo install and no ~/.solo state;
#      an assertion step proves it before installing.
#
# Note: postinstall only pre-pulls container images; the ~/.solo/bin toolchain (helm/kind/kubectl)
# is downloaded lazily at runtime on first use.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  standard-runner-one-shot:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - install-mode: source
            name: Standard Runner Deploy and Destroy
            runner: ubuntu-latest
          - install-mode: global-package
            name: Clean Environment Deploy and Destroy
            runner: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: npm

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Project
        if: ${{ matrix.install-mode == 'source' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Restore Solo Image Cache
        # source mode only: restoring the image cache populates ~/.solo/cache/images, which would
        # both create ~/.solo (failing the global-package "Assert Clean Environment" step) and
        # defeat that mode's no-cached-images purpose.
        id: solo-image-cache
        if: ${{ matrix.install-mode == 'source' && !cancelled() && !failure() }}
        uses: ./.github/actions/solo-image-cache
        with:
          operation: restore
          key-suffix: ${{ hashFiles('version.ts', 'version-test.ts', 'resources/config/solo-cache-images-target.yaml') }}

      - name: Assert Clean Environment
        # Demonstrable proof that no Solo-managed state exists before we install. Only Solo state is
        # asserted: the GitHub runner image ships helm/kind/kubectl preinstalled, which is realistic
        # for a first-time user and irrelevant since Solo installs its own copies into ~/.solo/bin.
        if: ${{ matrix.install-mode == 'global-package' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          status=0
          if command -v solo >/dev/null 2>&1; then
            echo "NOT CLEAN: 'solo' is present on PATH at $(command -v solo)"
            status=1
          else
            echo "clean: 'solo' is absent from PATH"
          fi

          if [ -e ~/.solo ]; then
            echo "NOT CLEAN: ~/.solo exists (residual toolchain, cache, or state)"
            status=1
          else
            echo "clean: ~/.solo does not exist"
          fi

          if [ "${status}" -ne 0 ]; then
            echo "ERROR: environment is not clean; see the failures above."
            exit 1
          fi
          echo "Environment is clean."

      - name: Pack Solo as the Published Package
        # Use the same release packaging code that produces the published artifact, renaming to the
        # @hiero-ledger/solo namespace so `npm install -g` emulates a real user install. `dual-publish:pack`
        # runs npm install + task build + npm pack; the build runs after the rename, so dist/package.json
        # is renamed too, matching the real artifact. `dual-publish:restore` runs `git restore .`.
        if: ${{ matrix.install-mode == 'global-package' }}
        timeout-minutes: 10
        run: |
          task -t scripts/Taskfile.release.yml dual-publish:rename
          task -t scripts/Taskfile.release.yml dual-publish:pack OUTPUT_DIR=output/hl
          task -t scripts/Taskfile.release.yml dual-publish:restore

      - name: Globally Install Solo
        # SOLO_NO_CACHE skips the postinstall image-cache population so no images are cached before deploy.
        if: ${{ matrix.install-mode == 'global-package' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          SOLO_NO_CACHE: 'true'
        run: |
          npm install -g ./output/hl/hiero-ledger-solo-*.tgz
          echo "Installed Solo version:"
          solo --version

      - name: Set Solo Command
        # global-package mode runs the globally installed `solo` from a directory outside the
        # checkout to surface any code that resolves bundled resources relative to the current
        # working directory; source mode runs `npm run solo --` from the repo root.
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          if [ "${{ matrix.install-mode }}" = "global-package" ]; then
            run_directory="${{ runner.temp }}/solo-clean-run"
            mkdir -p "${run_directory}"
            echo "SOLO_COMMAND=solo" >> "$GITHUB_ENV"
            echo "SOLO_RUN_DIR=${run_directory}" >> "$GITHUB_ENV"
          else
            echo "SOLO_COMMAND=npm run solo --" >> "$GITHUB_ENV"
            echo "SOLO_RUN_DIR=${{ github.workspace }}" >> "$GITHUB_ENV"
          fi

      - name: One-Shot Single Deploy
        timeout-minutes: 70
        env:
          ENABLE_IMAGE_CACHE: 'false'
        run: |
          cd "${SOLO_RUN_DIR}"
          export PATH=~/.solo/bin:${PATH}
          ${SOLO_COMMAND} one-shot single deploy --dev

      - name: Check Port Forwarding Still Works After Deploy
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cd "${SOLO_RUN_DIR}"
          export PATH=~/.solo/bin:${PATH}
          ${SOLO_COMMAND} deployment diagnostics connections -d one-shot --check

      - name: Verify Mirror REST API
        timeout-minutes: 10
        run: |
          echo "Checking mirror node REST API at http://localhost:38081/api/v1/accounts ..."
          for i in $(seq 1 30); do
            response=$(curl -sf http://localhost:38081/api/v1/accounts 2>/dev/null || true)
            if echo "${response}" | grep -q '"accounts"'; then
              echo "Mirror REST API is up and returned accounts."
              exit 0
            fi
            echo "Attempt ${i}/30: not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Mirror REST API did not become available after 5 minutes."
          exit 1

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cd "${SOLO_RUN_DIR}"
          export PATH=~/.solo/bin:${PATH}
          ${SOLO_COMMAND} deployment diagnostics logs -q --dev || true

      - name: One-Shot Single Destroy
        if: always()
        timeout-minutes: 15
        run: |
          cd "${SOLO_RUN_DIR}"
          export PATH=~/.solo/bin:${PATH}
          ${SOLO_COMMAND} one-shot single destroy --quiet-mode --dev || true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: standard-runner-one-shot-logs-${{ matrix.install-mode }}
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn
