name: "Standard Runner One-Shot Deploy and Destroy"
# The purpose of this workflow is to verify that Solo can successfully deploy a network
# using the one-shot single deploy command on a standard GitHub-hosted ubuntu runner.
# This acts as a compatibility gate: if Solo stops working on standard runners, this job fails.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  standard-runner-one-shot:
    name: Standard Runner Deploy and Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: npm

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Project
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Restore Solo Image Cache
        id: solo-image-cache
        if: ${{ !cancelled() && !failure() }}
        uses: ./.github/actions/solo-image-cache
        with:
          operation: restore
          key-suffix: ${{ hashFiles('version.ts', 'version-test.ts', 'resources/config/solo-cache-images-target.yaml') }}

      - name: One-Shot Single Deploy
        timeout-minutes: 70
        env:
          ENABLE_IMAGE_CACHE: 'false'
        run: |
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- one-shot single deploy --dev

      - name: Check Port Forwarding Still Works After Deploy
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- deployment diagnostics connections -d one-shot --check

      - name: Verify Mirror REST API
        timeout-minutes: 10
        run: |
          echo "Checking mirror node REST API at http://localhost:38081/api/v1/accounts ..."
          for i in $(seq 1 30); do
            response=$(curl -sf http://localhost:38081/api/v1/accounts 2>/dev/null || true)
            if echo "${response}" | grep -q '"accounts"'; then
              echo "Mirror REST API is up and returned accounts."
              exit 0
            fi
            echo "Attempt ${i}/30: not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Mirror REST API did not become available after 5 minutes."
          exit 1

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- deployment diagnostics logs -q --dev || true

      - name: One-Shot Single Destroy
        if: always()
        timeout-minutes: 15
        run: |
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- one-shot single destroy --quiet-mode --dev || true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: standard-runner-one-shot-logs
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn
