# Night test checks some non critical functions or features not captured by PR tests
# or Example tests, such as JVM Debugger

name: "Nightly Extended Tests"

on:
  schedule:
    # Run every midnight US Central Time (6 AM UTC during DST, 7 AM UTC during standard time)
    # Using 6 AM UTC to cover Central Daylight Time
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  prepare-setup:
    name: Prepare Setup
    runs-on: hiero-solo-linux-medium
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: ${{ inputs.node-version || '22' }}
          cache: npm

      - name: Configure npm registry
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install Dependencies
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

  jvm-debugger-test:
    name: JVM Debugger Test
    runs-on: hiero-solo-linux-large
    needs:
      - prepare-setup
    timeout-minutes: 60
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: ${{ inputs.node-version || '22' }}
          cache: npm

      - name: Configure npm registry
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install Dependencies
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install expect
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          if ! command -v expect &>/dev/null; then
            sudo apt-get update -y && sudo apt-get install -y expect
          fi

      - name: Run JVM Debugger Test
        timeout-minutes: 50
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          chmod +x .github/workflows/script/test-jvm-debugger.sh
          .github/workflows/script/test-jvm-debugger.sh

      - name: Cleanup Kind Clusters
        if: ${{ always() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          for cluster in $(kind get clusters 2>/dev/null); do
            kind delete cluster -n "$cluster" || true
          done
          rm -rf ~/.solo

      - name: Send Slack Notification on Failure
        if: ${{ github.ref == 'refs/heads/main' && !cancelled() && failure() }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: Nightly JVM Debugger Test Failed
          SLACK_MESSAGE: |
            *Branch:* `${{ github.ref_name }}`
            *Commit:* ${{ github.sha }}

            :link: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Job Logs>
          SLACK_FOOTER: ${{ github.workflow }}

      - name: Upload Logs to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-logs-jvm-debugger
          path: |
            ~/.solo/logs/*
            /tmp/solo-node-start.log
            /tmp/solo-jdwp-probe.log
          if-no-files-found: ignore
