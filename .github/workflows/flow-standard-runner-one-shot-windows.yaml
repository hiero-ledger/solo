name: "Standard Runner One-Shot Deploy (Windows)"
# Compatibility gate: verifies that Solo one-shot deploy continues to work on native Windows.
# Solo runs natively in PowerShell on a standard GitHub-hosted Windows runner.
# Docker runs inside WSL2 (replicating how Docker Desktop works for Windows users) and is
# exposed to Windows via DOCKER_HOST=tcp://localhost:2375.
# Any PR that breaks Solo on Windows will cause this workflow to fail.

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: standard-runner-one-shot-windows-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  STEP_TIMEOUT_MINUTES: '5'
  DOCKER_HOST: tcp://localhost:2375

jobs:
  standard-runner-one-shot-windows:
    name: Standard Runner One-Shot Deploy (Windows)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup WSL2
        # Kind requires Linux containers. GitHub's windows-latest runner has Docker in Windows
        # container mode with no Docker Desktop to switch it. WSL2 + Docker inside it replicates
        # what Docker Desktop does for Windows users, exposing a Linux daemon via TCP.
        uses: Vampire/setup-wsl@6a8db447be7ed35f2f499c02c6e60ff77ef11278 # v6.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          use-cache: false
          set-as-default: true
          additional-packages: >-
            apt-transport-https
            ca-certificates
            curl
            software-properties-common

      - name: Restart WSL
        run: wsl --shutdown
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Install Docker in WSL2
        shell: wsl-bash {0}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          set -euo pipefail
          sudo -n -E -- mkdir -p /etc/apt/keyrings
          sudo -n -E -- cp .github/workflows/resources/docker-apt-public-gpg-key.key /etc/apt/keyrings/docker.asc
          sudo -n -E -- chmod 644 /etc/apt/keyrings/docker.asc
          sudo -n -E -- bash -c 'echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] \
            https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list'
          sudo -n -E -- apt-get update -q
          sudo -n -E -- apt-get -y install \
            docker-ce docker-ce-cli containerd.io \
            docker-compose-plugin docker-buildx-plugin
          sudo -n -E -- systemctl enable --now docker.service
          sudo -n -E -- bash -c 'echo "{\"hosts\": [\"unix:///var/run/docker.sock\", \"tcp://0.0.0.0:2375\"]}" \
            > /etc/docker/daemon.json'
          sudo -n -E -- systemctl daemon-reload
          sleep 5
          sudo -n -E -- systemctl restart docker.service
          sleep 10
          sudo -n -E -- docker info

      - name: Install Dependencies
        shell: pwsh
        timeout-minutes: 15
        run: npm ci

      - name: Compile Project
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          npx tsc
          node resources/post-build-script.js

      - name: Solo Init
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- init --dev

      - name: One-Shot Single Deploy
        shell: pwsh
        timeout-minutes: 70
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- one-shot single deploy

      - name: Verify Mirror REST API
        shell: pwsh
        timeout-minutes: 10
        run: |
          Write-Host "Checking mirror node REST API at http://localhost:38081/api/v1/accounts ..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://localhost:38081/api/v1/accounts" -ErrorAction Stop
              if ($response.accounts) {
                Write-Host "Mirror REST API is up and returned accounts."
                Write-Host ($response | ConvertTo-Json -Depth 5)
                exit 0
              }
            } catch {
              # not ready yet
            }
            Write-Host "Attempt $i/30: not ready yet, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          Write-Error "ERROR: Mirror REST API did not become available after 5 minutes."
          exit 1

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- deployment diagnostics logs -q --dev; $true

      - name: One-Shot Single Destroy
        if: always()
        shell: pwsh
        timeout-minutes: 15
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- one-shot single destroy --quiet-mode; $true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: standard-runner-one-shot-windows-logs
          path: ${{ env.USERPROFILE }}\.solo\logs
          overwrite: true
          if-no-files-found: warn
