name: "Standard Runner One-Shot Deploy (Windows)"
# The purpose of this workflow is to verify that Solo can successfully deploy a network
# using the one-shot single deploy command on a standard GitHub-hosted Windows runner via WSL2.
# Solo on Windows requires WSL2 (Ubuntu) as documented. This workflow mirrors that setup.
# This acts as a compatibility gate: if Solo stops working on Windows standard runners, this job fails.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: standard-runner-one-shot-windows-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  standard-runner-one-shot-windows:
    name: Standard Runner One-Shot Deploy (Windows)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup WSL2 (Ubuntu)
        uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-22.04
          additional-packages: curl git

      - name: Install Node.js 22 in WSL2
        shell: wsl-bash {0}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          set -euo pipefail
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version

      - name: Install Task in WSL2
        shell: wsl-bash {0}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          set -euo pipefail
          sudo sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task --version

      - name: Install Dependencies
        shell: wsl-bash {0}
        timeout-minutes: 10
        run: |
          set -euo pipefail
          cd "$(wslpath "$GITHUB_WORKSPACE")"
          npm ci

      - name: Compile Project
        shell: wsl-bash {0}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          set -euo pipefail
          cd "$(wslpath "$GITHUB_WORKSPACE")"
          task build:compile

      - name: One-Shot Single Deploy
        shell: wsl-bash {0}
        timeout-minutes: 70
        run: |
          set -euo pipefail
          cd "$(wslpath "$GITHUB_WORKSPACE")"
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- one-shot single deploy

      - name: Verify Mirror REST API
        shell: wsl-bash {0}
        timeout-minutes: 10
        run: |
          echo "Checking mirror node REST API at http://localhost:38081/api/v1/accounts ..."
          for i in $(seq 1 30); do
            response=$(curl -sf http://localhost:38081/api/v1/accounts 2>/dev/null || true)
            if echo "${response}" | grep -q '"accounts"'; then
              echo "Mirror REST API is up and returned accounts."
              exit 0
            fi
            echo "Attempt ${i}/30: not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Mirror REST API did not become available after 5 minutes."
          exit 1

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        shell: wsl-bash {0}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cd "$(wslpath "$GITHUB_WORKSPACE")"
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- deployment diagnostics logs -q --dev || true

      - name: One-Shot Single Destroy
        if: always()
        shell: wsl-bash {0}
        timeout-minutes: 15
        run: |
          cd "$(wslpath "$GITHUB_WORKSPACE")"
          export PATH=~/.solo/bin:${PATH}
          npm run solo -- one-shot single destroy --quiet-mode || true

      - name: Copy Logs to Windows Workspace
        if: always()
        shell: wsl-bash {0}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          mkdir -p "$(wslpath "$GITHUB_WORKSPACE")/solo-logs"
          cp -r ~/.solo/logs/. "$(wslpath "$GITHUB_WORKSPACE")/solo-logs/" || true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: standard-runner-one-shot-windows-logs
          path: ${{ github.workspace }}/solo-logs/*
          overwrite: true
          if-no-files-found: warn
