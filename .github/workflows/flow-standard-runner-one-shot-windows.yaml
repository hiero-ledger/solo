name: "Standard Runner One-Shot Deploy (Windows)"
# Compatibility gate: verifies that Solo one-shot deploy continues to work on native Windows.
# Solo runs natively in PowerShell on a standard GitHub-hosted Windows runner.
# Docker runs inside WSL2 (replicating how Docker Desktop works for Windows users) and is
# exposed to Windows via DOCKER_HOST=tcp://localhost:2375.
# Any PR that breaks Solo on Windows will cause this workflow to fail.

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: standard-runner-one-shot-windows-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  STEP_TIMEOUT_MINUTES: '5'
  DOCKER_HOST: tcp://localhost:2375

jobs:
  standard-runner-one-shot-windows:
    name: Standard Runner One-Shot Deploy (Windows)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Windows Diagnostics
        shell: pwsh
        timeout-minutes: 5
        run: |
          Write-Host "Windows Version:"
          winver
          Write-Host "System Information:"
          systeminfo
          Write-Host "Environment Variables:"
          Write-Host "HOME: $env:HOME"
          Write-Host "USERPROFILE: $env:USERPROFILE"
          Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
          Write-Host "Current Working Directory: $(Get-Location)"

      - name: Exclude Directory from Antivirus Scanning
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          # Exclude the project directory from Windows Defender Antivirus scanning to improve performance.
          # This is especially important for Docker in WSL2, which accesses the project files via a bind mount.
          $projectPath = "$env:GITHUB_WORKSPACE"
          Write-Host "Excluding $projectPath from antivirus scanning"
          Add-MpPreference -ExclusionPath $projectPath

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: '22'

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        shell: pwsh
        timeout-minutes: 15
        run: npm ci

      - name: Compile Project
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          task build:compile

      - name: Setup WSL2
        # Kind requires Linux containers. GitHub's windows-latest runner has Docker in Windows
        # container mode with no Docker Desktop to switch it. WSL2 + Docker inside it replicates
        # what Docker Desktop does for Windows users, exposing a Linux daemon via TCP.
        uses: Vampire/setup-wsl@6a8db447be7ed35f2f499c02c6e60ff77ef11278 # v6.0.0
        timeout-minutes: 10
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          use-cache: false
          set-as-default: true
          additional-packages:
            apt-transport-https
            ca-certificates
            curl
            software-properties-common

      - name: Restart WSL
        run: wsl --shutdown
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Install Docker in WSL2
        shell: wsl-bash {0}
        timeout-minutes: 10
        run: |
          set -euo pipefail
          # Ubuntu 24.04 uses iptables-nft by default which prevents Docker from starting in WSL2.
          # iptables must be installed before alternatives can be switched.
          sudo -n -E -- apt-get install -y -q iptables
          sudo -n -E -- update-alternatives --set iptables /usr/sbin/iptables-legacy
          sudo -n -E -- update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy
          sudo -n -E -- mkdir -p /etc/apt/keyrings
          sudo -n -E -- cp .github/workflows/resources/docker-apt-public-gpg-key.key /etc/apt/keyrings/docker.asc
          sudo -n -E -- chmod 644 /etc/apt/keyrings/docker.asc
          sudo -n -E -- bash -c 'echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] \
            https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list'
          sudo -n -E -- apt-get update -q
          sudo -n -E -- apt-get -y install \
            docker-ce docker-ce-cli containerd.io \
            docker-compose-plugin docker-buildx-plugin
          # Skip systemd — start dockerd directly with both Unix socket and TCP listener.
          # This is simpler and more reliable in WSL2 CI than fighting systemd service overrides.
          sudo -n -E -- systemctl disable --now docker.service docker.socket || true
          sudo -n -E -- bash -c 'nohup /usr/bin/dockerd -H unix:///var/run/docker.sock -H tcp://0.0.0.0:2375 > /tmp/dockerd.log 2>&1 &'
          sleep 20
          sudo -n -E -- docker info
          ss -tlnp | grep 2375

      - name: Forward Docker TCP Port from WSL2 to Windows
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          # WSL2 on Windows Server 2022 uses NAT mode — localhost does not automatically
          # forward to services inside WSL2. Explicitly proxy port 2375 to the WSL2 VM IP.
          $wslIp = (wsl hostname -I).Trim().Split()[0]
          Write-Host "WSL2 IP: $wslIp"
          netsh interface portproxy add v4tov4 listenport=2375 listenaddress=127.0.0.1 connectport=2375 connectaddress=$wslIp
          netsh interface portproxy show all
          Start-Sleep -Seconds 5
          docker info

      - name: Solo Init
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- init --dev

      - name: One-Shot Single Deploy
        shell: pwsh
        timeout-minutes: 70
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- one-shot single deploy

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        shell: pwsh
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- deployment diagnostics logs -q --dev; $true

      - name: One-Shot Single Destroy
        if: always()
        shell: pwsh
        timeout-minutes: 15
        run: |
          $env:PATH = "$env:USERPROFILE\.solo\bin;$env:PATH"
          npm run solo -- one-shot single destroy --quiet-mode; $true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: standard-runner-one-shot-windows-logs
          path: ${{ env.HOME }}\.solo\logs
          overwrite: true
          if-no-files-found: warn
