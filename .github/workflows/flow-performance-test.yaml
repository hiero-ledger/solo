name: "Performance Test Solo Deployment"

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
      - 'release/*'
defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  performance-test:
    if: >
      ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false ||
      startsWith(github.event.pull_request.title, 'trunk-merge') && !cancelled() && !failure() }}
    timeout-minutes: 90
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Posix Dependencies
        id: set-posix-dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          # Configure APT to use main Ubuntu archive (disable mirror rotation)
          sudo sed -i 's|http://[a-z.]*.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list
          # Install jq (a lightweight and flexible command-line JSON processor)
          sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22

      - name: Install wget
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: |
            if ! command -v wget >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y wget
            fi

      - name: Install Dependencies
        id: npm-deps
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: |
            npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Project
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Setup E2E Tests
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: |
            ./test/e2e/dual-cluster/setup-dual-e2e.sh

      - name: Run E2E Tests
        run: |
          set -euo pipefail
          export PATH=~/.solo/bin:${PATH}
          echo SOLO_TEST_CLUSTER=solo-e2e > .env
          echo ONE_SHOT_WITH_BLOCK_NODE=true >> .env
          echo MIRROR_NODE_PINGER_TPS=10 >> .env
          echo ONE_SHOT_METRICS_TEST_DURATION_IN_MINUTES=5 >> .env
          cat .env

          # Run the task in the background and trap SIGTERM/SIGINT so that a workflow
          # cancellation (e.g. triggered by a new commit on this PR) terminates the
          # test immediately rather than waiting 30-40 minutes for it to finish on
          # its own.
          TASK_PID=""
          TASK_PGID=""
          TASK_RC=0

          # Recursively kill a process and all its descendants (depth-first).
          # go-task spawns each command in a new process group (Setpgid), so
          # kill -- -PGID only reaches task itself; the mocha/node child ends up
          # in a different process group.  This function walks pgrep -P to reach
          # every descendant regardless of process-group boundaries.
          kill_tree() {
            local pid=$1 sig=$2
            for child in $(pgrep -P "$pid" 2>/dev/null || true); do
              kill_tree "$child" "$sig"
            done
            kill "-${sig}" "$pid" 2>/dev/null || true
          }

          cleanup() {
            if [[ -n "${TASK_PID}" ]]; then
              echo "=== CANCELLATION SIGNAL RECEIVED ==="
              echo "Stopping task tree (PID ${TASK_PID}, PGID ${TASK_PGID:-?})..."
              echo "Process tree at signal time:"
              ps -eo pid,ppid,pgid,sid,comm --sort=ppid 2>/dev/null \
                | awk -v root="${TASK_PID}" 'NR==1 || $2==root || $1==root' || true

              # Layer 1: kill task's own process group (matches working flows)
              if [[ -n "${TASK_PGID}" ]]; then
                kill -TERM -- "-${TASK_PGID}" 2>/dev/null || true
              fi
              # Layer 2: kill task PID directly
              kill -TERM "${TASK_PID}" 2>/dev/null || true
              # Layer 3: recursively kill all descendants (reaches mocha across PG boundaries)
              kill_tree "${TASK_PID}" TERM
              sleep 2
              # Repeat with SIGKILL for any survivors
              if [[ -n "${TASK_PGID}" ]]; then
                kill -KILL -- "-${TASK_PGID}" 2>/dev/null || true
              fi
              kill -KILL "${TASK_PID}" 2>/dev/null || true
              kill_tree "${TASK_PID}" KILL
              wait "${TASK_PID}" 2>/dev/null || true
            fi
            exit 130
          }
          trap cleanup SIGTERM SIGINT

          if command -v setsid >/dev/null 2>&1; then
            setsid task test-e2e-performance &
          else
            task test-e2e-performance &
          fi
          TASK_PID=$!
          TASK_PGID="$(ps -o pgid= -p "${TASK_PID}" | tr -d '[:space:]' || true)"
          wait "${TASK_PID}"
          TASK_RC=$?
          TASK_PID=""
          TASK_PGID=""
          trap - SIGTERM SIGINT

          if [ "${TASK_RC}" -ne 0 ]; then
            echo "task test-e2e-performance failed with exit code ${TASK_RC}. Collecting deployment diagnostics logs..."
            npm run solo-test -- deployment diagnostics logs -q --dev || true
            exit "${TASK_RC}"
          fi

      - name: Log Metrics
        id: log-metrics
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          for logFile in ~/.solo/logs/*.json; do
            if [[ -f "$logFile" ]]; then
              echo "::group::JSON Format"
              cat $logFile | jq
              echo "::endgroup::"
              echo "json_log=$(cat $logFile)" >> $GITHUB_OUTPUT
              echo "::group::Spreadsheet Format"
              echo "logFile=$logFile"
              JSON_FILENAME=$logFile ./.github/workflows/script/metrics.sh
              echo "::endgroup::"
            else
              echo "json_log={}" >> $GITHUB_OUTPUT
            fi
          done
          echo "solo_log_dir=$(cd ~/.solo/logs && pwd)" >> $GITHUB_OUTPUT

      - name: Write Log Metrics Message File
        id: log-metrics-file
        if: ${{ !cancelled() && !failure() && steps.log-metrics.outputs.json_log != '{}' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          LOG_FILE: "${{ steps.log-metrics.outputs.solo_log_dir }}/log_file.md"
          JSON_INPUT: "${{ toJSON(fromJSON(steps.log-metrics.outputs.json_log)) }}"
        run: |
          echo "## Log Metrics - Performance Test" >> $LOG_FILE
          echo "" >> $LOG_FILE
          echo "<details>" >> $LOG_FILE
          echo "<summary>" >> $LOG_FILE
          echo "JSON Log Metrics" >> $LOG_FILE
          echo "</summary>" >> $LOG_FILE
          echo '<pre><code class="JSON">' >> $LOG_FILE
          echo "$JSON_INPUT" >> $LOG_FILE
          echo "</code></pre>" >> $LOG_FILE
          echo "</details>" >> $LOG_FILE
          echo "log_file=$LOG_FILE" >> $GITHUB_OUTPUT

      - name: Comment PR with Log Metrics
        if: >-
          ${{ !cancelled() && !failure() && github.event_name == 'pull_request' &&
          steps.log-metrics.outputs.json_log != '{}' && github.event.pull_request.head.repo.fork == false }}
        uses: step-security/actions-comment-pull-request@7f6021194300cf361f7ba99a346c4daa6cab809b # v3.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          mode: recreate
          file-path: ${{ steps.log-metrics-file.outputs.log_file }}
          comment-tag: log-metrics-performance-test

      - name: Move JVM Memory Usage Data to Metrics Directory
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          mkdir -p ~/.solo/metrics
          if [ -d ~/.solo/logs/performance-tests ]; then
            mv ~/.solo/logs/performance-tests/* ~/.solo/metrics/
            rm -rf ~/.solo/logs/performance-tests
          fi

      - name: Upload E2E Logs to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-performance-test.log
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: error

      - name: Performance Test Verification
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          MAX_MEMORY_MB=11000
          echo "Max memory threshold is set to ${MAX_MEMORY_MB} MB"
          echo "Parsing for the memory usage from the json file"
          MEMORY_USED_MB=$(cat ~/.solo/logs/*.json | jq '.memoryInMebibytes')
          echo "Checking memory usage is less than the threshold"
          if [[ ${MEMORY_USED_MB} =~ ^[0-9]+ ]] && (( ${MEMORY_USED_MB} < ${MAX_MEMORY_MB} )); then
            echo "MEMORY_USED_MB is less than ${MAX_MEMORY_MB} [MB]: MEMORY_USED_MB=${MEMORY_USED_MB} MB"
            exit 0
          else
            echo "Not a valid number or it's >= ${MAX_MEMORY_MB}: MEMORY_USED_MB=${MEMORY_USED_MB} MB"
            exit 1
          fi

      - name: Build and Start Metrics Plotter tool
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
            cd ./scripts/metrics-plotter
            npm ci
            npm run build
            mkdir -p ~/.solo/metrics
            mkdir src/data
            nohup npm start &
            echo $! > /tmp/metrics-plotter.pid
            mkdir -p ./src/data       
            cp ~/.solo/logs/**/timeline-metrics.json ./src/data/timeline.json

      - name: Install Puppeteer / Chrome dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libatspi2.0-0 \
            libcairo2 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            xdg-utils \
            libgbm1

      - name: Save Screenshots of Metrics Plotter
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cd ./scripts/metrics-plotter
          SCREENSHOT_WIDTH=1920 npm run screenshot -- http://127.0.0.1:8123\?hide-controls=true\&grouped=true\&data=timeline ~/.solo/metrics/chart-grouped.png
          SCREENSHOT_WIDTH=1920 npm run screenshot -- http://127.0.0.1:8123\?hide-controls=true\&grouped=false\&data=timeline ~/.solo/metrics/chart.png
          cp ./src/data/timeline.json ~/.solo/metrics/timeline-metrics.json

      - name: Stop Metrics Plotter tool
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          if [ -f /tmp/metrics-plotter.pid ]; then
            kill $(cat /tmp/metrics-plotter.pid) || true
            rm /tmp/metrics-plotter.pid
          fi

      - name: Upload Metrics Data and Chart to GitHub
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-performance-chart
          path: ~/.solo/metrics/*
          overwrite: true
          if-no-files-found: error
