name: "Solo Docs Update Trigger"

on:
  workflow_run:
    workflows:
      - "Deploy Release Artifact"
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  trigger-solo-docs-update:
    name: Trigger Solo Docs Update
    runs-on: hiero-solo-linux-medium
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Trigger Solo Docs Workflow
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          gh workflow run flow-update-docs.yaml --repo hiero-ledger/solo-docs
          echo "::notice::Triggered solo-docs update"
