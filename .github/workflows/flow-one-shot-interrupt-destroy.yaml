name: "One Shot Interrupt Destroy"

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: write

jobs:
  test-one-shot-interrupt-destroy:
    name: Interrupt=${{ matrix.interrupt_seconds }}s
    runs-on: hiero-solo-linux-large
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        interrupt_seconds: [30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330, 360, 390, 420]
      max-parallel: 2

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version || '22' }}
          cache: npm

      - name: Install Dependencies
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application
        run: task build:compile

      - name: Restore Solo Image Cache
        id: solo-image-cache
        if: ${{ !cancelled() && !failure() }}
        uses: ./.github/actions/solo-image-cache
        with:
          operation: restore
          key-suffix: ${{ hashFiles('version.ts', 'version-test.ts', 'resources/config/solo-cache-images-target.yaml') }}

      - name: Run Interrupt Workflow Script
        timeout-minutes: 60
        env:
          ONE_SHOT_WITH_BLOCK_NODE: true
        run: |
          export PATH=~/.solo/bin:${PATH}
          if [ "${{ inputs.released-or-latest || 'false' }}" = "true" ]; then
            export SOLO_COMMAND="npx @hashgraph/solo"
          else
            export SOLO_COMMAND="npm run solo --"
          fi
          export INTERRUPT_SECONDS="${{ matrix.interrupt_seconds }}"
          node .github/workflows/script/one-shot-interrupt-destroy.mjs

      - name: Save Solo Image Cache
        if: ${{ github.event_name != 'pull_request' && steps.solo-image-cache.outputs.cache-hit != 'true' && !cancelled() && !failure() }}
        uses: ./.github/actions/solo-image-cache
        with:
          operation: save
          key-suffix: ${{ hashFiles('version.ts', 'version-test.ts', 'resources/config/solo-cache-images-target.yaml') }}

      - name: Cleanup Deployment
        if: always()
        timeout-minutes: 15
        env:
          ONE_SHOT_WITH_BLOCK_NODE: true
        run: |
          export PATH=~/.solo/bin:${PATH}
          if [ "${{ inputs.released-or-latest || 'false' }}" = "true" ]; then
            npx @hashgraph/solo one-shot single destroy --quiet-mode
          else
            npm run solo -- one-shot single destroy --quiet-mode
          fi
