name: "Test Migration Process"

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  test-migration-process:
    name: Migrate Solo from Prior to Current Version
    timeout-minutes: 60
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: npm

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: "v3.12.3" # helm version

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Install Kubectl
        uses: step-security/setup-kubectl@fa3574e17195eaed56b1e9d9095c58d0aee24f03 # pinned to v4.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 'v1.27.3'
        id: install

      - name: Get Latest Version
        id: get-version
        uses: step-security/retry@e1d59ce1f574b32f0915e3a8df055cfe9f99be5d # v3.0.4
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: |
            LATEST_VERSION=$(curl -s https://registry.npmjs.org/@hashgraph/solo/latest | jq -r '.version')
            echo "Latest Version: ${LATEST_VERSION}"
            echo "version=${LATEST_VERSION}" >> $GITHUB_OUTPUT

      - name: Launch Network with Prior Release ${{ steps.get-version.outputs.version }}
        timeout-minutes: 60
        run: |
          export PATH=~/.solo/bin:${PATH}
          echo "Configure APT to use main Ubuntu archive (disable mirror rotation)..."
          sudo sed -i 's|http://[a-z.]*.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list
          
          echo "Install yq..."
          YQ_VERSION="v4.44.1"
          YQ_BINARY="yq_linux_amd64"
          wget -q "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}" -O /tmp/yq
          sudo chmod +x /tmp/yq
          sudo mv /tmp/yq /usr/local/bin/yq
          yq --version
          
          npm install
          task build:compile

          # Run the script in the background and trap SIGTERM/SIGINT so that a workflow
          # cancellation (e.g. triggered by a new commit on this PR) terminates the
          # launch immediately rather than waiting up to 60 minutes for it to finish
          # on its own.
          SCRIPT_PID=""
          RC=0

          cleanup() {
            if [[ -n "${SCRIPT_PID}" ]]; then
              echo "Received cancellation signal, stopping launch_network.sh (PID ${SCRIPT_PID})..."
              kill "${SCRIPT_PID}" 2>/dev/null || true
              wait "${SCRIPT_PID}" 2>/dev/null || true
            fi
            exit 1
          }
          trap cleanup SIGTERM SIGINT

          .github/workflows/script/launch_network.sh ${{ steps.get-version.outputs.version }} &
          SCRIPT_PID=$!
          wait "${SCRIPT_PID}"
          RC=$?
          SCRIPT_PID=""
          trap - SIGTERM SIGINT

          if [[ "$RC" != "0" ]]; then
            echo "Failed to launch network with release version ${{ steps.get-version.outputs.version }}"
            exit $RC
          fi

      - name: Upload Logs to GitHub
        if: ${{ !cancelled() && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-logs
          path: ~/.solo/logs/*
          if-no-files-found: error
