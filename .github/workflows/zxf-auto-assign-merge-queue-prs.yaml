name: "ZXF: Auto-Assign Merge Queue PRs"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - trunk-merge/**

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  auto-assign:
    name: "Auto-Assign PRs"
    runs-on: hiero-solo-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Auto-Assign PRs to Merge Queue
        uses: step-security/auto-assign-action@9bf0ed34ed655f58718443237d3d9a4fead49f00 # v2.0.2
        with:
          repo-token: ${{ secrets.GH_ACCESS_TOKEN }}
          configuration-path: '.github/auto_assign.yaml'
