name: "ZXC: Code Style"
# The purpose of this reusable workflow is to cache dependencies and run a code style check on every PR and commit.
# This reusable component is called by the following workflows:
# - .github/workflows/flow-pull-request-checks.yaml
# - .github/workflows/flow-build-application.yaml

on:
  workflow_call:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      custom-job-label:
        description: "Custom Job Label:"
        type: string
        required: false
        default: "Code Style"

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: read
  actions: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  code-style:
    name: ${{ inputs.custom-job-label || 'Code Style' }}
    runs-on: hiero-solo-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Configure npm registry
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install Dependencies
        id: npm-deps
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: |
            npm ci

      - name: Check SoloError Subclasses Registered in SoloErrors
        run: |
          missing=""
          while IFS= read -r file; do
            class_name=$(grep -oE "^export class [A-Za-z]+" "$file" | awk '{print $3}')
            if [ -n "$class_name" ] && ! grep -q "$class_name" src/core/errors/solo-errors.ts; then
              missing="$missing\n  $class_name ($file)"
            fi
          done < <(find src/core/errors/classes -name "*.ts" -type f)
          if [ -n "$missing" ]; then
            echo "✘ The following SoloError subclasses are missing from solo-errors.ts:"
            printf "%b\n" "$missing"
            exit 1
          fi
          echo "✔ All SoloError subclasses are registered in solo-errors.ts"

      - name: Check for Duplicate Error Codes
        run: |
          duplicates=$(grep -oE "'SOLO-[0-9]+'" src/core/errors/error-code-registry.ts | tr -d "'" | sort | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "✘ Duplicate error codes found in error-code-registry.ts:"
            echo "$duplicates"
            exit 1
          fi
          echo "✔ No duplicate error codes found"

      - name: Check Code Style
        run: |
          task check
          mv eslint.log eslint-branch.log || true

      - name: Compare warnings with target branch
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          get_warnings() {
            file="$1"
            if [ -f "$file" ]; then
              # Use awk to find the line containing "problems" and print the token before "warnings"
              awk -F'[(), ]+' '/problems/ { for(i=1;i<=NF;i++) if($i=="warnings") print $(i-1) }' "$file" | tail -n1
            else
              echo 0
            fi
          }
          # Determine the PR target (base) branch
          target_branch="${{ github.event.pull_request.base.ref }}"
          echo "Target branch: $target_branch"
          # Fetch and check out the target branch from origin
          git fetch origin "$target_branch":"$target_branch"
          git checkout "$target_branch"
          npm ci
          task check --force
          branch_warnings=$(get_warnings eslint-branch.log)
          target_warnings=$(get_warnings eslint.log)
          echo "Warnings on branch: $branch_warnings"
          echo "Warnings on target ($target_branch): $target_warnings"
          if [ "$branch_warnings" -gt "$target_warnings" ]; then
            echo "✘ Warnings have increased from $target_warnings to $branch_warnings"
            exit 1
          else
            echo "✔ Warnings have not increased"
          fi
