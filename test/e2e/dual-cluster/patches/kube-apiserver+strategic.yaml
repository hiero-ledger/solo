apiVersion: v1
kind: Pod
metadata:
  name: kube-apiserver
  namespace: kube-system
spec:
  containers:
    - name: kube-apiserver
      env:
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              resource: '250MiB'
        - name: GOGC
          value: '50'
      resources:
        requests:
          memory: '300Mi'
        limits:
          memory: '400Mi'
