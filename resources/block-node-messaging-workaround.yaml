# Workaround for hiero-block-node#3150 and a related 0.37.1 issue where
# VerificationServicePlugin (a gating Disruptor consumer) cannot keep up with incoming
# block items at high TPS (~100 TPS SmartContract), causing the ring buffer to fill, the
# consensus-node gRPC stream to time out, and block N to be permanently absent from
# historic storage → NOT_AVAILABLE for all mirror subscriber reconnects on that block.
#
# Root cause in 0.37.1: VerificationServicePlugin.isGating() returns true (via the
# BlockItemHandler→GatingHandler default).  At 97 TPS, SmartContract blocks are larger
# (more EVM state-change items per block) than simple transfers, and the ExtendedMerkleTree
# session hashes every item — so per-item CPU work is higher.  G1GC (default) triggers
# multi-second stop-the-world pauses at 512 m heap; during a pause the verification thread
# stalls, the ring buffer fills, and the gRPC publisher times out → block N permanently
# absent from historic storage.
#
# Workaround: switch to ZGC (sub-millisecond concurrent GC in Java 21+) and raise the heap
# to 3 g so GC fires infrequently and never stalls the verification thread long enough for
# the ring buffer to fill.  Keep 4 CPU cores so ZGC concurrent threads do not compete with
# the verification thread.  Enlarged ring buffer and raised HTTP/2 limits remain as secondary
# safeguards against the @todo(1673) reconnect storm.
#
# Applied automatically when ONE_SHOT_BLOCK_NODE_PERF=true; kept separate from
# block-node-perf-values.yaml so JFR profiling is opt-in.
# TODO: remove once hiero-block-node fixes VerificationServicePlugin gating backpressure.
resources:
  requests:
    cpu: "2"
    memory: "3Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

blockNode:
  config:
    # The block node's Helidon HTTP/2 server fires rapid-reset protection at 50 RST_STREAM per 10s.
    # The mirror importer's default 100ms reconnect interval generates ~10 RST_STREAM/s during the
    # 200ms window after a mid-block reconnect (a known block node subscriber bug, @todo(1673)).
    # Raise the threshold so brief reconnect bursts don't trigger connection termination.
    SERVER_HTTP2_MAX_RAPID_RESETS: "500"
    # Enlarge the Disruptor ring buffer to 1 048 576 (2^20, power-of-2 per Disruptor requirement).
    # Runner-dependent conditions drive the net fill rate anywhere from ~215 to ~2 400+ slots/sec.
    # At the worst observed rate (2 427/sec, run 28985075195) the 262 144 buffer was exhausted in
    # only ~108 s, causing a block to be permanently lost.  1 048 576 provides enough capacity for
    # the full 300 s NLG at up to ~3 400 slots/sec net fill (1 048 576/300 ≈ 3 495) before the
    # gRPC publisher blocks — well above any observed rate even on the slowest CI runners.
    MESSAGING_BLOCK_ITEM_QUEUE_SIZE: "1048576"
    # ZGC (Java 21+ Generational ZGC) eliminates multi-second G1GC stop-the-world pauses.
    # Sub-millisecond GC pauses allow the verification thread to drain the ring buffer
    # consistently at ~97 TPS SmartContract load.  Heap raised to 3 g so GC fires rarely.
    JAVA_OPTS: >-
      -Xms2g
      -Xmx3g
      -XX:+UseZGC
      -XX:MaxDirectMemorySize=64m
      -XX:MaxMetaspaceSize=128m
      -XX:+HeapDumpOnOutOfMemoryError
      -XX:HeapDumpPath="/tmp/dump.hprof"
