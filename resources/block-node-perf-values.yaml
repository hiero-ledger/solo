# constants.BLOCK_NODE_JFR_REPOSITORY_DIRECTORY ("/opt/hiero/block-node/output/jfr").
# maxchunksize is kept small so chunks rotate often under load, keeping each collection close to live.
# settings=profile uses the JVM built-in JFR profile, so no .jfc file needs to be staged into the pod.
# npm run solo -- block node add \
#    --deployment one-shot \
#    --values-file resources/block-node-perf-values.yaml
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

blockNode:
  config:
    # The block node's Helidon HTTP/2 server fires rapid-reset protection at 50 RST_STREAM per 10s.
    # The mirror importer's default 100ms reconnect interval generates ~10 RST_STREAM/s during the
    # 200ms window after a mid-block reconnect (a known block node subscriber bug, @todo(1673)).
    # Raise the threshold so brief reconnect bursts don't trigger connection termination.
    SERVER_HTTP2_MAX_RAPID_RESETS: "500"
    # The @todo(1673) bug in BlockStreamSubscriberSession caused LiveBlockHandler gating sequences
    # to leak in the Disruptor ring buffer on every mirror reconnect (hiero-block-node #3150).
    # With the default 512-entry ring buffer the publisher blocked in ~2.5 s, halting block
    # storage and leaving mirror stuck in a NOT_AVAILABLE loop.  The root cause is fixed in
    # block node v0.37.0 (LiveBlockHandler is now a non-gating consumer and never pins the
    # publisher).  65536 is kept as headroom for the remaining gating consumers under load.
    MESSAGING_BLOCK_ITEM_QUEUE_SIZE: "65536"
    JAVA_OPTS: >-
      -Xms256m
      -Xmx512m
      -XX:MaxDirectMemorySize=64m
      -XX:MaxMetaspaceSize=128m
      -XX:+HeapDumpOnOutOfMemoryError
      -XX:HeapDumpPath="/tmp/dump.hprof"
      -XX:FlightRecorderOptions=repository=/opt/hiero/block-node/output/jfr,maxchunksize=1m
      -XX:StartFlightRecording=name=blocknode,settings=profile,disk=true,maxsize=200m,maxage=30m,dumponexit=true,filename=/opt/hiero/block-node/output/jfr/recording.jfr
