# Solo default application properties merged with small-memory optimizations
# Base: solo/resources/templates/application.properties
# Overrides: hiero-consensus-node small-memory/application.properties
hedera.config.version=0
ledger.id=0x01
netty.mode=TEST
contracts.chainId=298
hedera.recordStream.logPeriod=1
balances.exportPeriodSecs=400
files.maxSizeKb=2048
hedera.recordStream.compressFilesOnCreation=true
balances.compressOnCreation=true
contracts.maxNumWithHapiSigsAccess=0
autoRenew.targetTypes=
nodes.gossipFqdnRestricted=false
hedera.profiles.active=TEST
nodes.updateAccountIdAllowed=true
blockStream.streamMode=RECORDS
# TODO: we can remove this after we no longer need less than v0.59.x
networkAdmin.exportCandidateRoster=true
# for v0.59+, write the network.json file when you freeze the network
networkAdmin.diskNetworkExport=ONLY_FREEZE_BLOCK
hedera.realm=0
hedera.shard=0
nodes.webProxyEndpointsEnabled=true
nodes.nodeRewardsEnabled=false
# Small memory optimizations from hiero-consensus-node
cache.records.ttl=10
cache.warmThreads=1
blockStream.buffer.maxBlocks=5
blockStream.receiptEntriesBatchSize=256
blockStream.blockFileBufferOuterSizeKb=1024
blockStream.blockFileBufferInnerSizeKb=256
blockStream.blockFileBufferGzipSizeKb=128
hedera.prefetch.queueCapacity=1000
hedera.prefetch.threadPoolSize=1
hedera.recordStream.queueCapacity=100
hedera.recordStream.numOfBlockHashesInState=32
grpcUsageTracking.enabled=false
netty.bossThreads=1
netty.workerThreads=2
