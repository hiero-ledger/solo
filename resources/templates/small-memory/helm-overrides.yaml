defaults:
  root:
    extraEnv:
      - name: JAVA_HEAP_MIN
        value: '1g'
      - name: JAVA_HEAP_MAX
        value: '1g'
      - name: JAVA_OPTS
        value: '-XX:+UseG1GC -XX:+AlwaysPreTouch -XX:MaxMetaspaceSize=84M -XX:CompressedClassSpaceSize=48M -Xss256K -XX:ReservedCodeCacheSize=24M -XX:MaxDirectMemorySize=16M -Dio.netty.allocator.type=unpooled -Djava.util.concurrent.ForkJoinPool.common.parallelism=2'
      - name: MALLOC_ARENA_MAX
        value: '1'
