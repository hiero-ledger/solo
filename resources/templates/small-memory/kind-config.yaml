kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            watch-cache: "false"
    # One-shot only: publish the mirror-node ingress-controller NodePorts on the host so the mirror
    # node REST/gRPC-web API is reachable via a stable Docker port mapping instead of a flaky kubectl
    # port-forward tunnel. containerPort must match the nodePort values in
    # resources/one-shot/mirror-ingress-controller-nodeport-values.yaml (NodePort range is 30000-32767).
    # hostPort 38081 keeps the mirror REST URL identical to the legacy port-forward port
    # (constants.MIRROR_NODE_PORT / ONE_SHOT_MIRROR_REST_HOST_PORT), so existing consumers keep working.
    #   30003 mirror http (host 38081), 30004 mirror https
    extraPortMappings:
      - containerPort: 30003
        hostPort: 38081
        protocol: TCP
      - containerPort: 30004
        hostPort: 30004
        protocol: TCP
    extraMounts:
      - hostPath: ./resources/templates/small-memory/patches
        containerPath: /patches
kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    patches:
      directory: /patches
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
      endpoint = ["https://mirror.gcr.io", "https://hub.mirror.docker.lat.ope.eng.hashgraph.io", "https://registry-1.docker.io"]
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry-1.docker.io"]
      endpoint = ["https://mirror.gcr.io", "https://hub.mirror.docker.lat.ope.eng.hashgraph.io", "https://registry-1.docker.io"]
