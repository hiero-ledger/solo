kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            watch-cache: "false"
    # One-shot only: publish fixed NodePorts on the host so every one-shot endpoint is reachable via
    # a stable Docker port mapping instead of a flaky kubectl port-forward tunnel. Each hostPort keeps
    # the URL identical to the legacy port-forward port, so existing consumers keep working.
    # containerPort values are NodePorts (range 30000-32767): 30003/30004 must match
    # resources/one-shot/mirror-ingress-controller-nodeport-values.yaml; 30005-30007 must match the
    # ONE_SHOT_*_NODE_PORT constants in src/core/constants.ts (services created by the one-shot
    # deploy orchestrator).
    #   30003 mirror http (host 38081), 30004 mirror https
    #   30005 explorer (host 38080), 30006 JSON RPC relay (host 37546), 30007 consensus gRPC node1 (host 35211)
    extraPortMappings:
      - containerPort: 30003
        hostPort: 38081
        protocol: TCP
      - containerPort: 30004
        hostPort: 30004
        protocol: TCP
      - containerPort: 30005
        hostPort: 38080
        protocol: TCP
      - containerPort: 30006
        hostPort: 37546
        protocol: TCP
      - containerPort: 30007
        hostPort: 35211
        protocol: TCP
    extraMounts:
      - hostPath: ./resources/templates/small-memory/patches
        containerPath: /patches
kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    patches:
      directory: /patches
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
      endpoint = ["https://mirror.gcr.io", "https://hub.mirror.docker.lat.ope.eng.hashgraph.io", "https://registry-1.docker.io"]
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry-1.docker.io"]
      endpoint = ["https://mirror.gcr.io", "https://hub.mirror.docker.lat.ope.eng.hashgraph.io", "https://registry-1.docker.io"]
