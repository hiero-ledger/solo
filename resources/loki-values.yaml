# Loki log store installed by `solo cluster-ref config setup --grafana-alloy`.
# Runs the smallest footprint the chart supports: one single-binary replica with
# filesystem storage and every auxiliary workload (gateway, caches, canary) disabled.
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1

# The simple-scalable targets must be pinned to zero replicas in SingleBinary mode.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
