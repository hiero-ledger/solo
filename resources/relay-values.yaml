
relay:
  config:
    WORKERS_POOL_ENABLED: false
    LOG_LEVEL: error
    PRETTY_LOGS_ENABLED: false
    REDIS_ENABLED: false
    CACHE_MAX: 50
    CACHE_TTL: 300
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 120
    timeoutSeconds: 2
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 60
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 240
    timeoutSeconds: 2
  resources:
    requests:
      cpu: 0
      memory: 350Mi
    limits:
      cpu: 500m
      memory: 700Mi
ws:
  config:
    WORKERS_POOL_ENABLED: false
    LOG_LEVEL: error
    PRETTY_LOGS_ENABLED: false
    REDIS_ENABLED: false
    CACHE_MAX: 50
    CACHE_TTL: 300
