
relay:
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 120
    timeoutSeconds: 2
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 60
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 240
    timeoutSeconds: 2
  resources:
    requests:
      cpu: 0
      memory: 0
    limits:
      cpu: 500m
      memory: 250Mi
