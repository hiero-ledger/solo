readinessProbe:
  initialDelaySeconds: 0
  periodSeconds: 1
  failureThreshold: 60
livenessProbe:
  initialDelaySeconds: 0
  periodSeconds: 1
  failureThreshold: 60
relay:
  resources:
    requests:
      memory: 0
    limits:
      memory: 200Mi
  config:
    WORKERS_POOL_ENABLED: "false"
    LOG_LEVEL: "error"
    PRETTY_LOGS_ENABLED: "false"
    REDIS_ENABLED: "false"
    CACHE_MAX: "50"
    CACHE_TTL: "300"
    NODE_OPTIONS: "--max-old-space-size=50"
ws:
  resources:
    requests:
      memory: 0
    limits:
      memory: 88Mi
  config:
    WORKERS_POOL_ENABLED: "false"
    LOG_LEVEL: "error"
    PRETTY_LOGS_ENABLED: "false"
    REDIS_ENABLED: "false"
    CACHE_MAX: "50"
    CACHE_TTL: "300"
    NODE_OPTIONS: "--max-old-space-size=50"
