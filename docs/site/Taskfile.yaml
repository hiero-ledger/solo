version: 3
output: prefixed
dotenv:
  - .env
silent: false
includes:
  github:
    taskfile: ./Taskfile.github.yaml
    flatten: true
  install:
    taskfile: ./Taskfile.install.yaml
    flatten: true
  npmjs:
    taskfile: ./Taskfile.npmjs.yaml
    flatten: true
env:
  HUGO_ENVIRONMENT: production
  HUGO_ENV: production
  HUGO_ORIGIN: https://hiero-ledger.github.io/
  HUGO_LOCAL_ORIGIN: http://localhost:1313/
  HUGO_HOST: hiero-ledger.github.io
  HUGO_SOLO_VERSION: main
  HUGO_BASEPATH: /solo
  PATH:
    sh: echo "$(go env GOPATH)/bin:$PATH"
# The site is published to GitHub Pages under https://hiero-ledger.github.io/solo/, so every base
#  URL must carry the ${HUGO_BASEPATH} (/solo) prefix ahead of the version segment. ${HUGO_ORIGIN}
#  ends with a slash and ${HUGO_BASEPATH} starts with one, so the leading slash is stripped to avoid
#  a doubled slash, yielding e.g. https://hiero-ledger.github.io/solo/main/.
vars:
  hugo_base_url: "${HUGO_ORIGIN}${HUGO_BASEPATH#/}/${HUGO_SOLO_VERSION}/"
  hugo_local_base_url: "${HUGO_LOCAL_ORIGIN}${HUGO_BASEPATH#/}/${HUGO_SOLO_VERSION}/"

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list

  build:clean:
    desc: "Clean then build the documentation site"
    cmds:
      - task: "clean"
      - task: "build"

  build:
    desc: "Build the documentation site"
    cmds:
      - task: "check-doc-dir"
      - task: "install"
      - task: "build:all"

  check-doc-dir:
    desc: "Check if in the docs/site directory"
    silent: true
    status:
      - |
        if [ "$(basename "$PWD")" != "site" ]; then
          exit 1
        fi
    cmds:
      - |
        echo "Error: Must be in the 'docs/site' directory."
        exit 1

  clean:
    desc: "Remove artifacts that are automatically generated"
    silent: true
    cmds:
      - rm -Rf build
      - rm -Rf static/classes
      - rm -Rf public/${HUGO_SOLO_VERSION}
      - rm -Rf resources
      - rm -f .hugo_build.lock

  build:all:
    desc: "Perform the build operations: typedoc and hugo"
    cmds:
      - task: "build:typedoc"
      - task: "solo:version"
      - task: "npmjs:latest:solo:version"
      - task: "npmjs:list:solo:versions"
      - task: "github:list:solo:releases"
      - task: "github:augment:releases"
      - task: "github:download:solo:assets"
      - task: "github:extract:latest"
      - task: "github:extract:versioned"
      - task: "github:mutate:urls"
      - task: "github:update:hugo:config"
      - task: "build:hugo"
      - task: "build:doc:artifacts"

  build:cli:help:
    desc: "Generate the CLI help documentation"
    silent: true
    dir: ../..
    sources:
      - src/**/*.ts
      - version.ts
      - solo.ts
      - scripts/docs/**.ts
    generates:
      - docs/site/build/solo-cli.md
    cmds:
      - |
        if [[ "${SKIP_CLI_OUTPUT}" != "true" ]]; then
          printf "\r::group::Generating CLI help documentation\n"
          rm -f docs/site/build/solo-cli.md
          mkdir -p docs/site/build
          task build:compile
          npx tsx scripts/docs/generate-help.ts
          printf "\r::endgroup::--------------\n"
        fi

  build:error:docs:
    desc: "Generate the SoloError documentation page bodies"
    silent: true
    dir: ../..
    sources:
      - src/core/errors/**/*.ts
      - scripts/docs/generate-error-documentation.ts
    generates:
      - docs/site/build/solo-docs-content/troubleshooting/errors/_index.md
    cmds:
      - |
        printf "\r::group::Generating SoloError documentation\n"
        npx tsx scripts/docs/generate-error-documentation.ts
        printf "\r::endgroup::--------------\n"

  build:docs:content:
    desc: "Bundle solo-cli.md and the SoloError pages into solo-docs-content.tar.gz for the solo-docs site"
    silent: true
    dir: ../..
    cmds:
      - task: "build:cli:help"
      - task: "build:error:docs"
      - |
        printf "\r::group::Bundling solo-docs content archive\n"
        STAGING=docs/site/build/solo-docs-content
        mkdir -p "${STAGING}/cli"
        cp docs/site/build/solo-cli.md "${STAGING}/cli/solo-cli.md"
        tar -czf docs/site/build/solo-docs-content.tar.gz -C "${STAGING}" .
        echo "Created docs/site/build/solo-docs-content.tar.gz"
        printf "\r::endgroup::--------------\n"

  build:solo:command:output:
    desc: "Build Solo Command Output"
    silent: true
    dir: ../..
    sources:
      - src/**/*.ts
      - version.ts
      - solo.ts
      - scripts/docs/*.ts
    cmds:
      - printf "\r::group::Building Solo Command Output\n"
      - |
        if [[ "${SKIP_COMMAND_OUTPUT}" != "true" ]]; then
          rm -f docs/site/build/solo-command-output.json
          mkdir -p docs/site/build
          if [[ "${SOLO_CI}" == "true" ]]; then
            npm ci
            echo "Running wrapper-for-command-output.ts in CI mode"
            npx tsx scripts/docs/wrapper-for-command-output.ts
          else
            task build:compile
            echo "Running execute-command-output.ts in local mode"
            npx tsx scripts/docs/execute-command-output.ts
          fi
        fi
      - printf "\r::endgroup::--------------\n"

  build:hugo:
    desc: "Build the Hugo site"
    silent: true
    cmds:
      - echo "origin              $HUGO_ORIGIN"
      - echo "host                $HUGO_HOST"
      - echo "base_path           $HUGO_BASEPATH"
      - echo "solo vers           $HUGO_SOLO_VERSION"
      - echo "hugo_base_url       {{.hugo_base_url}}"
      - echo "hugo_local_base_url {{.hugo_local_base_url}}"
      - PATH="$(go env GOPATH)/bin:$PATH" hugo version
      - printf "\r::group::Building the Hugo site\n"
      - PATH="$(go env GOPATH)/bin:$PATH" hugo config
      - PATH="$(go env GOPATH)/bin:$PATH" hugo --cleanDestinationDir -e prod --gc --minify --baseURL "{{.hugo_base_url}}" -d public/${HUGO_SOLO_VERSION}
      - echo "Hugo site built successfully. RC=${?}"
      - printf "\r::endgroup::--------------\n"

  solo:version:
    desc: "Display the version of the Solo CLI from the package.json and write it to a file"
    dir: ../..
    silent: true
    cmds:
      - |
        BUILD_DIR=docs/site/build
        SOLO_VERSION_FILE=$BUILD_DIR/version.txt
        mkdir -p $BUILD_DIR
        touch $BUILD_DIR/github-releases.json
        echo -n "v$(node -p "require('./package.json').version")" > $SOLO_VERSION_FILE
        SOLO_VERSION=$(<"$SOLO_VERSION_FILE")
        SOLO_VERSION=$(echo "$SOLO_VERSION" | tr -d '\r\n[:space:]')
        echo "Solo CLI version: $SOLO_VERSION"
        echo "Run the following command to build the site with the current version: $SOLO_VERSION"
        echo "HUGO_SOLO_VERSION=$SOLO_VERSION task build" 
        cp docs/site/hugo-template.yaml docs/site/hugo.yaml
        if [ "$HUGO_SOLO_VERSION" != "main" ]; then
         echo "    - {version: $SOLO_VERSION, url: /solo/$SOLO_VERSION}">> docs/site/hugo.yaml
        fi

  build:doc:artifacts:
    desc: "Builds a ./build/latest.tar.gz file and a ./build/${SOLO_VERSION}.tar.gz file from the directories in the public directory"
    silent: true
    preconditions:
      - msg: "tar command is required to create the documentation artifacts."
        sh: command -v tar
    requires:
      vars: [HUGO_SOLO_VERSION]
    cmds:
      - |
        printf "\r::group::Building documentation artifacts\n"
        CURRENT_DIRECTORY=$(pwd) && echo "CURRENT_DIRECTORY-directory=${CURRENT_DIRECTORY}"
        mkdir -p build/${HUGO_SOLO_VERSION}/latest
        if ! [[ -f public/index.html ]]; then
          echo "Error: public/index.html not found."
          exit 1
        fi
        sed -e "s|/latest|/${HUGO_SOLO_VERSION}|g" public/index.html > build/${HUGO_SOLO_VERSION}/latest/index.html
        cd build/${HUGO_SOLO_VERSION}
        CURRENT_DIRECTORY=$(pwd) && echo "CURRENT_DIRECTORY-directory=${CURRENT_DIRECTORY}"
        ls -al
        tar -czf docs-latest.tar.gz latest
        if [[ $? -ne 0 ]]; then
          echo "Error: Failed to create latest.tar.gz"
          exit 1
        fi
        cd ../../public
        CURRENT_DIRECTORY=$(pwd) && echo "CURRENT_DIRECTORY-directory=${CURRENT_DIRECTORY}"
        tar -czf ../build/${HUGO_SOLO_VERSION}/docs-${HUGO_SOLO_VERSION}.tar.gz ${HUGO_SOLO_VERSION}
        if [[ $? -ne 0 ]]; then
          echo "Error: Failed to create ${HUGO_SOLO_VERSION}.tar.gz"
          exit 1
        fi
        cd ..
        CURRENT_DIRECTORY=$(pwd) && echo "CURRENT_DIRECTORY-directory=${CURRENT_DIRECTORY}"
        printf "\r::endgroup::--------------\n"

  build:typedoc:
    desc: "Generate the API documentation using TypeDoc"
    dir: ../..
    silent: true
    sources:
      - src/**/*.ts
      - version.ts
      - solo.ts
    generates:
      - docs/site/static/classes/**/*.*
    cmds:
      - printf "\r::group::Generating API documentation\n"
      - npx typedoc --excludeExternals --out docs/site/static/classes --entryPoints ./solo.ts --entryPoints ./src/index.ts --entryPointStrategy expand ./src
      - printf "\r::endgroup::--------------\n"

  local:
    desc: "Run the local server for only current version"
    silent: true
    cmds:
      - task: "build"
      # 'task local' builds and serves only the current version (public/${HUGO_SOLO_VERSION}), so the
      #  docs live at {{.hugo_local_base_url}} — not at /solo/latest. To test 'latest', the versions
      #  dropdown and every released version under /solo, run 'task deploy:nginx' instead.
      - |
        echo "==============================================================================="
        echo " Serving the '${HUGO_SOLO_VERSION}' docs only."
        echo " Open: {{.hugo_local_base_url}}"
        echo " (For 'latest' + all versions + the dropdown, use: task deploy:nginx)"
        echo "==============================================================================="
      - PATH="$(go env GOPATH)/bin:$PATH" hugo server --cleanDestinationDir -e dev -DFE --minify serve --baseURL "{{.hugo_local_base_url}}" -d public/${HUGO_SOLO_VERSION}

  deploy:nginx:
    desc: "Build the Hugo site, configure Nginx, then deploy Nginx to serve the Hugo site for testing multiple versions"
    cmds:
      - task: "build"
      - task: "deploy:nginx:config"
      - task: "deploy:nginx:start"

  deploy:nginx:config:
    desc: "Configure Nginx to serve the Hugo site for testing multiple versions"
    silent: true
    cmds:
      - task: "install:nginx"
      - |
        if [ ! -d "nginx" ]; then
          mkdir -p nginx
        fi
      - |
        cat > nginx/nginx.conf << 'EOF'
        worker_processes  1;

        events {
            worker_connections  1024;
        }

        http {
            include       mime.types;
            default_type  application/octet-stream;

            sendfile        on;
            keepalive_timeout  65;

            server {
                listen       7777;
                server_name  localhost;

                index  index.html index.htm;

                # GitHub Pages serves this repo under https://hiero-ledger.github.io/solo/, so mirror
                #  that locally by exposing ./public beneath /solo/. This lets the released-versions
                #  dropdown and the /solo/main, /solo/latest and /solo/<tag> URLs resolve exactly as
                #  they do in production. Visiting the root redirects into /solo/ (which in turn
                #  redirects to /solo/latest via public/index.html).
                location = / {
                    return 302 /solo/;
                }

                location /solo/ {
                    alias  {{.TASKFILE_DIR}}/public/;
                    try_files $uri $uri/ =404;
                }

                error_page   500 502 503 504  /50x.html;
                location = /50x.html {
                    root   html;
                }
            }
        }
        EOF

  deploy:nginx:start:
    desc: "Start Nginx with the Hugo site configuration for testing multiple versions"
    silent: true
    cmds:
      - |
        if pgrep nginx > /dev/null; then
          echo "Stopping existing Nginx..."
          nginx -s stop
        fi
      - |
        # The site is served under /solo (mirroring GitHub Pages). Point users at /solo/ — the bare
        #  root only 302-redirects there, and browsers may have cached an older root redirect.
        echo "==============================================================================="
        echo " Nginx is serving the docs under /solo. Open:"
        echo "   http://localhost:7777/solo/         (entry point, redirects to latest)"
        echo "   http://localhost:7777/solo/main/    (main)"
        echo "   http://localhost:7777/solo/latest/  (latest released version)"
        echo " Tip: if the bare root sends you to a stale /latest/, hard-reload to clear the cache."
        echo "==============================================================================="
        nginx -c {{.TASKFILE_DIR}}/nginx/nginx.conf

  deploy:nginx:stop:
    desc: "Stop Nginx"
    silent: true
    cmds:
      - |
        if pgrep nginx > /dev/null; then
          echo "Stopping Nginx..."
          nginx -s stop
        else
          echo "Nginx is not running"
        fi
