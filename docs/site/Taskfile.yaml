version: 3
output: prefixed
dotenv:
  - .env
silent: false

env:
  HUGO_ENVIRONMENT: production
  HUGO_ENV: production
  HUGO_BASE_URL: https://solo.hiero.org/
  HUGO_ORIGIN: https://solo.hiero.org
  HUGO_HOST: solo.hiero.org
  HUGO_BASEPATH: /

# TODO - verify that api docs are mounted correctly and referenced links are working
tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list

  build:
    desc: "Build the documentation site"
    cmds:
      - task: "check-doc-dir"
      - task: "clean"
      - task: "install"
      - task: "build:all"

  local:
    desc: "Run the local server"
    cmds:
      - task: "default"
      - hugo server --cleanDestinationDir -e dev -DFE --minify serve --renderToMemory

  check-doc-dir:
    desc: "Check if in the docs/site directory"
    status:
      - |
        if [ "$(basename "$PWD")" != "site" ]; then
          exit 1
        fi
    cmds:
      - |
        echo "Error: Must be in the 'docs/site' directory."
        exit 1

  clean:
    desc: "Remove artifacts that are automatically generated"
    cmds:
      - rm -Rf static/classes
      - rm -Rf public
      - rm -Rf resources
      - rm -Rf themes
      - rm -f .hugo_build.lock

  build:all:
    cmds:
      - task: "build:typedoc"
      - task: "build:copy"
      - task: "build:cli:help"
      - task: "build:hugo"

  build:solo:
    sources:
      - src/**/*.ts
      - version.ts
      - solo.ts
    generates:
      - dist/**/*.js
    cmds:
      - rm -Rf dist
      - npx tsc
      - node {{.TASKFILE_DIR}}/../../resources/post-build-script.js

  build:cli:help:
    dir: ../..
    sources:
      - src/**/*.ts
      - version.ts
      - solo.ts
    generates:
      - dist/**/*.js
    cmds:
      - rm -f docs/site/content/en/documentation/solo-commands.md
      - chmod 755 docs/site/generate_help.sh
      - task: "build:solo"
      - docs/site/generate_help.sh

  build:hugo:
    cmds:
      - echo "base_url  $HUGO_BASE_URL"
      - echo "origin    $HUGO_ORIGIN"
      - echo "host      $HUGO_HOST"
      - echo "base_path $HUGO_BASEPATH"
      - hugo version
      - hugo config
      - hugo --cleanDestinationDir --gc --minify --baseURL "$HUGO_BASE_URL/"

  build:typedoc:
    dir: ../..
    sources:
      - src/**/*.ts
      - version.ts
      - solo.ts
    generates:
      - dist/**/*.js
    cmds:
      - npx typedoc --excludeExternals --out docs/site/static/classes --entryPoints ./solo.ts --entryPoints ./src/index.ts --entryPointStrategy expand ./src

  install:
    desc: "Install dependencies"
    cmds:
      - task: "install:hugo"
      - task: "install:typedoc"
      - task: "install:solo"
      - task: "install:docsy"

  install:docsy:
    status:
      - ls -al go.mod
    cmds:
      - hugo mod init github.com/hiero-ledger/solo
      - hugo mod get github.com/google/docsy@v0.11.0

  install:hugo:
    status:
      - command -v hugo
      - |
        node -e "
        const { execSync } = require('child_process');
        const semver = require('semver');

        try {
          const output = execSync('hugo version').toString();
          const versionMatch = output.match(/v(\d+\.\d+\.\d+)(\+extended)?/);
          if (!versionMatch) {
            console.error('❌ Could not extract Hugo version from:', output);
            process.exit(1);
          }

          const currentVersion = versionMatch[1];
          const isExtended = !!versionMatch[2];
          const requiredVersion = '0.145.0';

          if (!isExtended) {
            console.error('❌ Hugo is not the extended version. Please install the extended edition.');
            process.exit(1);
          }

          if (!semver.gte(currentVersion, requiredVersion)) {
            console.error(\`❌ Hugo version \${currentVersion} is too old. Requires >= \${requiredVersion}\`);
            process.exit(1);
          }

          console.log(\`✅ Hugo version \${currentVersion}+extended is OK (>= \${requiredVersion})\`);
        } catch (err) {
          console.error('❌ Failed to run hugo:', err.message);
          process.exit(1);
        }
        "
    cmds:
      - CGO_ENABLED=1 go install -tags extended github.com/gohugoio/hugo@v0.145.0

  install:typedoc:
    cmds:
      - npx typedoc --version

  install:solo:
    dir: ../..
    sources:
      - package.json
      - package-lock.json
    cmds:
      - npm install
