version: 3
tasks:
  github:list:solo:releases:
    desc: List GitHub releases for hiero-ledger/solo using gh CLI and output as JSON (excluding empty assets)
    silent: true
    deps: [install:gh]
    cmds:
      - |
        if [[ -z "${GH_TOKEN}" ]]; then
          echo "WARN: GH_TOKEN is not set. Cannot run `gh` commands, skipping step." >&2
          exit 0
        fi
        printf "\r::group::Fetching GitHub releases for hiero-ledger/solo...\n"
        mkdir -p build
        touch build/github-releases.json
        if ! command -v gh &> /dev/null; then
          echo "Error: GitHub CLI (gh) is not installed." >&2
          exit 1
        fi
        echo "Fetching releases from GitHub with gh CLI..."
        gh api --paginate -H "Accept: application/vnd.github+json" \
          repos/hiero-ledger/solo/releases |
        jq 'map({
          tag: ("v" + (.tag_name | ltrimstr("v"))),
          assets: (
            .assets
            | map(select(.name != "Source code (zip)" and .name != "Source code (tar.gz)"))
            | map({name: .name, url: .browser_download_url})
          )
        }) | map(select(.assets | length > 0))' | tee build/github-releases.json
        printf "\r::endgroup::--------------\n"

  github:download:solo:assets:
    desc: Download release assets into per-tag folders under build/
    silent: true
    cmds:
      - |
        if [ ! -f build/releases.json ]; then
          echo "Error: build/releases.json does not exist. Run github:list:solo:releases first, then github:augment:releases." >&2
          exit 1
        fi
        
        echo "Creating directories and downloading assets..."
        jq -c '.[]' build/releases.json | while read -r release; do
          tag=$(echo "$release" | jq -r '.tag' | sed 's#[/:]#_#g')
          # for tag, eg: v0.57.0, set vars major and minor, eg: major=0, minor=57
          major=$(echo "$tag" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "$tag" | cut -d. -f2)
          # get the npmjsLatest field from the release variable, if it's null, set it to false
          npmjsLatest=$(echo "$release" | jq -r '.npmjsLatest // false')
        
          # if major is 0 and minor is less than 57, print a message and skip this release
          if [[ "$major" -eq 0 && "$minor" -lt 57 ]]; then
            echo "⚠️ Skipping release $tag (version too old)"
            continue
          fi
          mkdir -p "build/$tag"
        
          echo "Processing release: $tag"
          echo "$release" | jq -c '.assets[]' | while read -r asset; do
            name=$(echo "$asset" | jq -r '.name')
            url=$(echo "$asset" | jq -r '.url')
            dest="build/$tag/$name"

            # skip if dest doesn't exist or if the artifact name starts with example- or if the filename is
            #  docs-latest.tar.gz and npmjsLatest is false
            if [[ -f "$dest" || "$name" == example-* || ( "$name" == "docs-latest.tar.gz" && "$npmjsLatest" == "false" ) ]]; then
              # echo "✔ Skipping condition met for $name, not writing $dest, npmjsLatest: $npmjsLatest"
              continue
            fi
            echo "⬇ Downloading $name, $dest doesn't exist yet"
            curl -sSL --retry 3 --fail -o "$dest" "$url" || {
              echo "❌ Failed to download $url" >&2
              rm -f "$dest"
            }
          done
        done

  github:extract:latest:
    desc: Extract docs-latest.tar.gz from latest version to public/latest
    silent: true
    cmds:
      - |
        if [[ -n "$HUGO_SOLO_VERSION" && "$HUGO_SOLO_VERSION" != "main" ]]; then
          echo "skipping since we are building this release not downloading it"
          exit 0
        fi
        LATEST_TAG=$(jq -r '.[] | select(.npmjsLatest == true) | .tag' build/releases.json)
        if [ -z "$LATEST_TAG" ]; then
          echo "No latest version found in releases.json"
          exit 0
        fi
        
        SAFE_TAG=$(echo "$LATEST_TAG" | sed 's#[/:]#_#g')
        ARCHIVE="build/$SAFE_TAG/docs-latest.tar.gz"
        
        if [ ! -f "$ARCHIVE" ]; then
          echo "Error: $ARCHIVE does not exist." >&2
          exit 1
        fi
        
        echo "Extracting $ARCHIVE to public/latest..."
        rm -rf public/latest
        mkdir -p public/latest
        if [ "$(uname -s)" == "Linux" ]; then
          tar --warning=no-unknown-keyword -xzf "$ARCHIVE" -C public/
        else
          tar -xzf "$ARCHIVE" -C public/
        fi

  github:extract:versioned:
    desc: Extract docs-${tag}.tar.gz into public/${tag}
    silent: true
    cmds:
      - |
        if [[ -n "$HUGO_SOLO_VERSION" && "$HUGO_SOLO_VERSION" != "main" ]]; then
          echo "skipping since we are building this release not downloading it"
          exit 0
        fi
        jq -c '.[] | select(.npmjsLatest == true or .npmjsLatest == false)' build/releases.json | while read -r release; do
          TAG=$(echo "$release" | jq -r '.tag')
          SAFE_TAG=$(echo "$TAG" | sed 's#[/:]#_#g')
          ARCHIVE="build/$SAFE_TAG/docs-$TAG.tar.gz"
          DEST="public"
        
          if [ ! -f "$ARCHIVE" ]; then
            echo "⚠️ Missing: $ARCHIVE"
            continue
          fi
          
          if [[ -d "$DEST/$TAG" ]]; then
            echo "✔ Skipping extraction for $TAG (already exists)"
            continue
          fi
        
          echo "📦 Extracting $ARCHIVE to $DEST..."
          mkdir -p "$DEST"
          if [ "$(uname -s)" == "Linux" ]; then
            tar --warning=no-unknown-keyword -xzf "$ARCHIVE" -C "$DEST"
          else
            tar -xzf "$ARCHIVE" -C "$DEST"
          fi
        done

  github:mutate:urls:
    desc: Update URLs for older versions to point to the new path structure
    silent: true
    cmds:
      - |
        # The site is published to GitHub Pages under https://hiero-ledger.github.io/solo/, so every
        #  published URL must carry the /solo path prefix. Docs for older versions were extracted from
        #  release tarballs that were built before that prefix existed: they reference the retired
        #  https://solo.hiero.org host and use root-relative links such as /v0.57.0/... (no /solo).
        #  This task rewrites the already-extracted docs under ./public so that:
        #    - references to https://solo.hiero.org          -> https://hiero-ledger.github.io/solo
        #    - root-relative /main, /latest and /<tag> links -> /solo/main, /solo/latest, /solo/<tag>
        #  Absolute URLs gain /solo from the host rewrite above, so the segment rewrite only needs to
        #  handle root-relative links. It anchors on a URL-start delimiter (=, ", ', (, comma or
        #  whitespace) via the \x27-escaped lookbehind, which is why it is safe and idempotent:
        #    - it only matches a version as the FIRST path segment of a URL, so deeper path components
        #      such as js/main.min.js or scss/main.min.css (where "main" is a filename, not a version)
        #      are never touched;
        #    - links that already start with /solo/<segment> are left alone, because the segment then
        #      follows a slash rather than a delimiter, so freshly built docs are never double-prefixed.
        if [ ! -d public ]; then
          echo "No public directory found, nothing to mutate."
          exit 0
        fi

        # Build the alternation of version segments to prefix: main, latest and every release tag.
        #  Tags (e.g. v0.57.0) contain dots, which are escaped so they are matched literally by perl.
        ALT="main|latest"
        if [ -f build/releases.json ]; then
          for tag in $(jq -r '.[].tag' build/releases.json); do
            escaped=$(printf '%s' "$tag" | sed 's/\./\\./g')
            ALT="$ALT|$escaped"
          done
        fi
        export ALT

        echo "Rewriting URLs under ./public to include the /solo path prefix..."
        # -exec ... {} + batches files into a few perl invocations and is skipped entirely when no
        #  file matches, so it stays portable across the GitHub (Linux) and local (macOS) runners.
        find public -type f \
          \( -name '*.html' -o -name '*.htm' -o -name '*.xml' -o -name '*.json' \
             -o -name '*.js' -o -name '*.css' -o -name '*.txt' \) \
          -exec perl -i -pe '
            s{https://solo\.hiero\.org}{https://hiero-ledger.github.io/solo}g;
            s{(?<=[="\x27(,\s])/($ENV{ALT})\b}{/solo/$1}g;
          ' {} +
        echo "✅ URL mutation complete."

  github:update:hugo:config:
    desc: Append versions from releases.json to hugo.yaml
    silent: true
    cmds:
      - |
        RELEASES="build/releases.json"
        CONFIG="hugo.yaml"
        
        if [ ! -f "$RELEASES" ]; then
          echo "❌ Error: $RELEASES not found" >&2
          exit 1
        fi
        
        # Only consider releases that actually published a docs-<tag>.tar.gz asset. When a release's
        #  Hugo docs deploy failed, that asset is missing (e.g. v0.75.0 has only the example-*.zip
        #  assets), so there is nothing to extract into public/<tag> and a dropdown entry would only
        #  404. Detecting this from the release metadata (rather than from local extraction) keeps the
        #  filter correct for both the aggregation build and the standalone versioned build.
        jq -r '
          .[]
          | select(.npmjsLatest == true or .npmjsLatest == false)
          | . as $release
          | select(any($release.assets[]; .name == "docs-\($release.tag).tar.gz"))
          | $release.tag
        ' "$RELEASES" | while read -r VERSION; do
          # Skip anything older than v0.57.0: those releases are not downloaded or extracted
          #  (see github:download:solo:assets), so they must not appear in the versions dropdown.
          MAJOR=$(echo "$VERSION" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          if [[ "$MAJOR" -eq 0 && "$MINOR" -lt 57 ]]; then
            echo "⚠️ Skipping dropdown entry for $VERSION (version too old)"
            continue
          fi
          LINE="    - {version: $VERSION, url: /solo/$VERSION}"
          if ! grep -q "version: $VERSION," "$CONFIG"; then
            echo "$LINE" >> "$CONFIG"
          fi
        done

  github:augment:releases:
    desc: Add npmjsLatest field to each release in github-releases.json and save to build/releases.json
    silent: true
    cmds:
      - |
        set -e
        
        LATEST_FILE="build/npmjs-latest-version.txt"
        ALL_VERSIONS_FILE="build/npmjs-versions.txt"
        RELEASES_FILE="build/github-releases.json"
        OUTPUT_FILE="build/releases.json"
        
        if [ ! -f "$RELEASES_FILE" ]; then
          echo "Error: $RELEASES_FILE not found." >&2
          exit 1
        fi
        
        if [ ! -f "$LATEST_FILE" ]; then
          echo "Error: $LATEST_FILE not found." >&2
          exit 1
        fi
        
        if [ ! -f "$ALL_VERSIONS_FILE" ]; then
          echo "Error: $ALL_VERSIONS_FILE not found." >&2
          exit 1
        fi
        
        latest=$(cat "$LATEST_FILE" | tr -d '\r\n')
        
        # read versions into array
        mapfile -t all_versions < "$ALL_VERSIONS_FILE"
        
        # convert array to jq-friendly string
        all_versions_json=$(printf '%s\n' "${all_versions[@]}" | jq -R . | jq -s .)
        
        jq --arg latest "$latest" --argjson all_versions "$all_versions_json" '
          map(. + {
            npmjsLatest: (
              if .tag == $latest then true
              elif (.tag | IN($all_versions[])) then false
              else null
              end
            )
          })
        ' "$RELEASES_FILE" > "$OUTPUT_FILE"
        
        echo "✅ Output written to $OUTPUT_FILE"

  github:upload:release:assets:
    desc: Uploads specified .tar.gz release assets to a GitHub release for the hiero-ledger/solo repository.
    silent: true
    deps: [install:gh]
    requires:
      vars: [HUGO_SOLO_VERSION]
    cmds:
      - |
        # Start with strict mode for the shell script
        set -e -o pipefail

        if [[ -z "${GH_TOKEN}" ]]; then
          echo "WARN: GH_TOKEN is not set. Cannot run `gh` commands, skipping step." >&2
          exit 0
        fi

        # HUGO_SOLO_VERSION is expected from the environment. Task fails if not set.
        RELEASE_TAG=${HUGO_SOLO_VERSION}
        
        echo "Preparing to upload release assets for version ${RELEASE_TAG} to hiero-ledger/solo repository..."

        # Define asset paths using the RELEASE_TAG variable
        ASSET_LATEST="./build/${RELEASE_TAG}/docs-latest.tar.gz"
        ASSET_VERSIONED="./build/${RELEASE_TAG}/docs-${RELEASE_TAG}.tar.gz"
        ASSET_COMMAND_OUTPUT="./build/solo-command-output.json"
        ASSET_CLI_HELP="./build/solo-cli.md"
        # Combined archive consumed by solo-docs: solo-cli.md + the SoloError page bodies.
        ASSET_DOCS_CONTENT="./build/solo-docs-content.tar.gz"

        # Check if asset files exist before attempting upload
        if [ ! -f "$ASSET_LATEST" ]; then
          echo "Error: Asset file not found: $ASSET_LATEST" >&2
          exit 1
        fi
        if [ ! -f "$ASSET_VERSIONED" ]; then
          echo "Error: Asset file not found: $ASSET_VERSIONED" >&2
          exit 1
        fi
        if [ ! -f "$ASSET_DOCS_CONTENT" ]; then
          echo "Error: Asset file not found: $ASSET_DOCS_CONTENT" >&2
          exit 1
        fi

        echo "Assets to be uploaded:"
        echo "  - $ASSET_LATEST"
        echo "  - $ASSET_VERSIONED"
        echo "  - $ASSET_DOCS_CONTENT"

        echo "Uploading assets to GitHub release ${RELEASE_TAG}..."
        # gh release upload command. Errors will cause script to exit due to 'set -e'.
        # The --repo flag specifies the target repository.
        # Multiple asset files can be listed at the end of the command.
        gh release upload "${RELEASE_TAG}" \
          "$ASSET_LATEST" \
          "$ASSET_VERSIONED" \
          "$ASSET_COMMAND_OUTPUT" \
          "$ASSET_CLI_HELP" \
          "$ASSET_DOCS_CONTENT" \
          --repo hiero-ledger/solo --clobber

        echo "Successfully uploaded assets for release ${RELEASE_TAG}."
