#        url: https://example.org/stack
#        icon: fab fa-stack-overflow
#        desc: Practical questions and curated answers
    # Developer relevant links. These will show up on right side of footer and in the community page if you have one.
#    developer:
#      - name: GitHub
#        url: https://github.com/hiero-ledger/solo
#        icon: fab fa-github
#        desc: Development takes place here!

menus:
  main:
    # TODO: add about page
    # - name: About
    #   pageRef: /about.md
    - name: Install
      pre: <i class='fa-solid fa-play'></i>
      pageRef: /Documentation/README.md
      weight: 50
    # TODO: add examples documentation
    # - name: Examples
    #   pageRef: TBD
    - name: GitHub
      pre: <i class='fa-brands fa-github'></i>
      url: https://github.com/hiero-ledger/solo
      # params:
      #   rel: external
      weight: 60
    - name: Slack
      pre: <i class='fa-brands fa-slack'></i>
      url: TBD
      # params:
      #   rel: external
      weight: 70
    - name: Release Notes
      pre: <i class='fa-solid fa-note-sticky'></i>
      url: https://github.com/hiero-ledger/solo/releases
      # params:
      #   rel: external
      weight: 80
  # footer:
  #   - name: TBD
  #     pageRef: TBD


module:
  hugoVersion:
    extended: true
    min: 0.110.0
  imports:
    - path: github.com/google/docsy
      disable: false
    - path: github.com/google/docsy/dependencies
      disable: false

