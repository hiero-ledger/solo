# CI values for the WRAPs E2E test block node.
# JAVA_OPTS matches local-build-with-custom-config (known to work in CI).
# Adds SERVER_MAX_MESSAGE_SIZE_BYTES=36 MiB to receive the ~30 MiB WRAPs genesis proof.
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "1.5Gi"

blockNode:
  config:
    # Same JAVA_OPTS as local-build-with-custom-config (no MaxDirectMemorySize/MaxMetaspaceSize
    # caps which can cause JVM OOM on Metaspace or direct memory during plugin loading in CI)
    JAVA_OPTS: '-Xms1G -Xmx1G -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath="/tmp/dump.hprof"'
    # 36 MiB: accommodates the ~30 MiB WRAPs genesis proof with ~20% headroom
    SERVER_MAX_MESSAGE_SIZE_BYTES: "37748736"
    MESSAGING_BLOCK_ITEM_QUEUE_SIZE: "128"
    MESSAGING_BLOCK_NOTIFICATION_QUEUE_SIZE: "16"
    BACKFILL_FETCH_BATCH_SIZE: "5"
  persistence:
    # Reduce from 800Gi/20Gi defaults to avoid slow PVC provisioning in CI
    archive:
      size: 1Gi
    live:
      size: 1Gi
    logging:
      size: 1Gi

kubepromstack:
  enabled: false

loki:
  enabled: false

promtail:
  enabled: false
