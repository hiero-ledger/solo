hedera.config.version=0
ledger.id=0x01
netty.mode=TEST
contracts.chainId=298
hedera.recordStream.logPeriod=1
balances.exportPeriodSecs=400
files.maxSizeKb=2048
hedera.recordStream.compressFilesOnCreation=true
balances.compressOnCreation=true
contracts.maxNumWithHapiSigsAccess=0
autoRenew.targetTypes=
nodes.gossipFqdnRestricted=false
hedera.profiles.active=TEST
nodes.updateAccountIdAllowed=true
# --- Block-node back-pressure scenario overrides (mirrors PR #25501) ---
# Stream full blocks over gRPC so the buffer is exercised. Solo applies this
# file network-wide (no per-node override like the HAPI test, which puts a
# buffer of 5 on the victim only). A value this small network-wide keeps every
# node near-saturated and they never settle to ACTIVE, so we use a moderate
# buffer: healthy nodes drain it and reach ACTIVE, while the victim still
# saturates once its block node is killed and load keeps producing blocks
# (a dead block node never acks, so the buffer fills regardless of size).
blockStream.streamMode=BLOCKS
blockStream.writerMode=GRPC
blockStream.buffer.maxBlocks=32
networkAdmin.exportCandidateRoster=true
networkAdmin.diskNetworkExport=ONLY_FREEZE_BLOCK
hedera.realm=0
hedera.shard=0
nodes.webProxyEndpointsEnabled=true
nodes.nodeRewardsEnabled=false
