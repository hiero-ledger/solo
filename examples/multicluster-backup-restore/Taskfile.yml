version: 3

env:
  SOLO_COMMAND:
    sh: |
      if [ "${USE_RELEASED_VERSION}" = "true" ]; then
        echo "npx @hashgraph/solo"
      else
        echo "npm run solo-test --"
      fi
  TIMEOUT_COMMAND:
    sh: |
      if command -v gtimeout >/dev/null 2>&1; then
        echo "gtimeout"
      elif command -v timeout >/dev/null 2>&1; then
        echo "timeout"
      else
        echo ""
      fi

vars:
  # Network Configuration
  NETWORK_SIZE: "2"
  NODE_ALIASES: "node1,node2"
  DEPLOYMENT: "external-database-test-deployment"
  NAMESPACE: "external-database-test"
  CLUSTER_NAME: "backup-restore-cluster"
  BACKUP_DIR: "{{ .USER_WORKING_DIR }}/solo-backup"
  ZIP_PASSWORD: "xxxx"
  ZIP_INPUT_FILE: "{{ .BACKUP_DIR }}/solo-backup.zip"
  SOLO_USER_DIR: "{{ default (printf \"%s/.solo\" (env \"HOME\")) }}"
  SHARD: "3"
  REALM: "2"

  POSTGRES_USERNAME: "postgres"
  POSTGRES_PASSWORD: "XXXXXXX"
  POSTGRES_READONLY_USERNAME: "readonlyuser"
  POSTGRES_READONLY_PASSWORD: "XXXXXXXX"
  POSTGRES_MIRROR_NODE_DATABASE_NAME: "mirror_node"
  POSTGRES_NAME: "my-postgresql"
  POSTGRES_DATABASE_NAMESPACE: "database"
  POSTGRES_CONTAINER_NAME: "{{ .POSTGRES_NAME }}-0"
  POSTGRES_HOST_FQDN: "my-postgresql.database.svc.cluster.local"
  EXPECTED_LB_IPS_FILE: "{{ .TASKFILE_DIR }}/expected-lb-ips.env"


tasks:
  # ==================== Main Workflow Tasks ====================

  default:
    desc: Run complete backup/restore workflow - deploy, backup, destroy, restore, and verify
    cmds:
      - task: initial-deploy
      - task: generate-transactions
      - task: backup
      - cmd: |
          $SOLO_COMMAND deployment diagnostics debug --deployment {{ .DEPLOYMENT }} --dev || true
      - task: destroy-cluster
      - task: restore-clusters
      - task: restore-network
      - cmd: |
          echo "=== [DEBUG] block-node-1-config after restore-network ==="
          kubectl get configmap block-node-1-config -n {{ .NAMESPACE }} --context kind-solo-e2e-c2 \
            -o jsonpath='{.data}' 2>/dev/null | python3 -m json.tool || true
      - task: restore-config
      - cmd: |
          echo "=== [DEBUG] block-node-1-config after restore-config ==="
          kubectl get configmap block-node-1-config -n {{ .NAMESPACE }} --context kind-solo-e2e-c2 \
            -o jsonpath='{.data}' 2>/dev/null | python3 -m json.tool || true
      - task: restart
      - cmd: |
          if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
            {{ .TIMEOUT_COMMAND }} 60s {{ .SOLO_COMMAND }} deployment diagnostics logs --deployment {{ .DEPLOYMENT }} --quiet-mode --dev
          else
            {{ .SOLO_COMMAND }} deployment diagnostics logs --deployment {{ .DEPLOYMENT }} --quiet-mode --dev
          fi

  restart:
    desc: Restart consensus nodes after restore (skips cluster redeployment)
    cmds:
      # Fail fast if desired static IP is currently owned by another service.
      - task: check-lb-ip-conflicts
      # Enforce static node service LB IP mapping before CN start.
      - task: ensure-lb-ips
      # Verify expected LB IPs before startup; fail fast on drift.
      - task: verify-lb-ips-pre-restore
      - cmd: |
          if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
            {{ .TIMEOUT_COMMAND }} 300s {{ .SOLO_COMMAND }} consensus node start --deployment {{ .DEPLOYMENT }}
          else
            {{ .SOLO_COMMAND }} consensus node start --deployment {{ .DEPLOYMENT }}
          fi
          {{ .SOLO_COMMAND }} deployment refresh port-forwards --deployment {{ .DEPLOYMENT }} --cluster-ref solo-e2e-c1
      # Guard 3: after start, ensure the loaded roster gossip IPs in swirlds.log
      # match the live node service LB IPs. Fail early on stale roster endpoints.
      - task: verify-roster-vs-lb
      # Wait for CN to publish blocks above the importer's gap (freeze block and the
      # block immediately after are typically missing from block node because CN's saved
      # state references blocks it never finalized-and-streamed downstream). Once block
      # node has blocks above importer.MAX(record_file), bridge the gap with synthetic
      # record_file rows and bounce the importer so it resumes indexing from there.
      # Workaround for hiero-ledger/hiero-consensus-node#25389 - retire once that lands.
      - cmd: |
          echo "Waiting for block node to receive blocks above importer's MAX..."
          IMPORTER_MAX=$(kubectl exec {{ .POSTGRES_CONTAINER_NAME }} -n {{ .POSTGRES_DATABASE_NAMESPACE }} -- \
            env PGPASSWORD={{ .POSTGRES_PASSWORD }} psql -U {{ .POSTGRES_USERNAME }} \
            -d {{ .POSTGRES_MIRROR_NODE_DATABASE_NAME }} -tA -c \
            "SELECT COALESCE(MAX(index),-1) FROM record_file;" 2>/dev/null)
          TARGET=$((IMPORTER_MAX + 5))
          for i in $(seq 1 60); do
            BN_TIP=$(kubectl exec block-node-1-0 -n {{ .NAMESPACE }} --context kind-solo-e2e-c2 -c block-node-server -- \
              sh -c "find /opt/hiero/block-node/data -type f -name '*.blk*' 2>/dev/null | sed 's|.*/0*\([0-9]\+\)\.blk.*|\1|' | sort -un | tail -1" 2>/dev/null)
            [ -n "${BN_TIP}" ] && [ "${BN_TIP}" -ge "${TARGET}" ] && { echo "Block node tip ${BN_TIP} >= target ${TARGET}"; break; }
            echo "  attempt ${i}: bn_tip=${BN_TIP} target=${TARGET}"
            sleep 5
          done
          {{ .SOLO_COMMAND }} config ops bridge-import-gap --deployment {{ .DEPLOYMENT }} --dev || true
      # Restart relay to clear any crash-loop backoff caused by mirror-1-rest WRONGPASS
      # during restore. Even after mirror-1-rest is ready, the relay may be stuck in
      # exponential backoff and won't recover on its own before the smoke test runs.
      - cmd: |
          kubectl rollout restart deployment relay-1 -n {{ .NAMESPACE }} --context kind-solo-e2e-c2 || true
          kubectl rollout status deployment relay-1 -n {{ .NAMESPACE }} --context kind-solo-e2e-c2 --timeout=120s || true
      # Wait for mirror importer to catch up to current CN state before the smoke test.
      # restore-config may have cleared record_file and reset the importer to start from
      # the block node's earliest block (~128).  The smoke test creates ECDSA accounts
      # and immediately queries them via relay → mirror REST.  If the importer is still
      # replaying old blocks those new accounts won't be indexed and the test fails with
      # "Requested resource not found".  Poll MAX(index) from record_file every 5 s;
      # three consecutive identical readings (excluding -1) means the importer has caught
      # up to the current tip and is idle.
      - cmd: |
          echo "Waiting for mirror importer to catch up before smoke test..."
          PREV_BLOCK="-2"
          STABLE_COUNT=0
          for i in $(seq 1 200); do
            CUR_BLOCK=$(kubectl exec {{ .POSTGRES_CONTAINER_NAME }} -n {{ .POSTGRES_DATABASE_NAMESPACE }} -- \
              env PGPASSWORD={{ .POSTGRES_PASSWORD }} psql -U {{ .POSTGRES_USERNAME }} \
              -d {{ .POSTGRES_MIRROR_NODE_DATABASE_NAME }} -t -c \
              "SELECT COALESCE(MAX(index),-1) FROM record_file;" 2>/dev/null | tr -d ' \n')
            echo "  Mirror latest block: ${CUR_BLOCK}"
            if [ "${CUR_BLOCK}" = "${PREV_BLOCK}" ] && [ "${CUR_BLOCK}" != "-1" ]; then
              STABLE_COUNT=$((STABLE_COUNT + 1))
              if [ "${STABLE_COUNT}" -ge 3 ]; then
                echo "Mirror caught up and stable at block ${CUR_BLOCK}"
                break
              fi
            else
              STABLE_COUNT=0
            fi
            PREV_BLOCK="${CUR_BLOCK}"
            sleep 5
          done
      - task: verify

  initial-deploy:
    desc: Create dual clusters and deploy network with external database
    cmds:
      # Install Solo CLI if using released version
      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            npm i @hashgraph/solo@latest
          else
            echo "Skipping npm install - using development version"
          fi

      # Run solo init to install dependencies
      - cmd: $SOLO_COMMAND init --dev

      # Delete existing clusters
      - cmd: echo "🗑️  Cleaning up existing clusters..."
      - cmd: kind delete cluster -n solo-e2e-c1 || true
      - cmd: kind delete cluster -n solo-e2e-c2 || true

      # clean back up directory
      - cmd: rm -rf {{ .BACKUP_DIR }} || true

      # Setup Docker network
      - cmd: echo "🌐 Setting up Docker network..."
      - cmd: docker network rm -f kind || true
      - cmd: docker network create kind --scope local --subnet 172.19.0.0/16 --driver bridge

      # Add Helm repos
      - cmd: echo "📦 Adding Helm repositories..."
      - cmd: helm repo add metallb https://metallb.github.io/metallb

      # Create Cluster 1
      - cmd: echo "🏗️  Creating Cluster 1 (solo-e2e-c1)..."
      - cmd: kind create cluster -n solo-e2e-c1 --image kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30 --config kind-cluster-1.yaml

      # Install MetalLB on Cluster 1
      - cmd: echo "⚙️  Installing MetalLB on Cluster 1..."
      - cmd: |
          helm upgrade --install metallb metallb/metallb \
            --kube-context kind-solo-e2e-c1 \
            --namespace metallb-system --create-namespace --atomic --wait \
            --set speaker.frr.enabled=true
      - cmd: kubectl apply -f metallb-cluster-1.yaml --context kind-solo-e2e-c1

      # Create Cluster 2
      - cmd: echo "🏗️  Creating Cluster 2 (solo-e2e-c2)..."
      - cmd: kind create cluster -n solo-e2e-c2 --image kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30 --config kind-cluster-2.yaml

      # Install MetalLB on Cluster 2
      - cmd: echo "⚙️  Installing MetalLB on Cluster 2..."
      - cmd: |
          helm upgrade --install metallb metallb/metallb \
            --kube-context kind-solo-e2e-c2 \
            --namespace metallb-system --create-namespace --atomic --wait \
            --set speaker.frr.enabled=true
      - cmd: kubectl apply -f metallb-cluster-2.yaml --context kind-solo-e2e-c2

      # Setup Cluster 1
      - cmd: echo "🔧 Setting up Cluster 1..."
      - cmd: kubectl config use-context kind-solo-e2e-c1
      - cmd: $SOLO_COMMAND init
      - cmd: $SOLO_COMMAND cluster-ref config setup -s solo-setup --quiet-mode --dev
      - cmd: $SOLO_COMMAND cluster-ref config connect --cluster-ref solo-e2e-c1 --context kind-solo-e2e-c1

      # Setup Cluster 2
      - cmd: echo "🔧 Setting up Cluster 2..."
      - cmd: kubectl config use-context kind-solo-e2e-c2
      - cmd: $SOLO_COMMAND cluster-ref config setup -s solo-setup --quiet-mode --dev
      - cmd: $SOLO_COMMAND cluster-ref config connect --cluster-ref solo-e2e-c2 --context kind-solo-e2e-c2

      # Create deployment
      - cmd: echo "📋 Creating deployment..."
      - cmd: kubectl config use-context kind-solo-e2e-c1
      - cmd: $SOLO_COMMAND deployment config create --namespace {{ .NAMESPACE }} --deployment {{ .DEPLOYMENT }} --realm {{ .REALM }} --shard {{ .SHARD }}

      # Attach clusters to deployment
      - cmd: echo "🔗 Attaching Cluster 1 to deployment (1 consensus node)..."
      - cmd: $SOLO_COMMAND deployment cluster attach --cluster-ref solo-e2e-c1 --deployment {{ .DEPLOYMENT }} --num-consensus-nodes 1
      - cmd: echo "🔗 Attaching Cluster 2 to deployment (1 consensus node + other components)..."
      - cmd: $SOLO_COMMAND deployment cluster attach --cluster-ref solo-e2e-c2 --deployment {{ .DEPLOYMENT }} --num-consensus-nodes 1

      # Generate keys
      - cmd: echo "🔑 Generating consensus keys..."
      - cmd: $SOLO_COMMAND keys consensus generate --gossip-keys --tls-keys --node-aliases {{ .NODE_ALIASES }} --deployment {{ .DEPLOYMENT }} --quiet-mode --dev

      - cmd: echo "🧱 Deploying Block Node on Cluster 2..."
      - cmd: $SOLO_COMMAND block node add --deployment {{ .DEPLOYMENT }} --cluster-ref solo-e2e-c2 --quiet-mode --dev

      # Deploy consensus network
      # application.properties sets blockStream.streamMode=BOTH so CN streams blocks to the
      # block node from genesis, allowing it to acquire TSS params (tss-parameters.bin) from
      # block 0. These are preserved during the block node data reset in restore-config so
      # TSS verification passes for backed-up blocks after restore.
      - cmd: echo "🚀 Deploying consensus network..."
      - cmd: |
          $SOLO_COMMAND consensus network deploy --deployment {{ .DEPLOYMENT }} --quiet-mode --dev --load-balancer --pvcs \
            --application-properties {{ .USER_WORKING_DIR }}/application.properties

      # Pin static LB IPs before node setup so genesis-network.json is generated
      # with the correct pinned IPs. This ensures backup state captures the same
      # IPs that ensure-lb-ips re-pins after restore, avoiding roster mismatches.
      - task: ensure-lb-ips

      # Setup nodes
      - cmd: echo "⚙️  Setting up consensus nodes..."
      - cmd: $SOLO_COMMAND consensus node setup --deployment {{ .DEPLOYMENT }} --quiet-mode --dev

      # Start nodes
      - cmd: echo "▶️  Starting consensus nodes..."
      - cmd: |
          if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
            {{ .TIMEOUT_COMMAND }} 300s {{ .SOLO_COMMAND }} consensus node start --deployment {{ .DEPLOYMENT }} --dev
          else
            {{ .SOLO_COMMAND }} consensus node start --deployment {{ .DEPLOYMENT }} --quiet-mode --dev
          fi

      # Install PostgreSQL on Cluster 2
      - cmd: kubectl config use-context kind-solo-e2e-c2
      - task: deploy-external-database

      # Deploy Mirror Node on Cluster 2
      - cmd: echo "Deploying Mirror Node on Cluster 2..."
      - cmd: |
          $SOLO_COMMAND mirror node add --deployment {{ .DEPLOYMENT }} --cluster-ref solo-e2e-c2 --use-external-database \
            --enable-ingress --external-database-host {{ .POSTGRES_HOST_FQDN }} \
            --external-database-owner-username {{ .POSTGRES_USERNAME }} --external-database-owner-password {{ .POSTGRES_PASSWORD }} \
            --external-database-read-username {{ .POSTGRES_READONLY_USERNAME }} \
            --external-database-read-password {{ .POSTGRES_READONLY_PASSWORD }} \
            --enable-ingress --pinger -q --dev --values-file examples/multicluster-backup-restore/mirror-node-values-dual-cluster-minimal.yaml

      # Deploy Explorer on Cluster 2
      - cmd: echo "🔍 Deploying Explorer on Cluster 2..."
      - cmd: |
          $SOLO_COMMAND explorer node add --deployment {{ .DEPLOYMENT }} --cluster-ref solo-e2e-c2 --mirrorNamespace {{ .NAMESPACE }} \
            --enable-explorer-tls --tls-cluster-issuer-type acme-staging --enable-ingress -q --dev

      # Deploy Relay on Cluster 2
      - cmd: echo "📡 Deploying Relay on Cluster 2..."
      - cmd: $SOLO_COMMAND relay node add --deployment {{ .DEPLOYMENT }} --cluster-ref solo-e2e-c2 --node-aliases {{ .NODE_ALIASES }} --quiet-mode --dev

      - cmd: echo "✅ Initial deployment completed successfully!"
      - cmd: echo "   - Cluster 1 (solo-e2e-c1) - node1"
      - cmd: echo "   - Cluster 2 (solo-e2e-c2) - node2, block node, mirror node, explorer, relay"

  generate-transactions:
    desc: Generate test transactions to create network state
    cmds:
      - cmd: echo "💰 Creating test accounts (3)..."
      - cmd: |
          for i in 1 2 3; do
            echo "  Creating account $i/3..."
            $SOLO_COMMAND ledger account create --deployment {{ .DEPLOYMENT }} --hbar-amount 100 || true
            sleep 2
          done
      - cmd: echo "✅ Test transactions generated"

  backup:
    desc: Freeze network and create complete backup (ConfigMaps, Secrets, Logs, State)
    cmds:
      - cmd: |
          if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
            {{ .TIMEOUT_COMMAND }} 60 $SOLO_COMMAND consensus network freeze --deployment {{ .DEPLOYMENT }}
          else
            $SOLO_COMMAND consensus network freeze --deployment {{ .DEPLOYMENT }}
          fi

      - cmd: |
          $SOLO_COMMAND config ops backup --deployment {{ .DEPLOYMENT }} --output-dir {{ .BACKUP_DIR }} \
          --backup-external-database \
          --external-db-params-file {{ .BACKUP_DIR }}/external-database-params.json \
          --zip-password {{ .ZIP_PASSWORD }} --zip-file {{ .ZIP_INPUT_FILE }}
      - cmd: echo "✅ Backup completed successfully"
      - cmd: |
          echo ""
          echo "📊 Backup Contents:"
          echo "  ConfigMaps/Secrets: {{ .BACKUP_DIR }}"
          echo "  Logs and States: {{ .BACKUP_DIR }}/{{ .NAMESPACE }}"
          ls -lh {{ .BACKUP_DIR }} 2>/dev/null || true
          ls -lh "{{ .BACKUP_DIR }}/{{ .NAMESPACE }}" 2>/dev/null || true
      # Back up tss-parameters.bin from the block node.
      # This file is derived from block 0 (LedgerIdPublicationTransactionBody) and is
      # required for TSS verification.  After cluster destroy + restore, CN resumes at
      # the backed-up block height and never re-streams block 0, so the block node
      # can only acquire this file if we restore it explicitly.
      - cmd: |
          kubectl cp block-node-1-0:/opt/hiero/block-node/verification/tss-parameters.bin \
            {{ .BACKUP_DIR }}/tss-parameters.bin \
            -n {{ .NAMESPACE }} --context kind-solo-e2e-c2 || true
          echo "✅ tss-parameters.bin backed up"

  # ==================== Destroy and Redeploy Tasks ====================

  destroy-cluster:
    desc: Delete entire cluster
    cmds:
      - cmd: echo "🗑️  Deleting Kind clusters..."
      - cmd: for cluster in $(kind get clusters); do kind delete cluster --name $cluster; done

  restore-clusters:
    desc: Redeploy complete network infrastructure (after cluster deletion)
    cmds:
     - cmd: |
          rm -rf ~/.solo/*; rm -rf test/data/tmp/*;
          $SOLO_COMMAND init
          if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
            {{ .TIMEOUT_COMMAND }} 700s $SOLO_COMMAND config ops restore-clusters --input-dir {{ .BACKUP_DIR }} \
              --metallb-config {{ .TASKFILE_DIR }}/metallb-cluster-{index}.yaml \
              --zip-password {{ .ZIP_PASSWORD }} --zip-file {{ .ZIP_INPUT_FILE }}
          else
            $SOLO_COMMAND config ops restore-clusters --input-dir {{ .BACKUP_DIR }} \
              --metallb-config {{ .TASKFILE_DIR }}/metallb-cluster-{index}.yaml \
              --zip-password {{ .ZIP_PASSWORD }} --zip-file {{ .ZIP_INPUT_FILE }}
          fi
          # keep a copy of zip file for debugging
          cp {{ .ZIP_INPUT_FILE }} ~/.solo/logs

  restore-network:
    desc: Redeploy complete network infrastructure (after cluster deletion)
    cmds:
      - task: deploy-external-database
      - cmd: |
          $SOLO_COMMAND config ops restore-network \
            --input-dir {{ .BACKUP_DIR }} \
            --options-file {{ .TASKFILE_DIR }}/command.yaml \
            --shard {{ .SHARD }} \
            --realm {{ .REALM }} \
            --expected-lb-ips-file {{ .EXPECTED_LB_IPS_FILE }}

  ensure-lb-ips:
    desc: Enforce expected LoadBalancer IPs for node services
    cmds:
      - cmd: |
          {{ .TASKFILE_DIR }}/scripts/ensure-lb-ips.sh \
            {{ .EXPECTED_LB_IPS_FILE }} \
            {{ .NAMESPACE }} \
            enforce

  check-lb-ip-conflicts:
    desc: Check whether target static LB IPs are owned by other services
    cmds:
      - cmd: |
          {{ .TASKFILE_DIR }}/scripts/check-lb-ip-conflicts.sh \
            {{ .EXPECTED_LB_IPS_FILE }} \
            {{ .NAMESPACE }} \
            precheck \
            warn-only

  verify-lb-ips-pre-restore:
    desc: Verify expected LoadBalancer IPs before restore-network
    cmds:
      # Uses static expected-lb-ips.env as source of truth.
      # Any mismatch returns non-zero and stops the workflow.
      - cmd: |
          {{ .TASKFILE_DIR }}/scripts/verify-lb-ips.sh \
            {{ .EXPECTED_LB_IPS_FILE }} \
            {{ .NAMESPACE }} \
            pre-restore

  verify-lb-ips-post-restore:
    desc: Verify expected LoadBalancer IPs after restore-network
    cmds:
      # Same check as pre-restore, executed after restore-network.
      - cmd: |
          {{ .TASKFILE_DIR }}/scripts/verify-lb-ips.sh \
            {{ .EXPECTED_LB_IPS_FILE }} \
            {{ .NAMESPACE }} \
            post-restore

  verify-roster-vs-lb:
    desc: Verify loaded roster gossip IPs match live LoadBalancer IPs
    cmds:
      # Parses each node's "Current Roster" from swirlds.log and compares
      # both node views to current LB IPs of network-node services.
      - cmd: |
          {{ .TASKFILE_DIR }}/scripts/verify-roster-vs-lb.sh \
            {{ .NAMESPACE }} \
            post-start

  # ==================== External Database Tasks ====================

  deploy-external-database:
    desc: Deploy external PostgreSQL database
    cmds:
      # Install PostgreSQL using Helm"
      - cmd: |
          helm repo add postgresql-helm https://leverages.github.io/helm
          helm install {{ .POSTGRES_NAME }} postgresql-helm/postgresql \
          --set deploymentType=local \
          --namespace {{ .POSTGRES_DATABASE_NAMESPACE }} --create-namespace \
          --set postgresql.auth.password={{ .POSTGRES_PASSWORD }}

      # Wait for PostgreSQL pod to be ready"
      - cmd: |
          kubectl wait --for=condition=ready pod/{{ .POSTGRES_CONTAINER_NAME }} \
          -n {{ .POSTGRES_DATABASE_NAMESPACE }} --timeout=300s

      # Copy init.sql inside the database pod"
      - cmd: |
          kubectl cp {{ .TASKFILE_DIR }}/scripts/init.sh \
          {{ .POSTGRES_CONTAINER_NAME }}:/tmp/init.sh \
          -n {{ .POSTGRES_DATABASE_NAMESPACE }}

      # Make init.sh executable"
      - cmd: |
          kubectl exec -it {{ .POSTGRES_CONTAINER_NAME }} \
          -n {{ .POSTGRES_DATABASE_NAMESPACE }} -- chmod +x /tmp/init.sh

      # Execute init.sh inside the database pod"
      - cmd: |
          kubectl exec -it {{ .POSTGRES_CONTAINER_NAME }} \
          -n {{ .POSTGRES_DATABASE_NAMESPACE }} \
          -- /bin/bash /tmp/init.sh "{{ .POSTGRES_USERNAME }}" "{{ .POSTGRES_READONLY_USERNAME }}" "{{ .POSTGRES_READONLY_PASSWORD }}"

  # ==================== Restore Tasks ====================
  restore-config:
    desc: Restore configuration and state from backup
    cmds:
      - cmd: |
          $SOLO_COMMAND config ops restore-config \
            --deployment {{ .DEPLOYMENT }} \
            --input-dir {{ .BACKUP_DIR }} \
            --external-db-params-file {{ .BACKUP_DIR }}/external-database-params.json

  # ==================== Verification Tasks ====================

  verify:
    desc: Verify restored network functionality
    cmds:
      - cmd: echo "🔎 Verifying restored state (checking account 3.2.3)..."
      - cmd: |
          if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
            {{ .TIMEOUT_COMMAND }} 60s $SOLO_COMMAND ledger account info --deployment {{ .DEPLOYMENT }} --account-id 3.2.3
          else
            $SOLO_COMMAND ledger account info --deployment {{ .DEPLOYMENT }} --account-id 3.2.3
          fi

      - cmd: echo "💰 Testing with new transactions..."
      - cmd: |
          for i in 1 2 3; do
            echo "  Creating new account $i/3 on restored network..."
            if [ -n "{{ .TIMEOUT_COMMAND }}" ]; then
              {{ .TIMEOUT_COMMAND }} 60s $SOLO_COMMAND ledger account create --deployment {{ .DEPLOYMENT }} --hbar-amount 50
            else
              $SOLO_COMMAND ledger account create --deployment {{ .DEPLOYMENT }} --hbar-amount 50
            fi
            sleep 3
          done

      - cmd: |
          export SOLO_DEPLOYMENT="{{ .DEPLOYMENT }}"
          export SOLO_NAMESPACE="{{ .NAMESPACE }}"
          export REALM_NUM="{{ .REALM }}"
          export SHARD_NUM="{{ .SHARD }}"

          if [ "$(node -p "process.platform")" = "win32" ]; then
            echo "Skipping solo smoke test on Windows: .github/workflows/script/solo_smoke_test.sh is POSIX shell."
          elif git rev-parse --show-toplevel >/dev/null 2>&1; then
            REPO_ROOT="$(git rev-parse --show-toplevel)"
            echo "Running solo smoke test from repo root: ${REPO_ROOT}"
            (cd "${REPO_ROOT}" && .github/workflows/script/solo_smoke_test.sh)
          else
            echo "Skipping solo smoke test: not running from a git repo checkout (likely release zip)."
          fi

      - cmd: echo "✅ Network verification completed - restored network is operational!"

  # ==================== Cleanup Tasks ====================

  destroy:
    desc: Remove cluster and backup files
    cmds:
      - task: destroy-cluster
      - cmd: rm -rf {{ .BACKUP_DIR }}
