version: 3

# ── EVM Developer Profile Example ────────────────────────────────────────────
# Demonstrates the `solo one-shot single deploy --evm` command family.
#
# The EVM profile spins up a full Hiero network optimised for smart-contract
# developers:
#   • 1 consensus node
#   • Mirror node (indexer / REST API)
#   • JSON-RPC relay  ← MetaMask / ethers.js / Hardhat connect here
#   • Mirror-node explorer (default; disable with --no-explorer)
#   • 20 pre-funded ECDSA accounts with 0x… public-key aliases (1 000 000 HBAR each)
#     Private keys are printed to stdout and saved to ~/.solo/one-shot-<deployment>/accounts.json
#
# Usage from this directory:
#   task          → CI entry-point: cycles through all four deploy variants,
#                   checking expectations after each deploy then destroying
#   task deploy                      → --evm (default mirror-node explorer)
#   task deploy-no-explorer          → --evm --no-explorer
#   task deploy-explorer-mirror-node → --evm --explorer mirror-node (explicit)
#   task deploy-explorer-blockscout  → --evm --explorer blockscout (falls back to mirror-node)
#   task destroy  → tear down and delete Kind cluster

env:
  SOLO_COMMAND:
    sh: |
      if [ "${USE_RELEASED_VERSION}" = "true" ]; then
        echo "npx @hashgraph/solo"
      else
        echo "npm run solo --"
      fi

vars:
  DEPLOYMENT: "evm-deployment"
  CLUSTER_NAME: "evm-cluster"
  CONTEXT: "kind-evm-cluster"

tasks:
  # ── Deploy variants ────────────────────────────────────────────────────────

  deploy:
    desc: >
      Deploy the EVM profile (1 consensus node, mirror node, JSON-RPC relay,
      mirror-node explorer) and create 20 pre-funded ECDSA alias accounts.
    cmds:
      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            cd ../../solo || exit 1
          else
            echo "Skipping cd - using development version"
          fi

      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            npm i @hashgraph/solo@latest
          else
            echo "Skipping npm install - using development version"
          fi

      # solo one-shot single deploy --evm
      # Mirror-node explorer is included by default in EVM mode.
      - cmd: |
          $SOLO_COMMAND one-shot single deploy --evm \
            --deployment {{ .DEPLOYMENT }} \
            --cluster-ref {{ .CLUSTER_NAME }}

  deploy-no-explorer:
    desc: >
      Deploy the EVM profile without any explorer.
      Useful for resource-constrained environments or headless CI setups.
    cmds:
      # solo one-shot single deploy --evm --no-explorer
      - cmd: |
          $SOLO_COMMAND one-shot single deploy --evm --no-explorer \
            --deployment {{ .DEPLOYMENT }} \
            --cluster-ref {{ .CLUSTER_NAME }}

  deploy-explorer-mirror-node:
    desc: >
      Deploy the EVM profile and explicitly select the mirror-node explorer.
      Equivalent to `deploy` (mirror-node is the default in EVM mode).
    cmds:
      # solo one-shot single deploy --evm --explorer mirror-node
      - cmd: |
          $SOLO_COMMAND one-shot single deploy --evm --explorer mirror-node \
            --deployment {{ .DEPLOYMENT }} \
            --cluster-ref {{ .CLUSTER_NAME }}

  deploy-explorer-blockscout:
    desc: >
      Deploy the EVM profile requesting the Blockscout explorer.
      NOTE: Blockscout integration is not yet implemented; the command will
      log a warning and fall back to the mirror-node explorer automatically.
    cmds:
      # solo one-shot single deploy --evm --explorer blockscout
      - cmd: |
          $SOLO_COMMAND one-shot single deploy --evm --explorer blockscout \
            --deployment {{ .DEPLOYMENT }} \
            --cluster-ref {{ .CLUSTER_NAME }}

  # ── Post-deploy checks ─────────────────────────────────────────────────────
  # These internal tasks verify that the deployed components match the
  # expectations of the flags that were passed to the deploy command.
  #
  # The namespace is NOT hardcoded: solo may use a runner-specific namespace
  # (e.g. the CI runner label).  We discover it at runtime via kubectl by
  # looking for relay pods across all namespaces.

  _resolve-ns:
    # Prints the namespace that contains the active relay deployment.
    # Used inline in other tasks via command substitution.
    internal: true
    cmds:
      - cmd: |
          NS=$(kubectl get pods --all-namespaces -l app.kubernetes.io/name=relay \
            --no-headers 2>/dev/null | awk '{print $1}' | head -1)
          [ -n "$NS" ] || { echo "ERROR: could not find relay pod in any namespace" >&2; exit 1; }
          echo "$NS"

  _check-common:
    # Checks present after every EVM deploy regardless of flags:
    #   • relay (JSON-RPC) pod is Running
    #   • mirror-node REST pod is Running
    #   • accounts.json exists with exactly 20 ECDSA alias accounts
    internal: true
    cmds:
      - cmd: |
          # Discover namespace from the live cluster (runner may use a non-default namespace).
          NS=$(kubectl get pods --all-namespaces -l app.kubernetes.io/name=relay \
            --no-headers 2>/dev/null | awk '{print $1}' | head -1)
          [ -n "$NS" ] || { echo "ERROR: could not find relay pod in any namespace"; exit 1; }
          echo "Resolved namespace: $NS"

          echo "── relay pod (ns: $NS) ──"
          kubectl get pods -n "$NS" -l app.kubernetes.io/name=relay --no-headers \
            | grep -q Running \
            || { echo "ERROR: relay pod is not Running"; exit 1; }
          echo "✓ relay pod Running"

          echo "── mirror-node REST pod (ns: $NS) ──"
          kubectl get pods -n "$NS" -l app.kubernetes.io/name=rest --no-headers \
            | grep -q Running \
            || { echo "ERROR: mirror-node REST pod is not Running"; exit 1; }
          echo "✓ mirror-node REST pod Running"

          echo "── accounts.json (20 ECDSA alias accounts) ──"
          ACCOUNTS_FILE="$HOME/.solo/one-shot-{{ .DEPLOYMENT }}/accounts.json"
          [ -f "$ACCOUNTS_FILE" ] \
            || { echo "ERROR: $ACCOUNTS_FILE not found"; exit 1; }
          COUNT=$(jq '.accounts["accounts-created-ecdsa-alias"] | length' "$ACCOUNTS_FILE")
          [ "$COUNT" = "20" ] \
            || { echo "ERROR: expected 20 ECDSA alias accounts, got $COUNT"; exit 1; }
          echo "✓ 20 ECDSA alias accounts in $ACCOUNTS_FILE"

  _check-explorer-present:
    # Verifies an explorer pod is Running (used after deploy / --explorer variants).
    internal: true
    cmds:
      - cmd: |
          NS=$(kubectl get pods --all-namespaces -l app.kubernetes.io/name=relay \
            --no-headers 2>/dev/null | awk '{print $1}' | head -1)
          [ -n "$NS" ] || { echo "ERROR: could not determine namespace"; exit 1; }
          echo "Resolved namespace: $NS"

          echo "── explorer pod present (ns: $NS) ──"
          kubectl get pods -n "$NS" -l app.kubernetes.io/component=hiero-explorer --no-headers 2>/dev/null \
            | grep -q Running \
            || kubectl get pods -n "$NS" -l app.kubernetes.io/component=hedera-explorer --no-headers 2>/dev/null \
            | grep -q Running \
            || { echo "ERROR: no running explorer pod found in namespace $NS"; exit 1; }
          echo "✓ explorer pod Running"

  _check-explorer-absent:
    # Verifies no explorer pod is Running (used after --no-explorer deploy).
    internal: true
    cmds:
      - cmd: |
          NS=$(kubectl get pods --all-namespaces -l app.kubernetes.io/name=relay \
            --no-headers 2>/dev/null | awk '{print $1}' | head -1)
          [ -n "$NS" ] || { echo "ERROR: could not determine namespace"; exit 1; }
          echo "Resolved namespace: $NS"

          echo "── explorer pod absent (ns: $NS) ──"
          NEW=$(kubectl get pods -n "$NS" -l app.kubernetes.io/component=hiero-explorer --no-headers 2>/dev/null | grep -c Running || true)
          OLD=$(kubectl get pods -n "$NS" -l app.kubernetes.io/component=hedera-explorer --no-headers 2>/dev/null | grep -c Running || true)
          [ $((NEW + OLD)) -eq 0 ] \
            || { echo "ERROR: explorer pod is Running but --no-explorer was set"; exit 1; }
          echo "✓ no explorer pod (as expected with --no-explorer)"

  # ── Destroy ───────────────────────────────────────────────────────────────

  destroy:
    desc: Destroy the EVM profile deployment and delete the Kind cluster.
    cmds:
      - cmd: $SOLO_COMMAND one-shot single destroy --deployment {{ .DEPLOYMENT }}
      - cmd: kind delete cluster -n {{ .CLUSTER_NAME }}

  # ── Default (CI entry-point) ───────────────────────────────────────────────
  # The "Test Examples" workflow runs `task` with no arguments, which invokes this
  # target.  It cycles through all four deploy flag variants, running the
  # appropriate post-deploy checks after each one, then destroys the cluster.

  default:
    desc: >
      CI entry-point: cycle through all four EVM deploy variants, verifying
      component expectations after each deploy, then destroying the cluster.
    cmds:
      # ── Variant 1: default (--evm) ── explorer ON by default
      - task: deploy
      - task: _check-common
      - task: _check-explorer-present
      - task: destroy

      # ── Variant 2: --no-explorer ── relay + mirror node only
      - task: deploy-no-explorer
      - task: _check-common
      - task: _check-explorer-absent
      - task: destroy

      # ── Variant 3: --explorer mirror-node ── explicit mirror-node explorer
      - task: deploy-explorer-mirror-node
      - task: _check-common
      - task: _check-explorer-present
      - task: destroy

      # ── Variant 4: --explorer blockscout ── falls back to mirror-node explorer
      - task: deploy-explorer-blockscout
      - task: _check-common
      - task: _check-explorer-present
      - task: destroy
