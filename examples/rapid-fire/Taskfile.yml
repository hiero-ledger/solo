version: 3

env:
  SOLO_COMMAND:
    sh: |
      if [ "${USE_RELEASED_VERSION}" = "true" ]; then
        echo "npx @hashgraph/solo"
      else
        echo "npm run solo --"
      fi

vars:
  SOLO_NAMESPACE: "solo-ns"
  SOLO_DEPLOYMENT: "solo-rapid-fire-deployment"
  SOLO_CLUSTER_NAME: "rapid-fire-cluster"
  SOLO_CLUSTER_REF: "rapid-fire-cluster-reference"
  SOLO_CLUSTER_SETUP_NAMESPACE: "{{.SOLO_NAMESPACE}}"
  HELISWAP_PREFUND_START_ACCOUNT: "1001"
  HELISWAP_PREFUND_END_ACCOUNT: "1300"
  HELISWAP_PREFUND_HBAR: "200000"
  HELISWAP_PREFUND_SLEEP_SECONDS: "1"
  HELISWAP_CREATOR_ACCOUNT_ID: "0.0.1013"
  HELISWAP_CREATOR_TOP_UP_HBAR: "1000000"
  HELISWAP_CREATOR_TOP_UP_BURST_COUNT: "3"

tasks:
  deploy:
    desc: Deploy a complete Hiero network with a single consensus node and run rapid-fire tests
    dir: ../..
    cmds:
      # Install Solo CLI
      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            npm i @hashgraph/solo@latest
          else
            echo "Skipping npm install - using development version"
          fi

      # Run solo init to install dependencies
      - cmd: $SOLO_COMMAND init --dev

      - cmd: |
          # Clean up any existing Kind clusters
          for cluster in $(kind get clusters); do
            kind delete cluster -n $cluster
          done

      - cmd: |
          # Clean up Solo data
          rm -Rf ~/.solo

      # Run solo init to install dependencies
      - cmd: $SOLO_COMMAND init --dev

      - cmd: |
          # Create Kind cluster
          SHARED_KIND_CONFIG="{{ .TASKFILE_DIR }}/../../resources/kind-config.yaml"
          if [ -f "${SHARED_KIND_CONFIG}" ]; then
            kind create cluster -n {{ .SOLO_CLUSTER_NAME }} --config "${SHARED_KIND_CONFIG}"
          else
            kind create cluster -n {{ .SOLO_CLUSTER_NAME }}
          fi

      - cmd: |
          # Solo cluster-ref config connect
          $SOLO_COMMAND cluster-ref config connect --cluster-ref {{ .SOLO_CLUSTER_REF }} --context kind-{{.SOLO_CLUSTER_NAME}} --dev

      - cmd: |
          # Solo deployment config create
          $SOLO_COMMAND deployment config create -n {{ .SOLO_NAMESPACE }} --deployment {{ .SOLO_DEPLOYMENT }} --dev

      - cmd: |
          # Solo deployment cluster attach
          $SOLO_COMMAND deployment cluster attach --deployment {{ .SOLO_DEPLOYMENT }} --cluster-ref {{ .SOLO_CLUSTER_REF }} \
          --num-consensus-nodes 1 --dev

      - cmd: |
          # Solo keys consensus generate
          $SOLO_COMMAND keys consensus generate --gossip-keys --tls-keys --deployment {{ .SOLO_DEPLOYMENT }} --dev

      - cmd: |
          # Solo cluster-ref config setup
          $SOLO_COMMAND cluster-ref config setup -s {{ .SOLO_CLUSTER_SETUP_NAMESPACE }} --dev

      - cmd: |
          # Solo consensus network deploy
          $SOLO_COMMAND consensus network deploy --deployment {{ .SOLO_DEPLOYMENT }} \
          --pvcs {{.APPLICATION_PROPERTIES_FLAG}} --dev

      - cmd: |
          # Solo consensus node setup
          $SOLO_COMMAND consensus node setup --deployment {{ .SOLO_DEPLOYMENT }} --dev

      - cmd: |
          # Solo consensus node start
          $SOLO_COMMAND consensus node start --deployment {{ .SOLO_DEPLOYMENT }} --dev

      # Run load test with the com.hedera.benchmark.CryptoTransferLoadTest class
      # Args: [-c <clients>] [-a <accounts>] [-K ED25519|ECDSA] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [transfer|query|mixed] [-metrics]
      - cmd: |
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
          --values-file {{ .USER_WORKING_DIR }}/nlg-values.yaml \
          --test CryptoTransferLoadTest \
          --args '"-c 5 -a 10 -R -t 10"'

      # Run load test with the com.hedera.benchmark.NftTransferLoadTest class
      # Args: [-c <clients>] [-a <accounts>] [-T <tokens>] [-n <NFTs/token>] [-S flat|hot -p <percent>] [-K ED25519|ECDSA] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [-metrics]
      - cmd: |
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
          --test NftTransferLoadTest \
          --args '"-c 5 -a 10 -T 2 -n 3 -S flat -p 50 -R -t 10"'

      # Run load test with the com.hedera.benchmark.SmartContractLoadTest class
      # Args: [-c <clients>] [-a <accounts>] [-K ED25519|ECDSA] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [-metrics]
      - cmd: |
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
          --test SmartContractLoadTest \
          --args '"-c 5 -a 10 -R -t 10"'

      # Run load test with the com.hedera.benchmark.HeliSwapLoadTest class
      # Args: HeliSwapLoadTest [-c <clients>] [-a <accounts>] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [-metrics]
      - cmd: |
          # Keep funding newly-created rapid-fire accounts while HeliSwap is running.
          # HeliSwap creates/uses payer accounts during execution, so one-time prefund misses them.
          # Discover account IDs from both:
          #   1) K8s account-key secrets (Solo-created accounts)
          #   2) Numeric account-id range scan (NLG-created accounts such as HeliSwap creator)
          get_candidate_accounts() {
            kubectl --context kind-{{ .SOLO_CLUSTER_NAME }} -n {{ .SOLO_NAMESPACE }} get secrets -o jsonpath='{range .items[*]}{.metadata.labels.solo\.hedera\.com/account-id}{"\n"}{end}' \
              | awk -F'.' 'NF==3 && $1=="0" && $2=="0" && $3 ~ /^[0-9]+$/ && $3 >= 1000 {print $0}' \
              | sort -u
          }

          fund_account() {
            account_id="$1"
            [ -z "${account_id}" ] && return 0

            if grep -qx "${account_id}" "${funded_ids_file}"; then
              return 0
            fi

            if $SOLO_COMMAND ledger account update \
              --deployment {{ .SOLO_DEPLOYMENT }} \
              --account-id "${account_id}" \
              --hbar-amount {{ .HELISWAP_PREFUND_HBAR }} \
              --dev >/dev/null 2>&1; then
              echo "${account_id}" >> "${funded_ids_file}"
              echo "Pre-funded ${account_id} for HeliSwap"
            fi
          }

          top_up_creator_account() {
            if $SOLO_COMMAND ledger account update \
              --deployment {{ .SOLO_DEPLOYMENT }} \
              --account-id {{ .HELISWAP_CREATOR_ACCOUNT_ID }} \
              --hbar-amount {{ .HELISWAP_CREATOR_TOP_UP_HBAR }} \
              --dev >/dev/null 2>&1; then
              echo "Topped up HeliSwap creator {{ .HELISWAP_CREATOR_ACCOUNT_ID }}"
            fi
          }

          funded_ids_file="$(mktemp /tmp/heliswap-funded-ids.XXXXXX)"
          touch "${funded_ids_file}"

          # Pre-fund all currently known user accounts once before HeliSwap starts.
          for account_num in $(seq {{ .HELISWAP_PREFUND_START_ACCOUNT }} {{ .HELISWAP_PREFUND_END_ACCOUNT }}); do
            fund_account "0.0.${account_num}"
          done
          get_candidate_accounts | while read -r account_id; do
            fund_account "${account_id}"
          done
          for _ in $(seq 1 {{ .HELISWAP_CREATOR_TOP_UP_BURST_COUNT }}); do
            top_up_creator_account
          done

          (
            while true; do
              top_up_creator_account
              for account_num in $(seq {{ .HELISWAP_PREFUND_START_ACCOUNT }} {{ .HELISWAP_PREFUND_END_ACCOUNT }}); do
                fund_account "0.0.${account_num}"
              done
              get_candidate_accounts | while read -r account_id; do
                fund_account "${account_id}"
              done
              sleep {{ .HELISWAP_PREFUND_SLEEP_SECONDS }}
            done
          ) &
          prefunder_pid=$!

          set +e
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
            --test HeliSwapLoadTest \
            --args '"-c 5 -a 10 -R -t 10"'
          heliswap_exit_code=$?
          set -e

          kill "${prefunder_pid}" >/dev/null 2>&1 || true
          wait "${prefunder_pid}" 2>/dev/null || true
          rm -f "${funded_ids_file}"

          if [ "${heliswap_exit_code}" -ne 0 ]; then
            exit "${heliswap_exit_code}"
          fi

      # Run load test with the com.hedera.benchmark.LongevityLoadTest class
      # Args: LongevityLoadTest [-c <clients>] [-a <accounts>] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [-metrics]
      - cmd: |
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
          --test LongevityLoadTest \
          --args '"-c 5 -a 10 -R -t 10"'

      # Run load test with the com.hedera.benchmark.HCSLoadTest class
      # Args: HCSLoadTest [-c <clients>] [-a <accounts>] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [-metrics]
      - cmd: |
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
          --test HCSLoadTest \
          --args '"-c 5 -a 10 -R -t 10"'

      # Run load test with the com.hedera.benchmark.TokenTransferLoadTest class
      # Args: [-c <clients>] [-a <accounts>] [-T <tokens>] [-A <associations>] [-K ED25519|ECDSA] [-R] [-t|tt <time>] [-host <host>] [-port <port>] [-endpoint <endpoint>] [-metrics]
      - cmd: |
          $SOLO_COMMAND rapid-fire load start --deployment {{ .SOLO_DEPLOYMENT }} \
          --test TokenTransferLoadTest \
          --args '"-c 5 -a 1 -T 1 -A 1 -R -t 10"'

  destroy:
    desc: Destroy the Solo network using one-shot single destroy
    cmds:
      - cmd: $SOLO_COMMAND rapid-shot destroy all --deployment {{ .SOLO_DEPLOYMENT }}
      - cmd: $SOLO_COMMAND one-shot single destroy --deployment {{ .SOLO_DEPLOYMENT }}

      # Delete Kind cluster
      - cmd: kind delete cluster -n {{ .CLUSTER_NAME }}

  default:
    desc: Run the default deploy task
    cmds:
      - task: deploy
