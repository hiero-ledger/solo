version: 3

env:
  SOLO_COMMAND:
    sh: |
      if [ "${USE_RELEASED_VERSION}" = "true" ]; then
        echo "npx @hashgraph/solo"
      else
        echo "npm run solo --"
      fi
  ONE_SHOT_WITH_BLOCK_NODE: "true"
  # Set USE_LOCAL_MIRROR_NODE_CHART=true to check out the mirror node repo and use its local chart
  USE_LOCAL_MIRROR_NODE_CHART: "true"
  # Set USE_LOCAL_BUILD=true to check out and build consensus node from source (requires Java 21 and Gradle)
  USE_LOCAL_BUILD: "true"
  # Set PRELOAD_IMAGES=true to pull all images in image_list.txt, create the Kind cluster up front,
  # and preload the images into the cluster before running one-shot deploy.
  PRELOAD_IMAGES: "true"

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel

  SOLO_CLUSTER_NAME: "one-shot-timing-cluster"

  # Consensus node version for local build
  CN_VERSION: "v0.72.0-rc.4"

  # Block node chart version to deploy
  BLOCK_NODE_VERSION: "0.29.0"

  # Mirror node version read from version.ts
  MIRROR_NODE_VERSION:
    sh: awk -F"'" '/^export const MIRROR_NODE_VERSION/ {print $(NF-1); exit}' ../../version.ts

  # Local repository directories (cloned next to the solo repo)
  CN_REPO_DIR: "{{.ROOT_DIR}}/../hiero-consensus-node"
  MIRROR_NODE_REPO_DIR: "{{.ROOT_DIR}}/../hiero-mirror-node"

  # Local build and chart paths derived from the cloned repos
  CN_LOCAL_BUILD_PATH: "{{.CN_REPO_DIR}}/hedera-node/data"
  MIRROR_NODE_CHART_DIR: "{{.MIRROR_NODE_REPO_DIR}}/charts"

  # Runtime values file generated when local charts/build are used
  RUNTIME_VALUES_FILE: "/tmp/one-shot-timing-runtime-values.yaml"

tasks:
  checkout-consensus-node:
    desc: Checkout the consensus node repository at CN_VERSION
    cmds:
      - cmd: |
          clone_at_tag() {
            local tag="${1}" dir="${2}"
            git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
              --depth 1 --branch "${tag}" "${dir}" 2>/dev/null || \
            git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
              --depth 1 --branch "refs/tags/${tag}" "${dir}"
          }
          if [ ! -d "{{.CN_REPO_DIR}}" ]; then
            clone_at_tag "{{.CN_VERSION}}" "{{.CN_REPO_DIR}}"
          else
            EXISTING_TAG=$(cd "{{.CN_REPO_DIR}}" && git describe --tags --exact-match HEAD 2>/dev/null || echo "")
            if [ "${EXISTING_TAG}" != "{{.CN_VERSION}}" ]; then
              echo "Existing clone at '${EXISTING_TAG}' does not match required '{{.CN_VERSION}}', re-cloning..."
              rm -rf "{{.CN_REPO_DIR}}"
              clone_at_tag "{{.CN_VERSION}}" "{{.CN_REPO_DIR}}"
            else
              echo "Skipping clone: {{.CN_REPO_DIR}} already at {{.CN_VERSION}}"
            fi
          fi

  build-consensus-node:
    desc: Build the Hiero consensus node from source (requires Java 21 and Gradle)
    cmds:
      - cmd: |
          LOG_FILE="/tmp/consensus-node-build.log"
          echo "Building consensus node from source at {{.CN_REPO_DIR}} for version {{.CN_VERSION}}..."
          echo "Build log: $LOG_FILE"
          cd {{.CN_REPO_DIR}}
          ./gradlew assemble --stacktrace --info > "$LOG_FILE" 2>&1 || { echo "Build failed. Last 100 lines of $LOG_FILE:"; tail -100 "$LOG_FILE"; exit 1; }
          echo "Build complete."

  checkout-mirror-node:
    desc: Checkout the mirror node repository at the version defined in version.ts
    cmds:
      - cmd: |
          if [ ! -d "{{.MIRROR_NODE_REPO_DIR}}" ]; then
            git clone https://github.com/hiero-ledger/hiero-mirror-node.git \
              --depth 1 --branch {{.MIRROR_NODE_VERSION}} {{.MIRROR_NODE_REPO_DIR}}
          else
            echo "Skipping clone: {{.MIRROR_NODE_REPO_DIR}} already exists"
          fi

  build-mirror-node-chart-deps:
    desc: Run helm dependency build for the local mirror node chart directory
    cmds:
      - cmd: |
          CHART_PATH="{{.MIRROR_NODE_CHART_DIR}}/hedera-mirror"
          if [ -d "$CHART_PATH" ]; then
            echo "Running helm dependency build in $CHART_PATH..."
            helm dependency update "$CHART_PATH"
          else
            echo "Skipping: $CHART_PATH not found"
          fi

  generate-values:
    desc: Generate a runtime values YAML file with local build and chart paths
    cmds:
      - cmd: |
          {
            if [ "${USE_LOCAL_BUILD}" = "true" ]; then
              echo "network:"
              echo "  --release-tag: \"{{.CN_VERSION}}\""
              echo "  --tss: \"true\""
              echo ""
              echo "setup:"
              echo "  --local-build-path: \"{{.CN_LOCAL_BUILD_PATH}}\""
              echo "  --release-tag: \"{{.CN_VERSION}}\""
              echo ""
            fi
            echo "blockNode:"
            echo "  --chart-version: \"{{.BLOCK_NODE_VERSION}}\""
            echo ""
            if [ "${USE_LOCAL_MIRROR_NODE_CHART}" = "true" ]; then
              echo "mirrorNode:"
              echo "  --mirror-node-chart-dir: \"{{.MIRROR_NODE_CHART_DIR}}\""
            fi
          } > {{.RUNTIME_VALUES_FILE}}
          echo "Generated runtime values file at {{.RUNTIME_VALUES_FILE}}:"
          cat {{.RUNTIME_VALUES_FILE}}

  setup-local-mirror-node:
    desc: Checkout mirror node repo and build chart deps (when USE_LOCAL_MIRROR_NODE_CHART=true)
    cmds:
      - task: checkout-mirror-node
      - task: build-mirror-node-chart-deps

  setup-local-build:
    desc: Checkout and build consensus node from source (when USE_LOCAL_BUILD=true)
    cmds:
      - task: checkout-consensus-node
      - task: build-consensus-node

  pull-images:
    desc: Pull all Docker images listed in image_list.txt
    cmds:
      - cmd: |
          IMAGE_LIST="{{ .TASKFILE_DIR }}/image_list.txt"
          echo "==== Pulling images from ${IMAGE_LIST} ===="
          while IFS= read -r image || [ -n "$image" ]; do
            [ -z "$image" ] && continue
            echo "Pulling: $image"
            docker pull "$image"
          done < "${IMAGE_LIST}"
          echo "==== Done pulling images ===="

  create-cluster:
    desc: Create the Kind cluster for preloaded image deployment
    cmds:
      # Run solo init to install dependencies
      - cmd: $SOLO_COMMAND init --dev

      - cmd: |
          # Create Kind cluster
          SHARED_KIND_CONFIG="{{ .TASKFILE_DIR }}/../../resources/kind-config.yaml"
          if [ -f "${SHARED_KIND_CONFIG}" ]; then
            kind create cluster -n {{ .SOLO_CLUSTER_NAME }} --config "${SHARED_KIND_CONFIG}"
          else
            kind create cluster -n {{ .SOLO_CLUSTER_NAME }}
          fi

  load-images-to-cluster:
    desc: Load all images from image_list.txt into the Kind cluster
    cmds:
      - cmd: |
          IMAGE_LIST="{{ .TASKFILE_DIR }}/image_list.txt"
          echo "==== Loading images into cluster {{ .SOLO_CLUSTER_NAME }} ===="
          while IFS= read -r image || [ -n "$image" ]; do
            [ -z "$image" ] && continue
            echo "Loading: $image"
            kind load docker-image "$image" --name {{ .SOLO_CLUSTER_NAME }}
          done < "${IMAGE_LIST}"
          echo "==== Done loading images ===="

  cold-start:
    desc: Measure cold start time for solo one-shot single deploy
    cmds:
      # if using released version of Solo, make sure to run from solo project root directory
      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            cd ../../solo || exit 1
          else
            echo "Skipping cd - using development version"
          fi

      # Install Solo CLI
      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            npm i @hashgraph/solo@latest
          else
            echo "Skipping npm install - using development version"
          fi

      # Run solo init to install dependencies (including helm into ~/.solo/bin)
      - cmd: $SOLO_COMMAND init --dev

      # If USE_LOCAL_BUILD is enabled, checkout and build consensus node from source
      - cmd: |
          if [ "${USE_LOCAL_BUILD}" = "true" ]; then
            echo "USE_LOCAL_BUILD=true: checking out and building consensus node..."
            task setup-local-build
          fi

      # If USE_LOCAL_MIRROR_NODE_CHART is enabled, set up local mirror node chart
      - cmd: |
          if [ "${USE_LOCAL_MIRROR_NODE_CHART}" = "true" ]; then
            echo "USE_LOCAL_MIRROR_NODE_CHART=true: setting up local mirror node chart..."
            task setup-local-mirror-node
          else
            echo "USE_LOCAL_MIRROR_NODE_CHART=false: using published mirror node chart"
          fi

      # Generate values file with local build and chart paths
      - cmd: |
          task generate-values

      # If PRELOAD_IMAGES is enabled, pull all images, create the cluster, then load images into it
      - cmd: |
          if [ "${PRELOAD_IMAGES}" = "true" ]; then
            echo "PRELOAD_IMAGES=true: pulling images..."
            task pull-images
            echo "PRELOAD_IMAGES=true: creating cluster..."
            task create-cluster
            echo "PRELOAD_IMAGES=true: loading images into cluster..."
            task load-images-to-cluster
          else
            echo "PRELOAD_IMAGES=false: skipping image preload and cluster pre-creation"
          fi

      # Measure cold start time: deploy for the first time (no cached Docker images)
      - cmd: |
          echo "==== Cold Start: Measuring solo one-shot single deploy time ===="
          time $SOLO_COMMAND one-shot single deploy --values-file {{.RUNTIME_VALUES_FILE}}
          echo "==== Cold start complete ===="

  destroy:
    desc: Destroy the Solo one-shot single deployment
    cmds:
      - cmd: |
          echo "==== Destroying one-shot single deployment ===="
          $SOLO_COMMAND one-shot single destroy

  warm-start:
    desc: Measure warm start time for solo one-shot single deploy (Docker images already cached)
    cmds:
      # Measure warm start time: redeploy after destroy (Docker images are already cached locally)
      - cmd: |
          echo "==== Warm Start: Measuring solo one-shot single deploy time ===="
          time $SOLO_COMMAND one-shot single deploy --values-file {{.RUNTIME_VALUES_FILE}}
          echo "==== Warm start complete ===="

  test:
    desc: Measure cold and warm start times for one-shot single deploy
    cmds:
      # Cold start: deploy with no cached images
      - task: cold-start
      # Destroy the deployment
      - task: destroy
      # Warm start: redeploy with cached images
      - task: warm-start

  default:
    desc: Measure cold and warm start times for one-shot single deploy
    cmds:
      - task: test
