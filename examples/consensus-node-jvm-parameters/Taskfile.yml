version: 3

env:
  SOLO_COMMAND:
    sh: |
      if [ "${USE_RELEASED_VERSION}" = "true" ]; then
        echo "npx @hashgraph/solo"
      else
        echo "npm run solo --"
      fi
  ONE_SHOT_WITH_BLOCK_NODE: "true"

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel
  DEPLOYMENT: "falcon-deployment"
  CLUSTER_NAME: "falcon-cluster"
  CONTEXT: "kind-falcon-cluster"
  APP_PROPS_OVERRIDE_FILE: "/tmp/consensus-node-jvm-parameters-application.properties"
  RUNTIME_VALUES_OVERRIDE_FILE: "/tmp/consensus-node-jvm-parameters-values-override.yaml"

tasks:
  deploy:
    desc: Deploy a complete Hiero network using one-shot falcon deploy
    cmds:
      # Install Solo CLI
      - cmd: |
          if [ "${USE_RELEASED_VERSION}" = "true" ]; then
            npm i @hashgraph/solo@latest
          else
            echo "Skipping npm install - using development version"
          fi

      # Solo one-shot falcon deploy
      - cmd: |
          cp "{{.ROOT_DIR}}/resources/templates/application.properties" "{{.APP_PROPS_OVERRIDE_FILE}}"
          {
            echo ""
            echo "# consensus-node-jvm-parameters overrides"
            echo "blockStream.streamMode=BOTH"
            echo "blockStream.writerMode=FILE_AND_GRPC"
            echo "tss.hintsEnabled=true"
            echo "tss.historyEnabled=true"
          } >> "{{.APP_PROPS_OVERRIDE_FILE}}"

          {
            echo "network:"
            echo "  --application-properties: \"{{.APP_PROPS_OVERRIDE_FILE}}\""
          } > "{{.RUNTIME_VALUES_OVERRIDE_FILE}}"

          $SOLO_COMMAND one-shot falcon deploy \
          --values-file {{ .USER_WORKING_DIR }}/falcon-values.yaml \
          --values-file {{.RUNTIME_VALUES_OVERRIDE_FILE}} \
          --quiet-mode --dev

  destroy:
    desc: Destroy the Solo network using one-shot falcon destroy
    cmds:
      # Solo one-shot falcon destroy
      - cmd: $SOLO_COMMAND one-shot falcon destroy

      # Delete Kind cluster
      - cmd: kind delete cluster -n {{ .CLUSTER_NAME }}

      # Remove generated overrides
      - cmd: rm -f {{.APP_PROPS_OVERRIDE_FILE}} {{.RUNTIME_VALUES_OVERRIDE_FILE}}

  default:
    desc: Run the default deploy task
    cmds:
      - task: deploy
